<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>D'Mezzanine Stockroom System</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:300px;
background:#111827;
padding:20px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo-box{
display:flex;
align-items:center;
gap:14px;
margin-bottom:30px;
}

.logo-box img{
width:65px;
height:65px;
border-radius:50%;
background:white;
padding:5px;
border:3px solid #facc15;
object-fit:contain;
}

.logo-text h2{
font-size:20px;
font-weight:700;
}

.logo-text p{
font-size:13px;
color:#d1d5db;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu button{
display:flex;
align-items:center;
gap:14px;
padding:15px;
border-radius:16px;
border:none;
background:rgba(255,255,255,0.03);
color:white;
cursor:pointer;
font-size:15px;
transition:.3s;
}

.menu button:hover,
.menu button.active{
background:#facc15;
color:black;
transform:translateX(4px);
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow-y:auto;
}

.header-box{
background:#1e293b;
padding:25px;
border-radius:24px;
margin-bottom:25px;
}

.header-box h1{
font-size:38px;
}

.header-box p{
color:#cbd5e1;
margin-top:8px;
}

/* FORM */

.form-box{
background:#1e293b;
padding:25px;
border-radius:24px;
margin-bottom:25px;

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;
}

.form-box input,
.form-box select,
.form-box textarea{
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;
font-size:14px;
}

textarea{
resize:none;
height:52px;
}

.save-btn{
background:#22c55e;
border:none;
padding:14px;
border-radius:12px;
font-weight:700;
cursor:pointer;
color:white;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:24px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1400px;
}

th{
background:#111827;
color:#facc15;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.delete-btn{
background:#ef4444;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
cursor:pointer;
}

.section{
display:none;
}

.section.active{
display:block;
}

/* STATUS */

.good{
color:#22c55e;
font-weight:700;
}

.bad{
color:#ef4444;
font-weight:700;
}

@media(max-width:950px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
}

.menu{
flex-direction:row;
}

.menu button{
min-width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Stockroom System</p>

</div>

</div>

<div class="menu">

<button class="active"
onclick="showSection('itemsSection',this)">

<i class="fa-solid fa-box"></i>

Items

</button>

<button onclick="showSection('stockInSection',this)">

<i class="fa-solid fa-truck"></i>

Stock In

</button>

<button onclick="showSection('stockOutSection',this)">

<i class="fa-solid fa-arrow-right-arrow-left"></i>

Stock Out

</button>

<button onclick="showSection('wasteSection',this)">

<i class="fa-solid fa-trash"></i>

Waste

</button>

<button onclick="showSection('dailySection',this)">

<i class="fa-solid fa-clipboard-list"></i>

Daily Inventory

</button>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header-box">

<h1>Stockroom Inventory 📦</h1>

<p id="dateTime"></p>

</div>

<!-- ITEMS -->

<div id="itemsSection"
class="section active">

<div class="form-box">

<input type="text"
id="itemName"
placeholder="Item Name">

<input type="text"
id="itemCategory"
placeholder="Category">

<input type="number"
id="itemStock"
placeholder="Beginning Stock">

<button class="save-btn"
onclick="saveItem()">

Save Item

</button>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>Item</th>
<th>Category</th>
<th>Current Stock</th>

</tr>

</thead>

<tbody id="itemsTable"></tbody>

</table>

</div>

</div>

<!-- STOCK IN -->

<div id="stockInSection"
class="section">

<div class="form-box">

<select id="stockInItem"></select>

<input type="number"
id="stockInQty"
placeholder="Quantity">

<input type="text"
id="stockInSupplier"
placeholder="Supplier">

<input type="date"
id="stockInDate">

<button class="save-btn"
onclick="saveStockIn()">

Save Stock In

</button>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>Date</th>
<th>Item</th>
<th>Quantity</th>
<th>Supplier</th>

</tr>

</thead>

<tbody id="stockInTable"></tbody>

</table>

</div>

</div>

<!-- STOCK OUT -->

<div id="stockOutSection"
class="section">

<div class="form-box">

<select id="stockOutItem"></select>

<input type="number"
id="stockOutQty"
placeholder="Quantity">

<input type="text"
id="stockOutReason"
placeholder="Reason">

<input type="date"
id="stockOutDate">

<button class="save-btn"
onclick="saveStockOut()">

Save Stock Out

</button>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>Date</th>
<th>Item</th>
<th>Quantity</th>
<th>Reason</th>

</tr>

</thead>

<tbody id="stockOutTable"></tbody>

</table>

</div>

</div>

<!-- WASTE -->

<div id="wasteSection"
class="section">

<div class="form-box">

<select id="wasteItem"></select>

<input type="number"
id="wasteQty"
placeholder="Quantity">

<input type="text"
id="wasteReason"
placeholder="Reason">

<input type="date"
id="wasteDate">

<button class="save-btn"
onclick="saveWaste()">

Save Waste

</button>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>Date</th>
<th>Item</th>
<th>Quantity</th>
<th>Reason</th>

</tr>

</thead>

<tbody id="wasteTable"></tbody>

</table>

</div>

</div>

<!-- DAILY INVENTORY -->

<div id="dailySection"
class="section">

<div class="form-box">

<input type="date"
id="dailyDate">

<button class="save-btn"
onclick="generateDailyInventory()">

Generate Daily Inventory

</button>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>Item</th>
<th>Current Stock</th>
<th>Stock In</th>
<th>Stock Out</th>
<th>Waste</th>
<th>Actual Count</th>
<th>Variance</th>

</tr>

</thead>

<tbody id="dailyTable"></tbody>

</table>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
increment,
query,
where

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_STORAGE_BUCKET",
messagingSenderId:"YOUR_SENDER_ID",
appId:"YOUR_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* DATE TIME */

function updateDateTime(){

document.getElementById("dateTime")
.innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();

/* SIDEBAR */

window.showSection =
function(id,btn){

document.querySelectorAll(".section")
.forEach(sec=>{

sec.classList.remove("active");

});

document.getElementById(id)
.classList.add("active");

document.querySelectorAll(".menu button")
.forEach(b=>{

b.classList.remove("active");

});

btn.classList.add("active");

}

/* SAVE ITEM */

window.saveItem =
async function(){

const name =
document.getElementById("itemName").value;

const category =
document.getElementById("itemCategory").value;

const stock =
Number(
document.getElementById("itemStock").value
);

if(!name || !category){

alert("Complete fields");

return;

}

await addDoc(
collection(db,"inventoryItems"),
{

name:name,
category:category,
stock:stock,
createdAt:new Date()

}
);

alert("Item Saved");

loadItems();

}

/* LOAD ITEMS */

async function loadItems(){

const table =
document.getElementById("itemsTable");

table.innerHTML = "";

const selects = [

document.getElementById("stockInItem"),
document.getElementById("stockOutItem"),
document.getElementById("wasteItem")

];

selects.forEach(select=>{

select.innerHTML =
`<option value="">Select Item</option>`;

});

const snapshot =
await getDocs(
collection(db,"inventoryItems")
);

snapshot.forEach((firebaseDoc)=>{

const item =
firebaseDoc.data();

table.innerHTML += `

<tr>

<td>${item.name}</td>
<td>${item.category}</td>
<td>${item.stock}</td>

</tr>

`;

selects.forEach(select=>{

select.innerHTML += `

<option value="${firebaseDoc.id}">

${item.name}
(Current:
${item.stock})

</option>

`;

});

});

}

/* STOCK IN */

window.saveStockIn =
async function(){

const itemId =
document.getElementById("stockInItem").value;

const qty =
Number(
document.getElementById("stockInQty").value
);

const supplier =
document.getElementById("stockInSupplier").value;

const date =
document.getElementById("stockInDate").value;

const itemName =
document.getElementById("stockInItem")
.options[
document.getElementById("stockInItem")
.selectedIndex
].text;

await addDoc(
collection(db,"stockIn"),
{

itemId,
itemName,
qty,
supplier,
date,
createdAt:new Date()

}
);

await updateDoc(
doc(db,"inventoryItems",itemId),
{

stock:increment(qty)

}
);

alert("Stock In Saved");

loadItems();
loadStockIn();

}

/* LOAD STOCK IN */

async function loadStockIn(){

const table =
document.getElementById("stockInTable");

table.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"stockIn")
);

snapshot.forEach((firebaseDoc)=>{

const data =
firebaseDoc.data();

table.innerHTML += `

<tr>

<td>${data.date}</td>
<td>${data.itemName}</td>
<td>${data.qty}</td>
<td>${data.supplier}</td>

</tr>

`;

});

}

/* STOCK OUT */

window.saveStockOut =
async function(){

const itemId =
document.getElementById("stockOutItem").value;

const qty =
Number(
document.getElementById("stockOutQty").value
);

const reason =
document.getElementById("stockOutReason").value;

const date =
document.getElementById("stockOutDate").value;

const itemName =
document.getElementById("stockOutItem")
.options[
document.getElementById("stockOutItem")
.selectedIndex
].text;

await addDoc(
collection(db,"stockOut"),
{

itemId,
itemName,
qty,
reason,
date,
createdAt:new Date()

}
);

await updateDoc(
doc(db,"inventoryItems",itemId),
{

stock:increment(-qty)

}
);

alert("Stock Out Saved");

loadItems();
loadStockOut();

}

/* LOAD STOCK OUT */

async function loadStockOut(){

const table =
document.getElementById("stockOutTable");

table.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"stockOut")
);

snapshot.forEach((firebaseDoc)=>{

const data =
firebaseDoc.data();

table.innerHTML += `

<tr>

<td>${data.date}</td>
<td>${data.itemName}</td>
<td>${data.qty}</td>
<td>${data.reason}</td>

</tr>

`;

});

}

/* WASTE */

window.saveWaste =
async function(){

const itemId =
document.getElementById("wasteItem").value;

const qty =
Number(
document.getElementById("wasteQty").value
);

const reason =
document.getElementById("wasteReason").value;

const date =
document.getElementById("wasteDate").value;

const itemName =
document.getElementById("wasteItem")
.options[
document.getElementById("wasteItem")
.selectedIndex
].text;

await addDoc(
collection(db,"waste"),
{

itemId,
itemName,
qty,
reason,
date,
createdAt:new Date()

}
);

await updateDoc(
doc(db,"inventoryItems",itemId),
{

stock:increment(-qty)

}
);

alert("Waste Saved");

loadItems();
loadWaste();

}

/* LOAD WASTE */

async function loadWaste(){

const table =
document.getElementById("wasteTable");

table.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"waste")
);

snapshot.forEach((firebaseDoc)=>{

const data =
firebaseDoc.data();

table.innerHTML += `

<tr>

<td>${data.date}</td>
<td>${data.itemName}</td>
<td>${data.qty}</td>
<td>${data.reason}</td>

</tr>

`;

});

}

/* DAILY INVENTORY */

window.generateDailyInventory =
async function(){

const date =
document.getElementById("dailyDate").value;

const table =
document.getElementById("dailyTable");

table.innerHTML = "";

const itemsSnapshot =
await getDocs(
collection(db,"inventoryItems")
);

for(const itemDoc of itemsSnapshot.docs){

const item =
itemDoc.data();

const itemId =
itemDoc.id;

/* STOCK IN */

const stockInSnapshot =
await getDocs(
query(
collection(db,"stockIn"),
where("itemId","==",itemId),
where("date","==",date)
)
);

let stockInTotal = 0;

stockInSnapshot.forEach(docu=>{

stockInTotal +=
Number(docu.data().qty || 0);

});

/* STOCK OUT */

const stockOutSnapshot =
await getDocs(
query(
collection(db,"stockOut"),
where("itemId","==",itemId),
where("date","==",date)
)
);

let stockOutTotal = 0;

stockOutSnapshot.forEach(docu=>{

stockOutTotal +=
Number(docu.data().qty || 0);

});

/* WASTE */

const wasteSnapshot =
await getDocs(
query(
collection(db,"waste"),
where("itemId","==",itemId),
where("date","==",date)
)
);

let wasteTotal = 0;

wasteSnapshot.forEach(docu=>{

wasteTotal +=
Number(docu.data().qty || 0);

});

table.innerHTML += `

<tr>

<td>${item.name}</td>

<td>${item.stock}</td>

<td>${stockInTotal}</td>

<td>${stockOutTotal}</td>

<td>${wasteTotal}</td>

<td>

<input
type="number"
id="actual-${itemId}"
value="${item.stock}"
style="
padding:10px;
width:100px;
border:none;
border-radius:8px;
background:#111827;
color:white;
">

</td>

<td id="variance-${itemId}">
0
</td>

</tr>

`;

}

}

/* LOAD */

loadItems();
loadStockIn();
loadStockOut();
loadWaste();

</script>

</body>
</html>
