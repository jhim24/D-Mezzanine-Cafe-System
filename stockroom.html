<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>D'Mezzanine Items Masterlist</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:8px;
height:8px;
}

::-webkit-scrollbar-thumb{
background:#facc15;
border-radius:10px;
}

/* LAYOUT */

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:290px;
background:#111827;
padding:20px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo-box{
display:flex;
align-items:center;
gap:14px;
margin-bottom:30px;
}

.logo-box img{
width:65px;
height:65px;
border-radius:50%;
background:white;
padding:5px;
border:3px solid #facc15;
object-fit:contain;
}

.logo-text h2{
font-size:20px;
font-weight:700;
}

.logo-text p{
font-size:13px;
color:#d1d5db;
margin-top:3px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:16px;
border-radius:18px;
text-decoration:none;
color:white;
font-size:15px;
font-weight:500;
transition:.3s;
background:rgba(255,255,255,0.03);
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
transform:translateX(4px);
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow-y:auto;
}

/* HEADER */

.header-box{
background:#1e293b;
padding:28px;
border-radius:24px;
margin-bottom:25px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
}

.header-box h1{
font-size:38px;
}

.header-box p{
color:#cbd5e1;
margin-top:5px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:22px;
position:relative;
overflow:hidden;
}

.card i{
position:absolute;
top:20px;
right:20px;
font-size:38px;
color:rgba(250,204,21,0.25);
}

.card h3{
font-size:15px;
color:#cbd5e1;
margin-bottom:12px;
}

.card h2{
font-size:38px;
color:#facc15;
}

/* FORM */

.form-box{
background:#1e293b;
padding:25px;
border-radius:24px;
margin-bottom:25px;

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;
}

.form-box input,
.form-box select{
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;
font-size:14px;
}

.form-box input:focus,
.form-box select:focus{
outline:none;
border:1px solid #facc15;
}

/* BUTTON */

.save-btn{
background:#22c55e;
border:none;
padding:14px;
border-radius:12px;
font-weight:700;
cursor:pointer;
color:white;
transition:.3s;
}

.save-btn:hover{
transform:translateY(-3px);
}

/* FILTERS */

.filters{
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.filters input,
.filters select{
padding:14px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
min-width:220px;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:24px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1700px;
}

th{
background:#111827;
color:#facc15;
padding:15px;
font-size:14px;
text-align:left;
white-space:nowrap;
}

td{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.08);
font-size:14px;
white-space:nowrap;
}

/* STATUS */

.low-stock{
color:#ef4444;
font-weight:700;
}

.good-stock{
color:#22c55e;
font-weight:700;
}

/* ACTION */

.edit-btn{
background:#3b82f6;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
cursor:pointer;
margin-right:5px;
}

.delete-btn{
background:#ef4444;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* MOBILE */

@media(max-width:950px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
}

.menu{
flex-direction:row;
}

.menu a{
min-width:180px;
}

.header-box{
flex-direction:column;
align-items:flex-start;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Inventory System</p>

</div>

</div>

<div class="menu">

<a href="index.html">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="items-masterlist.html"
class="active">

<i class="fa-solid fa-box"></i>

Items Masterlist

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>

Stock In

</a>

<a href="stock-out.html">

<i class="fa-solid fa-arrow-right-arrow-left"></i>

Stock Out

</a>

<a href="waste.html">

<i class="fa-solid fa-trash"></i>

Waste

</a>

<a href="daily-inventory.html">

<i class="fa-solid fa-clipboard-list"></i>

Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header-box">

<div>

<h1>Items Masterlist 📦</h1>

<p id="dateTime"></p>

</div>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">

<i class="fa-solid fa-boxes-stacked"></i>

<h3>Total Items</h3>

<h2 id="totalItems">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-triangle-exclamation"></i>

<h3>Low Stock</h3>

<h2 id="lowStockCount">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-layer-group"></i>

<h3>Categories</h3>

<h2 id="categoryCount">0</h2>

</div>

</div>

<!-- FORM -->

<div class="form-box">

<input type="text"
id="itemCode"
placeholder="Item Code">

<input type="text"
id="itemName"
placeholder="Item Name">

<select id="category">

<option value="">
Select Category
</option>

<option>
Raw Materials
</option>

<option>
Packaging
</option>

<option>
Supplies
</option>

<option>
Beverages
</option>

</select>

<input type="text"
id="unit"
placeholder="Unit">

<input type="number"
id="stock"
placeholder="Beginning Stock">

<input type="number"
id="reorderLevel"
placeholder="Reorder Level">

<input type="text"
id="supplier"
placeholder="Supplier">

<input type="number"
id="cost"
placeholder="Cost Per Unit">

<input type="number"
id="sellingPrice"
placeholder="Selling Price">

<input type="date"
id="expiry">

<input type="text"
id="location"
placeholder="Storage Location">

<button class="save-btn"
onclick="saveItem()">

<i class="fa-solid fa-floppy-disk"></i>

Save Item

</button>

</div>

<!-- FILTERS -->

<div class="filters">

<input type="text"
id="searchInput"
placeholder="Search Item..."
onkeyup="loadItems()">

<select id="filterCategory"
onchange="loadItems()">

<option value="">
All Categories
</option>

<option>
Raw Materials
</option>

<option>
Packaging
</option>

<option>
Supplies
</option>

<option>
Beverages
</option>

</select>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Code</th>
<th>Item Name</th>
<th>Category</th>
<th>Unit</th>
<th>Current Stock</th>
<th>Reorder</th>
<th>Supplier</th>
<th>Cost</th>
<th>Selling</th>
<th>Expiry</th>
<th>Location</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="itemsTable">

<tr>

<td colspan="13">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_STORAGE_BUCKET",
messagingSenderId:"YOUR_SENDER_ID",
appId:"YOUR_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* DATE TIME */

function updateDateTime(){

document.getElementById("dateTime")
.innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();

/* SAVE ITEM */

window.saveItem =
async function(){

const item = {

itemCode:
document.getElementById("itemCode").value,

itemName:
document.getElementById("itemName").value,

category:
document.getElementById("category").value,

unit:
document.getElementById("unit").value,

stock:
Number(
document.getElementById("stock").value
),

reorderLevel:
Number(
document.getElementById("reorderLevel").value
),

supplier:
document.getElementById("supplier").value,

cost:
Number(
document.getElementById("cost").value
),

sellingPrice:
Number(
document.getElementById("sellingPrice").value
),

expiry:
document.getElementById("expiry").value,

location:
document.getElementById("location").value,

status:"Active",

createdAt:new Date()

};

if(
!item.itemCode ||
!item.itemName
){

alert("Complete all required fields");

return;

}

await addDoc(
collection(db,"inventoryMasterlist"),
item
);

alert("Item Saved Successfully");

clearForm();

loadItems();

}

/* CLEAR */

function clearForm(){

document.querySelectorAll(".form-box input")
.forEach(input=>{

input.value = "";

});

document.getElementById("category")
.value = "";

}

/* LOAD ITEMS */

window.loadItems =
async function(){

const table =
document.getElementById("itemsTable");

table.innerHTML = "";

const search =
document.getElementById("searchInput")
.value
.toLowerCase();

const filterCategory =
document.getElementById("filterCategory")
.value;

const snapshot =
await getDocs(
collection(db,"inventoryMasterlist")
);

let totalItems = 0;
let lowStockCount = 0;

let categories =
new Set();

snapshot.forEach((firebaseDoc)=>{

const item =
firebaseDoc.data();

const docId =
firebaseDoc.id;

if(
search &&
!item.itemName
.toLowerCase()
.includes(search)
){

return;

}

if(
filterCategory &&
item.category !== filterCategory
){

return;

}

totalItems++;

categories.add(item.category);

const isLow =
Number(item.stock)
<=
Number(item.reorderLevel);

if(isLow){

lowStockCount++;

}

table.innerHTML += `

<tr>

<td>${item.itemCode}</td>

<td>${item.itemName}</td>

<td>${item.category}</td>

<td>${item.unit}</td>

<td class="${
isLow
?
'low-stock'
:
'good-stock'
}">

${item.stock}

</td>

<td>${item.reorderLevel}</td>

<td>${item.supplier}</td>

<td>
₱${Number(item.cost)
.toLocaleString()}
</td>

<td>
₱${Number(item.sellingPrice)
.toLocaleString()}
</td>

<td>${item.expiry || "-"}</td>

<td>${item.location}</td>

<td class="${
isLow
?
'low-stock'
:
'good-stock'
}">

${
isLow
?
'LOW STOCK'
:
'GOOD'
}

</td>

<td>

<button class="edit-btn"
onclick="editItem('${docId}')">

Edit

</button>

<button class="delete-btn"
onclick="deleteItem('${docId}')">

Delete

</button>

</td>

</tr>

`;

});

if(totalItems === 0){

table.innerHTML = `

<tr>

<td colspan="13">

No Items Found

</td>

</tr>

`;

}

document.getElementById("totalItems")
.innerText =
totalItems;

document.getElementById("lowStockCount")
.innerText =
lowStockCount;

document.getElementById("categoryCount")
.innerText =
categories.size;

}

/* DELETE */

window.deleteItem =
async function(id){

let confirmDelete =
confirm("Delete this item?");

if(!confirmDelete){

return;

}

await deleteDoc(
doc(db,"inventoryMasterlist",id)
);

alert("Item Deleted");

loadItems();

}

/* EDIT */

window.editItem =
async function(id){

const snapshot =
await getDocs(
collection(db,"inventoryMasterlist")
);

snapshot.forEach(async(firebaseDoc)=>{

if(firebaseDoc.id === id){

const item =
firebaseDoc.data();

document.getElementById("itemCode")
.value =
item.itemCode;

document.getElementById("itemName")
.value =
item.itemName;

document.getElementById("category")
.value =
item.category;

document.getElementById("unit")
.value =
item.unit;

document.getElementById("stock")
.value =
item.stock;

document.getElementById("reorderLevel")
.value =
item.reorderLevel;

document.getElementById("supplier")
.value =
item.supplier;

document.getElementById("cost")
.value =
item.cost;

document.getElementById("sellingPrice")
.value =
item.sellingPrice;

document.getElementById("expiry")
.value =
item.expiry;

document.getElementById("location")
.value =
item.location;

await deleteDoc(
doc(db,"inventoryMasterlist",id)
);

window.scrollTo({
top:0,
behavior:"smooth"
});

}

});

}

/* LOAD */

loadItems();

</script>

</body>
</html>
