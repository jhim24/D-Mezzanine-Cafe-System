<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Stock Out</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f3f4f6;
overflow:hidden;
}

/* LAYOUT */

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#050505;
padding:20px;
overflow-y:auto;
}

.logo-box{
display:flex;
align-items:center;
gap:12px;
margin-bottom:30px;
}

.logo-box img{
width:60px;
height:60px;
border-radius:50%;
background:white;
padding:4px;
border:3px solid #facc15;
}

.logo-text h2{
color:white;
font-size:20px;
}

.logo-text p{
color:#d1d5db;
font-size:13px;
}

.menu{
display:flex;
flex-direction:column;
gap:8px;
}

.menu-title{
color:#facc15;
font-size:13px;
font-weight:700;
margin-top:15px;
margin-bottom:8px;
padding-left:10px;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:14px;
border-radius:14px;
text-decoration:none;
color:white;
font-size:15px;
transition:.3s;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
font-weight:600;
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow-y:auto;
}

/* HEADER */

.header{
background:#0f172a;
padding:25px;
border-radius:20px;
color:white;
margin-bottom:25px;
}

.header h1{
font-size:34px;
margin-bottom:8px;
}

/* FORM */

.form-box{
background:white;
padding:25px;
border-radius:20px;
margin-bottom:25px;
}

.form-title{
font-size:24px;
margin-bottom:20px;
font-weight:700;
}

.form-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.input-group{
display:flex;
flex-direction:column;
}

.input-group label{
margin-bottom:8px;
font-size:14px;
font-weight:600;
}

.input-group input,
.input-group select{
padding:14px;
border:1px solid #d1d5db;
border-radius:12px;
font-size:14px;
outline:none;
}

/* BUTTON */

.save-btn{
margin-top:20px;
background:#ef4444;
color:white;
border:none;
padding:15px 25px;
border-radius:14px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

/* TABLE */

.table-box{
background:white;
padding:20px;
border-radius:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1000px;
}

table th{
background:#0f172a;
color:white;
padding:14px;
font-size:14px;
}

table td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
}

/* MOBILE */

@media(max-width:900px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
}

.main{
padding:15px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Stock Room System</p>

</div>

</div>

<div class="menu">

<p class="menu-title">
INVENTORY
</p>

<a href="stockroom.html">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="items.html">

<i class="fa-solid fa-boxes-stacked"></i>

Items

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>

Stock In

</a>

<a href="stock-out.html"
class="active">

<i class="fa-solid fa-arrow-right-arrow-left"></i>

Stock Out

</a>

<a href="waste.html">

<i class="fa-solid fa-trash"></i>

Waste

</a>

<a href="daily-inventory.html">

<i class="fa-solid fa-clipboard-list"></i>

Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header">

<h1>Stock Out</h1>

<p>
Deduct inventory items used daily
</p>

</div>

<!-- FORM -->

<div class="form-box">

<h2 class="form-title">
Stock Out Entry
</h2>

<div class="form-grid">

<div class="input-group">

<label>Select Item</label>

<select id="itemSelect">

<option value="">
Loading Items...

</option>

</select>

</div>

<div class="input-group">

<label>Quantity Out</label>

<input type="number"
id="stockOutQty"
placeholder="Enter quantity">

</div>

<div class="input-group">

<label>Reason</label>

<select id="stockOutReason">

<option>Kitchen Usage</option>

<option>Production</option>

<option>Transfer</option>

<option>Staff Consumption</option>

<option>Other</option>

</select>

</div>

<div class="input-group">

<label>Date</label>

<input type="date"
id="stockOutDate">

</div>

</div>

<button class="save-btn"
onclick="saveStockOut()">

<i class="fa-solid fa-floppy-disk"></i>

Save Stock Out

</button>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>DATE</th>
<th>ITEM</th>
<th>QUANTITY OUT</th>
<th>REASON</th>

</tr>

</thead>

<tbody id="stockOutTable">

<tr>

<td colspan="4"
style="text-align:center;padding:20px;">

Loading Stock Out...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
doc,
getDoc

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

/* INIT */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* AUTO DATE */

document.getElementById("stockOutDate")
.valueAsDate = new Date();

/* LOAD ITEMS */

async function loadItems(){

const select =
document.getElementById("itemSelect");

select.innerHTML = `
<option value="">
Select Item
</option>
`;

const snapshot =
await getDocs(
collection(db,"inventoryItems")
);

snapshot.forEach((firebaseDoc)=>{

const item =
firebaseDoc.data();

select.innerHTML += `

<option value="${firebaseDoc.id}">

${item.name}
(Current: ${item.stock || 0})

</option>

`;

});

}

/* SAVE STOCK OUT */

window.saveStockOut =
async function(){

const itemId =
document.getElementById("itemSelect").value;

const qty =
Number(
document.getElementById("stockOutQty").value
);

const reason =
document.getElementById("stockOutReason").value;

const date =
document.getElementById("stockOutDate").value;

if(itemId === ""){

alert("Select item");

return;

}

if(qty <= 0){

alert("Enter quantity");

return;

}

try{

/* GET ITEM */

const itemRef =
doc(db,"inventoryItems",itemId);

const itemSnap =
await getDoc(itemRef);

if(!itemSnap.exists()){

alert("Item not found");

return;

}

const itemData =
itemSnap.data();

const currentStock =
Number(itemData.stock || 0);

/* CHECK STOCK */

if(qty > currentStock){

alert("Insufficient stock");

return;

}

/* UPDATE STOCK */

const newStock =
currentStock - qty;

await updateDoc(itemRef,{

stock:newStock

});

/* SAVE LOG */

await addDoc(

collection(db,"stockOut"),

{

itemId:itemId,
itemName:itemData.name,
qty:qty,
reason:reason,
date:date,
createdAt:new Date()

}

);

alert("Stock Out Saved!");

document.getElementById("stockOutQty").value = "";

loadItems();
loadStockOut();

}catch(error){

console.error(error);

alert("Failed to save stock out");

}

}

/* LOAD STOCK OUT */

async function loadStockOut(){

const table =
document.getElementById("stockOutTable");

table.innerHTML = "";

try{

const snapshot =
await getDocs(
collection(db,"stockOut")
);

if(snapshot.empty){

table.innerHTML = `

<tr>

<td colspan="4"
style="text-align:center;padding:20px;">

No Stock Out Records

</td>

</tr>

`;

return;

}

snapshot.forEach((firebaseDoc)=>{

const data =
firebaseDoc.data();

table.innerHTML += `

<tr>

<td>${data.date || "-"}</td>

<td>${data.itemName || "-"}</td>

<td>${data.qty || 0}</td>

<td>${data.reason || "-"}</td>

</tr>

`;

});

}catch(error){

console.error(error);

table.innerHTML = `

<tr>

<td colspan="4"
style="text-align:center;padding:20px;">

Failed to load stock out

</td>

</tr>

`;

}

}

/* LOAD */

loadItems();
loadStockOut();

</script>

</body>
</html>
