<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control"
content="no-cache, no-store, must-revalidate">

<meta http-equiv="Pragma"
content="no-cache">

<meta http-equiv="Expires"
content="0">

<title>D'Mezzanine Stock Out</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:8px;
height:8px;
}

::-webkit-scrollbar-thumb{
background:#facc15;
border-radius:10px;
}

/* LAYOUT */

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#111827;
padding:20px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo-box{
display:flex;
align-items:center;
gap:14px;
margin-bottom:30px;
}

.logo-box img{
width:65px;
height:65px;
border-radius:50%;
background:white;
padding:5px;
border:3px solid #facc15;
object-fit:contain;
}

.logo-text h2{
font-size:20px;
font-weight:700;
}

.logo-text p{
font-size:13px;
color:#d1d5db;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:16px;
border-radius:16px;
text-decoration:none;
color:white;
background:#1e293b;
transition:.3s;
font-size:15px;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
transform:translateX(4px);
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow-y:auto;
}

/* HEADER */

.header-box{
background:#1e293b;
padding:25px;
border-radius:24px;
margin-bottom:25px;
}

.header-box h1{
font-size:38px;
margin-bottom:5px;
}

.header-box p{
color:#cbd5e1;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:22px;
position:relative;
overflow:hidden;
}

.card i{
position:absolute;
top:20px;
right:20px;
font-size:38px;
color:rgba(250,204,21,0.25);
}

.card h3{
font-size:15px;
color:#cbd5e1;
margin-bottom:12px;
}

.card h2{
font-size:38px;
color:#facc15;
}

/* FORM */

.form-box{
background:#1e293b;
padding:25px;
border-radius:24px;

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:15px;

margin-bottom:25px;
}

.form-box input,
.form-box select{
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;
font-size:14px;
}

.form-box input:focus,
.form-box select:focus{
outline:none;
border:1px solid #facc15;
}

.save-btn{
background:#ef4444;
border:none;
padding:14px;
border-radius:12px;
font-weight:700;
cursor:pointer;
color:white;
transition:.3s;
}

.save-btn:hover{
transform:translateY(-3px);
}

/* STOCK PREVIEW */

.stock-preview{
background:#111827;
padding:16px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:700;
color:#facc15;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:24px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1200px;
}

th{
background:#111827;
padding:15px;
color:#facc15;
text-align:left;
white-space:nowrap;
}

td{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.08);
white-space:nowrap;
}

/* MOBILE */

@media(max-width:950px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
}

.menu{
flex-direction:row;
}

.menu a{
min-width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Inventory System</p>

</div>

</div>

<div class="menu">

<a href="index.html">

<i class="fa-solid fa-chart-line"></i>
Dashboard

</a>

<a href="items-masterlist.html">

<i class="fa-solid fa-box"></i>
Items Masterlist

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>
Stock In

</a>

<a href="stock-out.html"
class="active">

<i class="fa-solid fa-arrow-right-arrow-left"></i>
Stock Out

</a>

<a href="waste.html">

<i class="fa-solid fa-trash"></i>
Waste

</a>

<a href="daily-inventory.html">

<i class="fa-solid fa-clipboard-list"></i>
Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header-box">

<h1>Stock Out 📤</h1>

<p id="dateTime"></p>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">

<i class="fa-solid fa-arrow-right-arrow-left"></i>

<h3>Total Stock Out</h3>

<h2 id="totalOut">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-box"></i>

<h3>Items Released</h3>

<h2 id="releasedItems">0</h2>

</div>

</div>

<!-- FORM -->

<div class="form-box">

<input type="date"
id="date">

<select id="itemSelect">

<option value="">
Select Item
</option>

</select>

<div class="stock-preview"
id="currentStock">

Current Stock: 0

</div>

<input type="number"
id="quantity"
placeholder="Quantity">

<input type="text"
id="releasedTo"
placeholder="Released To">

<input type="text"
id="remarks"
placeholder="Remarks">

<button class="save-btn"
onclick="saveStockOut()">

<i class="fa-solid fa-floppy-disk"></i>
Save Stock Out

</button>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Date</th>
<th>Item</th>
<th>Quantity</th>
<th>Released To</th>
<th>Remarks</th>

</tr>

</thead>

<tbody id="stockOutTable">

<tr>

<td colspan="5">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
onSnapshot,
doc,
updateDoc,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* DATE TIME */

function updateDateTime(){

document.getElementById("dateTime")
.innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();

/* LOAD ITEMS */

let itemsMap = {};

async function loadItems(){

const select =
document.getElementById("itemSelect");

select.innerHTML = `

<option value="">
Select Item
</option>

`;

const snapshot =
await getDocs(
collection(db,"inventoryMasterlist")
);

snapshot.forEach((firebaseDoc)=>{

const item =
firebaseDoc.data();

itemsMap[firebaseDoc.id] = {

id:firebaseDoc.id,
...item

};

select.innerHTML += `

<option value="${firebaseDoc.id}">

${item.itemName}

</option>

`;

});

}

/* SHOW STOCK */

document
.getElementById("itemSelect")
.addEventListener(
"change",
function(){

const itemId =
this.value;

if(!itemId){

document.getElementById("currentStock")
.innerText =
"Current Stock: 0";

return;

}

const item =
itemsMap[itemId];

document.getElementById("currentStock")
.innerText =

"Current Stock: " +
(item.stock || 0);

}
);

/* SAVE STOCK OUT */

window.saveStockOut =
async function(){

try{

const date =
document.getElementById("date").value;

const itemId =
document.getElementById("itemSelect").value;

const quantity =
Number(
document.getElementById("quantity").value
);

const releasedTo =
document.getElementById("releasedTo").value;

const remarks =
document.getElementById("remarks").value;

if(
!date ||
!itemId ||
!quantity
){

alert("Complete all fields");

return;

}

const selectedItem =
itemsMap[itemId];

if(!selectedItem){

alert("Item not found");

return;

}

const currentStock =
Number(selectedItem.stock || 0);

if(quantity > currentStock){

alert("Insufficient stock");

return;

}

const newStock =
currentStock - quantity;

/* SAVE STOCK OUT */

await addDoc(
collection(db,"stockOut"),
{

date,
itemId,

itemName:
selectedItem.itemName,

quantity,
releasedTo,
remarks,

createdAt:
new Date()

}
);

/* UPDATE STOCK */

await updateDoc(

doc(
db,
"inventoryMasterlist",
itemId
),

{

stock:newStock

}

);

alert("Stock Out Saved");

/* CLEAR */

document.getElementById("quantity")
.value = "";

document.getElementById("releasedTo")
.value = "";

document.getElementById("remarks")
.value = "";

document.getElementById("currentStock")
.innerText =
"Current Stock: " +
newStock;

/* RELOAD */

loadItems();

}catch(error){

console.error(error);

alert(error.message);

}

}

/* LOAD STOCK OUT */

function loadStockOut(){

const table =
document.getElementById("stockOutTable");

onSnapshot(

collection(db,"stockOut"),

(snapshot)=>{

table.innerHTML = "";

let totalOut = 0;
let releasedItems = 0;

snapshot.forEach((firebaseDoc)=>{

const data =
firebaseDoc.data();

totalOut +=
Number(data.quantity || 0);

releasedItems++;

table.innerHTML += `

<tr>

<td>${data.date}</td>

<td>${data.itemName}</td>

<td>${data.quantity}</td>

<td>${data.releasedTo}</td>

<td>${data.remarks}</td>

</tr>

`;

});

if(releasedItems === 0){

table.innerHTML = `

<tr>

<td colspan="5">

No Stock Out Records

</td>

</tr>

`;

}

document.getElementById("totalOut")
.innerText =
totalOut;

document.getElementById("releasedItems")
.innerText =
releasedItems;

}

);

}

/* LOAD */

loadItems();
loadStockOut();

</script>

</body>
</html>
