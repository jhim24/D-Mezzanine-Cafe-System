<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control"
content="no-cache, no-store, must-revalidate">

<meta http-equiv="Pragma"
content="no-cache">

<meta http-equiv="Expires"
content="0">

<title>D'Mezzanine Suppliers</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#d8ecec;
color:#111827;
overflow:hidden;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:8px;
height:8px;
}

::-webkit-scrollbar-thumb{
background:#0f766e;
border-radius:10px;
}

/* LAYOUT */

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#0f172a;
padding:20px;
overflow-y:auto;
border-right:3px solid #134e4a;
}

.logo-box{
display:flex;
align-items:center;
gap:14px;
margin-bottom:30px;
}

.logo-box img{
width:70px;
height:70px;
border-radius:50%;
background:white;
padding:5px;
border:3px solid #facc15;
object-fit:contain;
}

.logo-text h2{
font-size:24px;
font-weight:700;
color:white;
}

.logo-text p{
font-size:13px;
color:#cbd5e1;
margin-top:3px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-title{
font-size:13px;
font-weight:700;
color:#facc15;
margin-top:18px;
margin-bottom:5px;
padding-left:5px;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:16px;
border-radius:14px;
text-decoration:none;
color:white;
font-size:15px;
font-weight:500;
transition:.3s;
background:#1e293b;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
transform:translateX(4px);
}

/* MAIN */

.main{
flex:1;
padding:20px;
overflow-y:auto;
}

/* HEADER */

.header-box{
background:#b8dede;
padding:20px;
border:2px solid #6b9e9e;
margin-bottom:18px;
}

.header-box h1{
font-size:32px;
font-weight:700;
}

.header-box p{
margin-top:5px;
font-size:14px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#c7e4e4;
border:2px solid #7aa6a6;
padding:20px;
position:relative;
}

.card i{
position:absolute;
top:15px;
right:15px;
font-size:34px;
color:#134e4a;
}

.card h3{
font-size:15px;
margin-bottom:10px;
}

.card h2{
font-size:38px;
color:#0f172a;
}

/* FORM */

.form-box{
background:#c7e4e4;
border:2px solid #7aa6a6;
padding:20px;
margin-bottom:18px;

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:12px;
}

.form-box input,
.form-box textarea,
.form-box select{
padding:12px;
border:1px solid #7aa6a6;
background:white;
font-size:14px;
resize:none;
}

.form-box input:focus,
.form-box textarea:focus,
.form-box select:focus{
outline:none;
border:2px solid #0f766e;
}

/* BUTTONS */

.save-btn{
background:#0f766e;
border:none;
padding:13px;
color:white;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.save-btn:hover{
background:#115e59;
}

.edit-btn{
background:#2563eb;
border:none;
padding:8px 12px;
color:white;
cursor:pointer;
margin-right:5px;
font-size:13px;
}

.delete-btn{
background:#dc2626;
border:none;
padding:8px 12px;
color:white;
cursor:pointer;
font-size:13px;
}

/* FILTERS */

.filters{
display:flex;
gap:12px;
margin-bottom:18px;
flex-wrap:wrap;
}

.filters input{
padding:12px;
border:1px solid #7aa6a6;
background:white;
min-width:250px;
}

/* TABLE */

.table-box{
background:#c7e4e4;
border:2px solid #7aa6a6;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1800px;
background:white;
}

th{
background:#374151;
padding:7px 10px;
border:1px solid #111827;
font-size:13px;
font-weight:700;
text-align:left;
color:white;
}

td{
padding:5px 10px;
border:1px solid #4b5563;
font-size:13px;
font-weight:700;
background:#d1d5db;
color:#000;
line-height:1.1;
}

/* STATUS */

.active-status{
color:#15803d;
font-weight:700;
}

.inactive-status{
color:#dc2626;
font-weight:700;
}

/* MOBILE */

@media(max-width:950px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
}

.menu{
flex-direction:row;
}

.menu a{
min-width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Purchase System</p>

</div>

</div>

<div class="menu">

<div class="menu-title">
MAIN
</div>

<a href="index.html">

<i class="fa-solid fa-chart-line"></i>
Dashboard

</a>

<div class="menu-title">
PURCHASES
</div>

<a href="suppliers.html"
class="active">

<i class="fa-solid fa-truck-field"></i>
Suppliers

</a>

<div class="menu-title">
INVENTORY
</div>

<a href="categories.html">

<i class="fa-solid fa-layer-group"></i>
Categories

</a>

<a href="items-masterlist.html">

<i class="fa-solid fa-box"></i>
Items Masterlist

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>
Stock In

</a>

<a href="stock-out.html">

<i class="fa-solid fa-arrow-right-arrow-left"></i>
Stock Out

</a>

<a href="waste.html">

<i class="fa-solid fa-trash"></i>
Waste

</a>

<a href="daily-inventory.html">

<i class="fa-solid fa-clipboard-list"></i>
Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header-box">

<h1>Suppliers Management 🚚</h1>

<p id="dateTime"></p>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">

<i class="fa-solid fa-truck-field"></i>

<h3>Total Suppliers</h3>

<h2 id="totalSuppliers">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-circle-check"></i>

<h3>Active Suppliers</h3>

<h2 id="activeSuppliers">0</h2>

</div>

</div>

<!-- FORM -->

<div class="form-box">

<input type="text"
id="supplierCode"
placeholder="Supplier Code">

<input type="text"
id="supplierName"
placeholder="Supplier Name">

<input type="text"
id="contactPerson"
placeholder="Contact Person">

<input type="text"
id="phone"
placeholder="Phone Number">

<input type="email"
id="email"
placeholder="Email Address">

<textarea
id="address"
placeholder="Address"></textarea>

<select id="paymentTerms">

<option value="">
Payment Terms
</option>

<option>Cash</option>
<option>7 Days</option>
<option>15 Days</option>
<option>30 Days</option>
<option>60 Days</option>

</select>

<select id="status">

<option value="">
Status
</option>

<option value="Active">
Active
</option>

<option value="Inactive">
Inactive
</option>

</select>

<button class="save-btn"
onclick="saveSupplier()">

<i class="fa-solid fa-floppy-disk"></i>
Save Supplier

</button>

</div>

<!-- FILTER -->

<div class="filters">

<input type="text"
id="searchInput"
placeholder="Search Supplier..."
onkeyup="loadSuppliers()">

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Code</th>
<th>Supplier Name</th>
<th>Contact Person</th>
<th>Phone</th>
<th>Email</th>
<th>Address</th>
<th>Terms</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="suppliersTable">

<tr>

<td colspan="9">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
deleteDoc,
doc,
updateDoc,
getDoc,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let editId = null;

/* DATE TIME */

function updateDateTime(){

document.getElementById("dateTime")
.innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();

/* SAVE SUPPLIER */

window.saveSupplier =
async function(){

try{

const supplierCode =
document.getElementById("supplierCode").value.trim();

const supplierName =
document.getElementById("supplierName").value.trim();

const contactPerson =
document.getElementById("contactPerson").value.trim();

const phone =
document.getElementById("phone").value.trim();

const email =
document.getElementById("email").value.trim();

const address =
document.getElementById("address").value.trim();

const paymentTerms =
document.getElementById("paymentTerms").value;

const status =
document.getElementById("status").value;

if(
!supplierCode ||
!supplierName ||
!phone ||
!status
){

alert("Complete required fields");

return;

}

const supplierData = {

supplierCode,
supplierName,
contactPerson,
phone,
email,
address,
paymentTerms,
status,

createdAt:
new Date()

};

if(editId){

await updateDoc(
doc(db,"suppliers",editId),
supplierData
);

alert("Supplier Updated");

editId = null;

}else{

await addDoc(
collection(db,"suppliers"),
supplierData
);

alert("Supplier Saved");

}

clearForm();

}catch(error){

console.error(error);

alert(error.message);

}

}

/* CLEAR FORM */

function clearForm(){

document.querySelectorAll(
".form-box input,.form-box textarea"
).forEach(input=>{

input.value = "";

});

document.getElementById("paymentTerms")
.value = "";

document.getElementById("status")
.value = "";

}

/* LOAD SUPPLIERS */

window.loadSuppliers =
function(){

const table =
document.getElementById("suppliersTable");

const search =
document.getElementById("searchInput")
.value
.toLowerCase();

onSnapshot(

collection(db,"suppliers"),

(snapshot)=>{

table.innerHTML = "";

let totalSuppliers = 0;
let activeSuppliers = 0;

snapshot.forEach((firebaseDoc)=>{

const supplier =
firebaseDoc.data();

const docId =
firebaseDoc.id;

if(
search &&
!supplier.supplierName
.toLowerCase()
.includes(search)
){

return;

}

totalSuppliers++;

if(supplier.status === "Active"){

activeSuppliers++;

}

table.innerHTML += `

<tr>

<td>${supplier.supplierCode}</td>

<td>${supplier.supplierName}</td>

<td>${supplier.contactPerson || "-"}</td>

<td>${supplier.phone}</td>

<td>${supplier.email || "-"}</td>

<td>${supplier.address || "-"}</td>

<td>${supplier.paymentTerms || "-"}</td>

<td class="${
supplier.status === "Active"
?
"active-status"
:
"inactive-status"
}">

${supplier.status}

</td>

<td>

<button class="edit-btn"
onclick="editSupplier('${docId}')">

Edit

</button>

<button class="delete-btn"
onclick="deleteSupplier('${docId}')">

Delete

</button>

</td>

</tr>

`;

});

if(totalSuppliers === 0){

table.innerHTML = `

<tr>

<td colspan="9">

No Suppliers Found

</td>

</tr>

`;

}

document.getElementById("totalSuppliers")
.innerText =
totalSuppliers;

document.getElementById("activeSuppliers")
.innerText =
activeSuppliers;

}

);

}

/* EDIT */

window.editSupplier =
async function(id){

const supplierRef =
doc(db,"suppliers",id);

const supplierSnap =
await getDoc(supplierRef);

if(supplierSnap.exists()){

const supplier =
supplierSnap.data();

editId = id;

document.getElementById("supplierCode")
.value = supplier.supplierCode || "";

document.getElementById("supplierName")
.value = supplier.supplierName || "";

document.getElementById("contactPerson")
.value = supplier.contactPerson || "";

document.getElementById("phone")
.value = supplier.phone || "";

document.getElementById("email")
.value = supplier.email || "";

document.getElementById("address")
.value = supplier.address || "";

document.getElementById("paymentTerms")
.value = supplier.paymentTerms || "";

document.getElementById("status")
.value = supplier.status || "";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

}

/* DELETE */

window.deleteSupplier =
async function(id){

const confirmDelete =
confirm("Delete this supplier?");

if(!confirmDelete){

return;

}

await deleteDoc(
doc(db,"suppliers",id)
);

alert("Supplier Deleted");

}

/* LOAD */

loadSuppliers();

</script>

</body>
</html>
