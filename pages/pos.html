<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Cafe POS</title>

<link rel="stylesheet"
href="../style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

.pos-container{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
}

/* SEARCH */

.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#1f1f1f;
    color:white;
    font-size:16px;
}

/* PRODUCTS */

.products{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

    gap:20px;
}

.product-card{
    background:#1b1b1b;
    border:1px solid #2d2d2d;
    border-radius:24px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.product-card:hover{
    transform:translateY(-5px);
    border-color:#f5b041;
}

.product-card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

.product-info{
    padding:15px;
}

.product-info h3{
    margin-bottom:10px;
}

.product-info p{
    color:#f5b041;
    font-size:20px;
    font-weight:bold;
}

/* CART */

.cart{
    background:#1b1b1b;
    border:1px solid #2d2d2d;
    border-radius:24px;
    padding:20px;
    height:fit-content;
}

.cart h2{
    margin-bottom:20px;
}

.cart-items{
    margin-bottom:20px;
}

.cart-item{
    border-bottom:1px solid #333;
    padding-bottom:15px;
    margin-bottom:15px;
}

.item-top{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.qty-controls{
    display:flex;
    align-items:center;
    gap:10px;
}

.qty-btn{
    width:30px;
    height:30px;
    border:none;
    border-radius:8px;
    background:#f5b041;
    cursor:pointer;
    font-weight:bold;
}

.remove-btn{
    border:none;
    background:red;
    color:white;
    padding:5px 10px;
    border-radius:8px;
    cursor:pointer;
}

.total{
    font-size:30px;
    font-weight:bold;
    color:#f5b041;
    margin-bottom:20px;
}

.checkout-btn{
    width:100%;
    border:none;
    background:#f5b041;
    color:black;
    padding:15px;
    border-radius:14px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:10px;
}

.print-btn{
    width:100%;
    border:none;
    background:white;
    color:black;
    padding:15px;
    border-radius:14px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

@media(max-width:900px){

    .pos-container{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-mug-hot"></i>

        Cafe System

    </div>

</div>

<div class="main">

    <div class="topbar">

        <h1>Cafe POS</h1>

    </div>

    <div class="search-box">

        <input type="text"
        id="searchInput"
        placeholder="Search coffee...">

    </div>

    <div class="pos-container">

        <!-- PRODUCTS -->

        <div class="products"
        id="products">

        </div>

        <!-- CART -->

        <div class="cart">

            <h2>Order Summary</h2>

            <div class="cart-items"
            id="cartItems">

            </div>

            <div class="total"
            id="total">

                ₱0

            </div>

            <button class="checkout-btn"
            onclick="checkout()">

                <i class="fa-solid fa-credit-card"></i>

                Checkout

            </button>

            <button class="print-btn"
            onclick="window.print()">

                <i class="fa-solid fa-print"></i>

                Print Receipt

            </button>

        </div>

    </div>

</div>

<script>

const products = [

    {
        name:'Cappuccino',
        price:180,
        image:'https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=800'
    },

    {
        name:'Latte',
        price:190,
        image:'https://images.unsplash.com/photo-1517701604599-bb29b565090c?q=80&w=800'
    },

    {
        name:'Espresso',
        price:150,
        image:'https://images.unsplash.com/photo-1511920170033-f8396924c348?q=80&w=800'
    },

    {
        name:'Mocha',
        price:210,
        image:'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=800'
    }

];

let cart = [];

const productsContainer =
document.getElementById('products');

function renderProducts(filter=''){

    productsContainer.innerHTML='';

    products
    .filter(product=>

        product.name
        .toLowerCase()
        .includes(filter.toLowerCase())

    )

    .forEach(product=>{

        productsContainer.innerHTML += `

        <div class="product-card"
        onclick="addToCart('${product.name}',${product.price})">

            <img src="${product.image}">

            <div class="product-info">

                <h3>${product.name}</h3>

                <p>₱${product.price}</p>

            </div>

        </div>

        `;

    });

}

renderProducts();

document
.getElementById('searchInput')

.addEventListener('input',(e)=>{

    renderProducts(e.target.value);

});

function addToCart(name,price){

    const existing =
    cart.find(item=>item.name===name);

    if(existing){

        existing.qty++;

    }else{

        cart.push({
            name,
            price,
            qty:1
        });

    }

    renderCart();

}

function renderCart(){

    const cartItems =
    document.getElementById('cartItems');

    const total =
    document.getElementById('total');

    cartItems.innerHTML='';

    let grandTotal = 0;

    cart.forEach((item,index)=>{

        grandTotal +=
        item.price * item.qty;

        cartItems.innerHTML += `

        <div class="cart-item">

            <div class="item-top">

                <strong>${item.name}</strong>

                <button class="remove-btn"
                onclick="removeItem(${index})">

                    X

                </button>

            </div>

            <div class="qty-controls">

                <button class="qty-btn"
                onclick="decreaseQty(${index})">

                    -

                </button>

                <span>${item.qty}</span>

                <button class="qty-btn"
                onclick="increaseQty(${index})">

                    +

                </button>

                <span>
                    ₱${item.price * item.qty}
                </span>

            </div>

        </div>

        `;

    });

    total.innerHTML =
    `₱${grandTotal}`;

}

function increaseQty(index){

    cart[index].qty++;

    renderCart();

}

function decreaseQty(index){

    if(cart[index].qty > 1){

        cart[index].qty--;

    }else{

        cart.splice(index,1);

    }

    renderCart();

}

function removeItem(index){

    cart.splice(index,1);

    renderCart();

}

function checkout(){

    if(cart.length===0){

        alert('Cart is empty');

        return;

    }

    const sales =
    JSON.parse(
        localStorage.getItem('sales')
    ) || [];

    sales.push({

        date:new Date(),

        items:cart

    });

    localStorage
    .setItem(
        'sales',
        JSON.stringify(sales)
    );

    alert('Order Successful');

    cart = [];

    renderCart();

}

</script>

</body>
</html>
