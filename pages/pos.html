<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Cafe POS</title>

<link rel="stylesheet"
href="../style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

.pos-container{
    display:grid;

    grid-template-columns:
    2fr 1fr;

    gap:20px;
}

/* PRODUCTS */

.products{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

    gap:20px;
}

.product-card{

    background:#1b1b1b;

    border:1px solid #2d2d2d;

    border-radius:22px;

    overflow:hidden;

    cursor:pointer;

    transition:.3s;
}

.product-card:hover{

    transform:translateY(-5px);

    border-color:#f5b041;

}

.product-card img{

    width:100%;
    height:160px;

    object-fit:cover;
}

.product-info{

    padding:15px;
}

.product-info h3{

    margin-bottom:10px;
}

.product-info p{

    color:#f5b041;

    font-size:20px;

    font-weight:bold;
}

/* CART */

.cart{

    background:#1b1b1b;

    border:1px solid #2d2d2d;

    border-radius:24px;

    padding:20px;

    height:fit-content;
}

.cart h2{

    margin-bottom:20px;
}

.cart-items{

    margin-bottom:20px;
}

.cart-item{

    display:flex;

    justify-content:space-between;

    margin-bottom:15px;

    padding-bottom:10px;

    border-bottom:1px solid #333;
}

.total{

    font-size:28px;

    font-weight:bold;

    color:#f5b041;

    margin-bottom:20px;
}

.checkout-btn{

    width:100%;

    border:none;

    background:#f5b041;

    color:black;

    padding:15px;

    border-radius:14px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;
}

@media(max-width:900px){

    .pos-container{

        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-mug-hot"></i>

        Cafe System

    </div>

    <ul>

        <li>
            <a href="../index.html">

                <i class="fa-solid fa-chart-line"></i>

                Dashboard

            </a>
        </li>

        <li>
            <a href="pos.html">

                <i class="fa-solid fa-cash-register"></i>

                POS

            </a>
        </li>

    </ul>

</div>

<div class="main">

    <div class="topbar">

        <h1>Cafe POS</h1>

    </div>

    <div class="pos-container">

        <!-- PRODUCTS -->

        <div class="products">

            <div class="product-card"
            onclick="addToCart('Cappuccino',180)">

                <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=800">

                <div class="product-info">

                    <h3>Cappuccino</h3>

                    <p>₱180</p>

                </div>

            </div>

            <div class="product-card"
            onclick="addToCart('Latte',190)">

                <img src="https://images.unsplash.com/photo-1517701604599-bb29b565090c?q=80&w=800">

                <div class="product-info">

                    <h3>Latte</h3>

                    <p>₱190</p>

                </div>

            </div>

            <div class="product-card"
            onclick="addToCart('Espresso',150)">

                <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?q=80&w=800">

                <div class="product-info">

                    <h3>Espresso</h3>

                    <p>₱150</p>

                </div>

            </div>

            <div class="product-card"
            onclick="addToCart('Mocha',210)">

                <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=800">

                <div class="product-info">

                    <h3>Mocha</h3>

                    <p>₱210</p>

                </div>

            </div>

        </div>

        <!-- CART -->

        <div class="cart">

            <h2>Order Summary</h2>

            <div class="cart-items"
            id="cartItems">

            </div>

            <div class="total"
            id="total">

                ₱0

            </div>

            <button class="checkout-btn">

                <i class="fa-solid fa-credit-card"></i>

                Checkout

            </button>

        </div>

    </div>

</div>

<script>

let cart = [];

function addToCart(name,price){

    cart.push({
        name,
        price
    });

    renderCart();

}

function renderCart(){

    const cartItems =
    document.getElementById('cartItems');

    const total =
    document.getElementById('total');

    cartItems.innerHTML = '';

    let grandTotal = 0;

    cart.forEach(item=>{

        grandTotal += item.price;

        cartItems.innerHTML += `

            <div class="cart-item">

                <span>${item.name}</span>

                <span>₱${item.price}</span>

            </div>

        `;

    });

    total.innerHTML =
    `₱${grandTotal}`;

}

</script>

</body>
</html>
