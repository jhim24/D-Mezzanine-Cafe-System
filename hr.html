<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.topbar h1{
font-size:30px;
}

.back-btn{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
background:#facc15;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:600;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
}

.card h3{
color:#cbd5e1;
margin-bottom:10px;
}

.card h2{
color:#facc15;
font-size:30px;
}

.form-box,
.table-box{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:25px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.form-grid input,
.form-grid select{
padding:14px;
border:none;
border-radius:12px;
background:#0f172a;
color:white;
}

.add-btn{
margin-top:20px;
border:none;
padding:14px 20px;
border-radius:12px;
background:#22c55e;
color:white;
font-weight:700;
cursor:pointer;
}

.refresh-btn{
margin-top:20px;
margin-left:10px;
border:none;
padding:14px 20px;
border-radius:12px;
background:#facc15;
color:black;
font-weight:700;
cursor:pointer;
}

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#0f172a;
color:white;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#111827;
color:#facc15;
padding:15px;
text-align:left;
white-space:nowrap;
}

table td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.profile-img{
width:60px;
height:60px;
object-fit:cover;
border-radius:50%;
}

.status-active{
background:#22c55e;
padding:6px 12px;
border-radius:30px;
font-size:12px;
font-weight:600;
}

.status-leave{
background:#f59e0b;
padding:6px 12px;
border-radius:30px;
font-size:12px;
font-weight:600;
}

.delete-btn{
background:#ef4444;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

@media(max-width:700px){

table{
font-size:12px;
}

.card h2{
font-size:24px;
}

}

</style>

</head>

<body>

<a href="index.html" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
Dashboard
</a>

<div class="topbar">

<h1>HR Management 👨‍💼</h1>

<h2 id="todayDate"></h2>

</div>

<div class="cards">

<div class="card">

<h3>Total Employees</h3>

<h2 id="totalEmployees">0</h2>

</div>

<div class="card">

<h3>Active Employees</h3>

<h2 id="activeEmployees">0</h2>

</div>

</div>

<div class="form-box">

<h2 style="margin-bottom:20px;">
Add Employee
</h2>

<div class="form-grid">

<input type="text"
id="employeeName"
placeholder="Employee Name">

<input type="text"
id="employeePosition"
placeholder="Position">

<input type="number"
id="employeeSalary"
placeholder="Salary">

<input type="text"
id="employeePhone"
placeholder="Phone Number">

<input type="text"
id="employeeImage"
placeholder="Profile Image URL">

<select id="employeeStatus">
<option value="Active">Active</option>
<option value="On Leave">On Leave</option>
</select>

</div>

<button class="add-btn"
onclick="saveEmployee()">

<i class="fa-solid fa-plus"></i>
Add Employee

</button>

<button class="refresh-btn"
onclick="loadEmployees()">

<i class="fa-solid fa-rotate-right"></i>
Refresh

</button>

</div>

<div class="table-box">

<div class="search-box">

<input type="text"
id="searchInput"
placeholder="Search employee..."
onkeyup="searchEmployee()">

</div>

<table>

<thead>

<tr>

<th>Photo</th>
<th>Name</th>
<th>Position</th>
<th>Salary</th>
<th>Phone</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="employeeTable">

<tr>
<td colspan="7"
style="text-align:center;padding:30px;">
Loading employees...
</td>
</tr>

</tbody>

</table>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3",

measurementId: "G-1X8L2KQDYF"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

document.getElementById("todayDate").innerText =
new Date().toLocaleDateString();

window.saveEmployee = async function(){

const name = employeeName.value;
const position = employeePosition.value;
const salary = parseFloat(employeeSalary.value);
const phone = employeePhone.value;
const image = employeeImage.value;
const status = employeeStatus.value;

if(!name || !position || !salary || !phone || !image){

alert("Please complete all fields");
return;

}

try{

await addDoc(collection(db,"employees"),{

name:name,
position:position,
salary:salary,
phone:phone,
image:image,
status:status

});

alert("Employee Added!");

employeeName.value = "";
employeePosition.value = "";
employeeSalary.value = "";
employeePhone.value = "";
employeeImage.value = "";

loadEmployees();

}catch(error){

console.log(error);
alert("Failed to save employee");

}

}

window.deleteEmployee = async function(id){

let confirmDelete =
confirm("Delete this employee?");

if(!confirmDelete) return;

try{

await deleteDoc(doc(db,"employees",id));

alert("Employee Deleted!");

loadEmployees();

}catch(error){

console.log(error);
alert("Delete failed");

}

}

window.loadEmployees = async function(){

const employeeTable =
document.getElementById("employeeTable");

employeeTable.innerHTML = "";

let totalEmployees = 0;
let activeEmployees = 0;

const snapshot =
await getDocs(collection(db,"employees"));

if(snapshot.empty){

employeeTable.innerHTML = `
<tr>
<td colspan="7"
style="text-align:center;padding:30px;">
No employees found
</td>
</tr>
`;

return;

}

snapshot.forEach((employee)=>{

const data = employee.data();

totalEmployees++;

let statusBadge =
`<span class="status-leave">On Leave</span>`;

if(data.status === "Active"){

activeEmployees++;

statusBadge =
`<span class="status-active">Active</span>`;

}

employeeTable.innerHTML += `

<tr>

<td>
<img src="${data.image}"
class="profile-img">
</td>

<td>${data.name}</td>

<td>${data.position}</td>

<td>₱${data.salary}</td>

<td>${data.phone}</td>

<td>${statusBadge}</td>

<td>

<button class="delete-btn"
onclick="deleteEmployee('${employee.id}')">
Delete
</button>

</td>

</tr>

`;

});


document.getElementById("totalEmployees").innerText =
totalEmployees;


document.getElementById("activeEmployees").innerText =
activeEmployees;

}

window.searchEmployee = function(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

let rows =
document.querySelectorAll("#employeeTable tr");

rows.forEach(row=>{

let text = row.innerText.toLowerCase();

if(text.includes(input)){

row.style.display = "";

}else{

row.style.display = "none";

}

});

}

loadEmployees();

</script>

</body>
</html>
