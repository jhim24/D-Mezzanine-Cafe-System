<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Product Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:15px;
}

.topbar h1{
font-size:30px;
}

.back-btn{
text-decoration:none;
background:#facc15;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:600;
}

.card{
background:#1e293b;
padding:20px;
border-radius:18px;
margin-bottom:20px;
}

.card h2{
margin-bottom:20px;
color:#facc15;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.grid input,
.grid select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
}

.btn-group{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.save-btn{
background:#22c55e;
color:white;
}

.refresh-btn{
background:#2563eb;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
padding:7px 10px;
border:none;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:#111827;
border-radius:15px;
overflow:hidden;
}

table th{
background:#0f172a;
padding:12px;
color:#facc15;
text-align:left;
font-size:13px;
}

table td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.08);
font-size:13px;
}

.product-img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
}

.low-stock{
color:#ef4444;
font-weight:700;
}

.in-stock{
color:#22c55e;
font-weight:700;
}

</style>

</head>

<body>

<div class="topbar">

<h1>Product Management</h1>

<a href="index.html"
class="back-btn">

<i class="fa-solid fa-arrow-left"></i>
Dashboard

</a>

</div>

<!-- CATEGORY -->

<div class="card">

<h2>Product Categories</h2>

<div class="grid">

<input type="text"
id="categoryName"
placeholder="Category Name">

</div>

<div class="btn-group">

<button class="btn save-btn"
onclick="saveCategory()">

Save Category

</button>

<button class="btn refresh-btn"
onclick="loadCategories()">

Refresh

</button>

</div>

<table>

<thead>

<tr>

<th>Category Name</th>
<th>Action</th>

</tr>

</thead>

<tbody id="categoryTable">

<tr>

<td colspan="2">

No Categories Yet

</td>

</tr>

</tbody>

</table>

</div>

<!-- PRODUCTS -->

<div class="card">

<h2>Products</h2>

<div class="grid">

<input type="text"
id="productName"
placeholder="Product Name">

<select id="productCategory">

<option>Select Category</option>

</select>

<input type="number"
id="productPrice"
placeholder="Price">

<input type="number"
id="productStock"
placeholder="Stock">

<input type="text"
id="productImage"
placeholder="Image URL">

</div>

<div class="btn-group">

<button class="btn save-btn"
onclick="saveProduct()">

Save Product

</button>

<button class="btn refresh-btn"
onclick="loadProducts()">

Refresh

</button>

</div>

<table>

<thead>

<tr>

<th>Image</th>
<th>Product</th>
<th>Category</th>
<th>Price</th>
<th>Stock</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="productTable">

<tr>

<td colspan="7">

No Products Yet

</td>

</tr>

</tbody>

</table>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.saveCategory =
async function(){

const categoryName =
document.getElementById("categoryName").value;

if(!categoryName){

alert("Enter Category");

return;

}

await addDoc(
collection(db,"categories"),
{
name:categoryName
}
);

alert("Category Saved");

document.getElementById("categoryName").value = "";

loadCategories();

}

window.loadCategories =
async function(){

const snapshot =
await getDocs(
collection(db,"categories")
);

const table =
document.getElementById("categoryTable");

const dropdown =
document.getElementById("productCategory");

table.innerHTML = "";

dropdown.innerHTML =
"<option>Select Category</option>";

if(snapshot.empty){

table.innerHTML = `

<tr>
<td colspan="2">
No Categories Yet
</td>
</tr>

`;

}

snapshot.forEach((d)=>{

const data = d.data();

table.innerHTML += `

<tr>

<td>${data.name}</td>

<td>

<button class="delete-btn"
onclick="deleteCategory('${d.id}')">

Delete

</button>

</td>

</tr>

`;

dropdown.innerHTML += `

<option value="${data.name}">

${data.name}

</option>

`;

});

}

window.deleteCategory =
async function(id){

await deleteDoc(
doc(db,"categories",id)
);

loadCategories();

}

window.saveProduct =
async function(){

const productName =
document.getElementById("productName").value;

const productCategory =
document.getElementById("productCategory").value;

const productPrice =
document.getElementById("productPrice").value;

const productStock =
document.getElementById("productStock").value;

const productImage =
document.getElementById("productImage").value;

await addDoc(
collection(db,"products"),
{

name:productName,
category:productCategory,
price:Number(productPrice),
stock:Number(productStock),
image:productImage

}
);

alert("Product Saved");

document.getElementById("productName").value = "";
document.getElementById("productPrice").value = "";
document.getElementById("productStock").value = "";
document.getElementById("productImage").value = "";

loadProducts();

}

window.loadProducts =
async function(){

const snapshot =
await getDocs(
collection(db,"products")
);

const table =
document.getElementById("productTable");

table.innerHTML = "";

if(snapshot.empty){

table.innerHTML = `

<tr>
<td colspan="7">
No Products Yet
</td>
</tr>

`;

}

snapshot.forEach((d)=>{

const data = d.data();

let status =
data.stock <= 5
? "<span class='low-stock'>LOW STOCK</span>"
: "<span class='in-stock'>IN STOCK</span>";

table.innerHTML += `

<tr>

<td>

<img src="${data.image}"
class="product-img">

</td>

<td>${data.name}</td>

<td>${data.category}</td>

<td>₱${data.price}</td>

<td>${data.stock}</td>

<td>${status}</td>

<td>

<button class="delete-btn"
onclick="deleteProduct('${d.id}')">

Delete

</button>

</td>

</tr>

`;

});

}

window.deleteProduct =
async function(id){

await deleteDoc(
doc(db,"products",id)
);

loadProducts();

}

loadCategories();
loadProducts();

</script>

</body>
</html>
