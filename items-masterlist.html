<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control"
content="no-cache, no-store, must-revalidate">

<meta http-equiv="Pragma"
content="no-cache">

<meta http-equiv="Expires"
content="0">

<title>D'Mezzanine Items Masterlist</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#d8ecec;
color:#111827;
overflow:hidden;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:8px;
height:8px;
}

::-webkit-scrollbar-thumb{
background:#0f766e;
border-radius:10px;
}

/* LAYOUT */

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#0f172a;
padding:20px;
overflow-y:auto;
border-right:3px solid #134e4a;
}

.logo-box{
display:flex;
align-items:center;
gap:14px;
margin-bottom:30px;
}

.logo-box img{
width:70px;
height:70px;
border-radius:50%;
background:white;
padding:5px;
border:3px solid #facc15;
object-fit:contain;
}

.logo-text h2{
font-size:24px;
font-weight:700;
color:white;
}

.logo-text p{
font-size:13px;
color:#cbd5e1;
margin-top:3px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-title{
font-size:13px;
font-weight:700;
color:#facc15;
margin-top:18px;
margin-bottom:5px;
padding-left:5px;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:16px;
border-radius:14px;
text-decoration:none;
color:white;
font-size:15px;
font-weight:500;
transition:.3s;
background:#1e293b;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
transform:translateX(4px);
}

/* MAIN */

.main{
flex:1;
padding:20px;
overflow-y:auto;
}

/* HEADER */

.header-box{
background:#b8dede;
padding:20px;
border:2px solid #6b9e9e;
margin-bottom:18px;
}

.header-box h1{
font-size:32px;
font-weight:700;
}

.header-box p{
margin-top:5px;
font-size:14px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#c7e4e4;
border:2px solid #7aa6a6;
padding:20px;
position:relative;
}

.card i{
position:absolute;
top:15px;
right:15px;
font-size:34px;
color:#134e4a;
}

.card h3{
font-size:15px;
margin-bottom:10px;
}

.card h2{
font-size:38px;
color:#0f172a;
}

/* FORM */

.form-box{
background:#c7e4e4;
border:2px solid #7aa6a6;
padding:20px;
margin-bottom:18px;

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:12px;
}

.form-box input,
.form-box select{
padding:12px;
border:1px solid #7aa6a6;
background:white;
font-size:14px;
}

.form-box input:focus,
.form-box select:focus{
outline:none;
border:2px solid #0f766e;
}

/* BUTTONS */

.save-btn{
background:#0f766e;
border:none;
padding:13px;
color:white;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.save-btn:hover{
background:#115e59;
}

.edit-btn{
background:#2563eb;
border:none;
padding:8px 12px;
color:white;
cursor:pointer;
margin-right:5px;
font-size:13px;
}

.delete-btn{
background:#dc2626;
border:none;
padding:8px 12px;
color:white;
cursor:pointer;
font-size:13px;
}

/* FILTERS */

.filters{
display:flex;
gap:12px;
margin-bottom:18px;
flex-wrap:wrap;
}

.filters input,
.filters select{
padding:12px;
border:1px solid #7aa6a6;
background:white;
min-width:220px;
}

/* TABLE */

.table-box{
background:#c7e4e4;
border:2px solid #7aa6a6;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1800px;
}

th{
background:#374151;
padding:8px 10px;
border:1px solid #111827;
font-size:13px;
font-weight:700;
text-align:left;
color:white;
}

td{
padding:6px 10px;
border:1px solid #4b5563;
font-size:13px;
font-weight:700;
background:#d1d5db;
color:#000;
line-height:1.2;
}

/* STATUS */

.low-stock{
color:#dc2626;
font-weight:700;
}

.good-stock{
color:#15803d;
font-weight:700;
}

.critical-stock{
color:#b91c1c;
font-weight:700;
background:#fee2e2;
}

/* MOBILE */

@media(max-width:950px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
}

.menu{
flex-direction:row;
}

.menu a{
min-width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Inventory System</p>

</div>

</div>

<div class="menu">

<div class="menu-title">
MAIN
</div>

<a href="index.html">

<i class="fa-solid fa-chart-line"></i>
Dashboard

</a>

<div class="menu-title">
INVENTORY
</div>

<a href="items-masterlist.html"
class="active">

<i class="fa-solid fa-box"></i>
Items Masterlist

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>
Stock In

</a>

<a href="stock-out.html">

<i class="fa-solid fa-arrow-right-arrow-left"></i>
Stock Out

</a>

<a href="waste.html">

<i class="fa-solid fa-trash"></i>
Waste

</a>

<a href="daily-inventory.html">

<i class="fa-solid fa-clipboard-list"></i>
Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header-box">

<h1>Items Masterlist 📦</h1>

<p id="dateTime"></p>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">

<i class="fa-solid fa-boxes-stacked"></i>

<h3>Total Items</h3>

<h2 id="totalItems">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-triangle-exclamation"></i>

<h3>Low Stock</h3>

<h2 id="lowStockCount">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-layer-group"></i>

<h3>Categories</h3>

<h2 id="categoryCount">0</h2>

</div>

</div>

<!-- FORM -->

<div class="form-box">

<input type="text"
id="itemCode"
placeholder="Item Code">

<input type="text"
id="itemName"
placeholder="Item Name">

<select id="category">

<option value="">
Select Category
</option>

<option>Raw Materials</option>
<option>Packaging</option>
<option>Supplies</option>
<option>Beverages</option>

</select>

<input type="text"
id="unit"
placeholder="Unit">

<input type="number"
id="stock"
placeholder="Beginning Stock">

<input type="number"
id="reorderLevel"
placeholder="Reorder Level">

<input type="text"
id="supplier"
placeholder="Supplier">

<input type="number"
id="cost"
placeholder="Cost Per Unit">

<input type="number"
id="sellingPrice"
placeholder="Selling Price">

<input type="date"
id="expiry">

<input type="text"
id="location"
placeholder="Storage Location">

<button class="save-btn"
onclick="saveItem()">

<i class="fa-solid fa-floppy-disk"></i>
Save Item

</button>

</div>

<!-- FILTERS -->

<div class="filters">

<input type="text"
id="searchInput"
placeholder="Search Item..."
onkeyup="loadItems()">

<select id="filterCategory"
onchange="loadItems()">

<option value="">
All Categories
</option>

<option>Raw Materials</option>
<option>Packaging</option>
<option>Supplies</option>
<option>Beverages</option>

</select>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Code</th>
<th>Item Name</th>
<th>Category</th>
<th>Unit</th>
<th>Current Stock</th>
<th>Reorder</th>
<th>Supplier</th>
<th>Cost</th>
<th>Selling</th>
<th>Expiry</th>
<th>Location</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="itemsTable">

<tr>

<td colspan="13">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
deleteDoc,
doc,
updateDoc,
getDoc,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let editId = null;

/* DATE TIME */

function updateDateTime(){

document.getElementById("dateTime")
.innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();

/* SAVE ITEM */

window.saveItem =
async function(){

try{

const itemCode =
document.getElementById("itemCode").value.trim();

const itemName =
document.getElementById("itemName").value.trim();

const category =
document.getElementById("category").value;

const unit =
document.getElementById("unit").value.trim();

const stock =
Number(
document.getElementById("stock").value
);

const reorderLevel =
Number(
document.getElementById("reorderLevel").value
);

const supplier =
document.getElementById("supplier").value.trim();

const cost =
Number(
document.getElementById("cost").value
);

const sellingPrice =
Number(
document.getElementById("sellingPrice").value
);

const expiry =
document.getElementById("expiry").value;

const location =
document.getElementById("location").value.trim();

if(
!itemCode ||
!itemName ||
!category ||
!unit
){

alert("Complete required fields");

return;

}

const itemData = {

itemCode,
itemName,
category,
unit,
stock,
reorderLevel,
supplier,
cost,
sellingPrice,
expiry,
location,

createdAt:
new Date()

};

if(editId){

await updateDoc(
doc(db,"inventoryMasterlist",editId),
itemData
);

alert("Item Updated");

editId = null;

}else{

await addDoc(
collection(db,"inventoryMasterlist"),
itemData
);

alert("Item Saved");

}

clearForm();

}catch(error){

console.error(error);

alert(error.message);

}

}

/* CLEAR FORM */

function clearForm(){

document.querySelectorAll(
".form-box input"
).forEach(input=>{

input.value = "";

});

document.getElementById("category")
.value = "";

}

/* LOAD ITEMS */

window.loadItems =
function(){

const table =
document.getElementById("itemsTable");

const search =
document.getElementById("searchInput")
.value
.toLowerCase();

const filterCategory =
document.getElementById("filterCategory")
.value;

onSnapshot(

collection(db,"inventoryMasterlist"),

(snapshot)=>{

table.innerHTML = "";

let totalItems = 0;
let lowStockCount = 0;

let categories =
new Set();

snapshot.forEach((firebaseDoc)=>{

const item =
firebaseDoc.data();

const docId =
firebaseDoc.id;

if(
search &&
!item.itemName
.toLowerCase()
.includes(search)
){

return;

}

if(
filterCategory &&
item.category !== filterCategory
){

return;

}

totalItems++;

categories.add(item.category);

const isLow =

Number(item.stock)
<=
Number(item.reorderLevel);

if(isLow){

lowStockCount++;

}

let status = "IN STOCK";
let statusClass = "good-stock";

if(Number(item.stock) <= 0){

status = "OUT OF STOCK";
statusClass = "critical-stock";

}else if(isLow){

status = "LOW STOCK";
statusClass = "low-stock";

}

table.innerHTML += `

<tr>

<td>${item.itemCode}</td>

<td>${item.itemName}</td>

<td>${item.category}</td>

<td>${item.unit}</td>

<td class="${statusClass}">
${item.stock}
</td>

<td>${item.reorderLevel}</td>

<td>${item.supplier}</td>

<td>
₱${Number(item.cost).toLocaleString()}
</td>

<td>
₱${Number(item.sellingPrice).toLocaleString()}
</td>

<td>${item.expiry || "-"}</td>

<td>${item.location || "-"}</td>

<td class="${statusClass}">
${status}
</td>

<td>

<button class="edit-btn"
onclick="editItem('${docId}')">

Edit

</button>

<button class="delete-btn"
onclick="deleteItem('${docId}')">

Delete

</button>

</td>

</tr>

`;

});

if(totalItems === 0){

table.innerHTML = `

<tr>

<td colspan="13">

No Items Found

</td>

</tr>

`;

}

document.getElementById("totalItems")
.innerText =
totalItems;

document.getElementById("lowStockCount")
.innerText =
lowStockCount;

document.getElementById("categoryCount")
.innerText =
categories.size;

}

);

}

/* EDIT */

window.editItem =
async function(id){

const itemRef =
doc(db,"inventoryMasterlist",id);

const itemSnap =
await getDoc(itemRef);

if(itemSnap.exists()){

const item =
itemSnap.data();

editId = id;

document.getElementById("itemCode")
.value = item.itemCode || "";

document.getElementById("itemName")
.value = item.itemName || "";

document.getElementById("category")
.value = item.category || "";

document.getElementById("unit")
.value = item.unit || "";

document.getElementById("stock")
.value = item.stock || "";

document.getElementById("reorderLevel")
.value = item.reorderLevel || "";

document.getElementById("supplier")
.value = item.supplier || "";

document.getElementById("cost")
.value = item.cost || "";

document.getElementById("sellingPrice")
.value = item.sellingPrice || "";

document.getElementById("expiry")
.value = item.expiry || "";

document.getElementById("location")
.value = item.location || "";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

}

/* DELETE */

window.deleteItem =
async function(id){

const confirmDelete =
confirm("Delete this item?");

if(!confirmDelete){

return;

}

await deleteDoc(
doc(db,"inventoryMasterlist",id)
);

alert("Item Deleted");

}

/* LOAD */

loadItems();

</script>

</body>
</html>
