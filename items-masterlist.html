<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Items Inventory</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

/* LAYOUT */

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:300px;
background:#111827;
padding:20px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo-box{
display:flex;
align-items:center;
gap:14px;
margin-bottom:30px;
}

.logo-box img{
width:65px;
height:65px;
border-radius:50%;
background:white;
padding:5px;
border:3px solid #facc15;
object-fit:contain;
}

.logo-text h2{
font-size:20px;
font-weight:700;
}

.logo-text p{
font-size:13px;
color:#d1d5db;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-title{
font-size:13px;
font-weight:700;
color:#facc15;
margin-top:15px;
padding-left:5px;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:15px;
border-radius:16px;
text-decoration:none;
color:white;
transition:.3s;
background:rgba(255,255,255,0.03);
font-size:15px;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
transform:translateX(4px);
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow-y:auto;
}

/* HEADER */

.header-box{
background:#1e293b;
padding:25px;
border-radius:24px;
margin-bottom:25px;
}

.header-box h1{
font-size:38px;
}

.header-box p{
color:#cbd5e1;
margin-top:8px;
}

/* FORM */

.form-box{
background:#1e293b;
padding:25px;
border-radius:24px;
margin-bottom:25px;

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;
}

.form-box input,
.form-box select{
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;
font-size:14px;
}

.save-btn{
background:#22c55e;
border:none;
padding:14px;
border-radius:12px;
font-weight:700;
cursor:pointer;
color:white;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:24px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1000px;
}

th{
background:#111827;
color:#facc15;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.delete-btn{
background:#ef4444;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* MOBILE */

@media(max-width:950px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
}

.menu{
flex-direction:row;
}

.menu a{
min-width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Inventory System</p>

</div>

</div>

<div class="menu">

<p class="menu-title">
STOCKROOM
</p>

<a href="stockroom.html">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="items.html"
class="active">

<i class="fa-solid fa-boxes-stacked"></i>

Items

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>

Stock In

</a>

<a href="stock-out.html">

<i class="fa-solid fa-arrow-right-arrow-left"></i>

Stock Out

</a>

<a href="waste.html">

<i class="fa-solid fa-trash"></i>

Waste

</a>

<a href="daily-inventory.html">

<i class="fa-solid fa-clipboard-list"></i>

Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header-box">

<h1>Items Inventory 📦</h1>

<p id="dateTime"></p>

</div>

<!-- FORM -->

<div class="form-box">

<input type="text"
id="itemName"
placeholder="Item Name">

<select id="category">

<option value="">
Select Category
</option>

<option>Coffee</option>
<option>Milk</option>
<option>Powder</option>
<option>Syrup</option>
<option>Food</option>
<option>Packaging</option>

</select>

<input type="number"
id="stock"
placeholder="Beginning Stock">

<input type="text"
id="unit"
placeholder="Unit (pcs, kg, liters)">

<button class="save-btn"
onclick="saveItem()">

Save Item

</button>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Item ID</th>
<th>Item Name</th>
<th>Category</th>
<th>Stock</th>
<th>Unit</th>
<th>Action</th>

</tr>

</thead>

<tbody id="itemsTable">

</tbody>

</table>

</div>

</div>

</div>

<script>

/* DATE TIME */

function updateDateTime(){

document.getElementById("dateTime")
.innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();

/* SAVE ITEM */

function saveItem(){

const itemName =
document.getElementById("itemName").value;

const category =
document.getElementById("category").value;

const stock =
document.getElementById("stock").value;

const unit =
document.getElementById("unit").value;

if(
!itemName ||
!category ||
!stock ||
!unit
){

alert("Complete all fields");

return;

}

let items =
JSON.parse(
localStorage.getItem("inventoryItems")
) || [];

/* SAVE WITH ID */

items.unshift({

id:Date.now().toString(),

name:itemName,

category:category,

stock:Number(stock),

unit:unit

});

localStorage.setItem(
"inventoryItems",
JSON.stringify(items)
);

alert("Item Saved");

document.getElementById("itemName")
.value = "";

document.getElementById("stock")
.value = "";

document.getElementById("unit")
.value = "";

loadItems();

}

/* LOAD ITEMS */

function loadItems(){

const table =
document.getElementById("itemsTable");

table.innerHTML = "";

let items =
JSON.parse(
localStorage.getItem("inventoryItems")
) || [];

if(items.length === 0){

table.innerHTML = `

<tr>

<td colspan="6">

No items found

</td>

</tr>

`;

return;

}

items.forEach((item,index)=>{

table.innerHTML += `

<tr>

<td>${item.id}</td>

<td>${item.name}</td>

<td>${item.category}</td>

<td>${item.stock}</td>

<td>${item.unit}</td>

<td>

<button class="delete-btn"
onclick="deleteItem(${index})">

Delete

</button>

</td>

</tr>

`;

});

}

/* DELETE */

function deleteItem(index){

let items =
JSON.parse(
localStorage.getItem("inventoryItems")
) || [];

items.splice(index,1);

localStorage.setItem(
"inventoryItems",
JSON.stringify(items)
);

loadItems();

}

/* LOAD */

loadItems();

</script>

</body>
</html>
