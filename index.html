<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D' Mezzanine Cafe System</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#f0b43a">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

:root{
--bg:#0f0f0f;
--sidebar:#161616;
--gold:#f0b43a;
--gold2:#c58b39;
--gray:#aaa;
}

body{
background:var(--bg);
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:var(--sidebar);
height:100vh;
position:fixed;
padding:20px;
border-right:1px solid #2d2d2d;
overflow:auto;
transition:.3s;
z-index:999;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo i{
font-size:60px;
color:var(--gold);
margin-bottom:10px;
}

.logo h1{
font-size:28px;
color:var(--gold);
}

.logo p{
color:var(--gray);
font-size:14px;
}

.menu button{
width:100%;
padding:15px;
margin-bottom:12px;
border:none;
border-radius:14px;
background:#232323;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
text-align:left;
}

.menu button i{
margin-right:10px;
}

.menu button:hover{
background:linear-gradient(45deg,var(--gold2),var(--gold));
color:black;
transform:translateX(5px);
}

/* MAIN */

.main{
margin-left:260px;
width:100%;
}

/* HERO */

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
}

.hero-content h1{
font-size:65px;
color:var(--gold);
margin-bottom:15px;
}

.hero-content p{
max-width:700px;
line-height:1.8;
color:#ddd;
font-size:20px;
}

/* INSTALL BUTTON */

.install-btn{
position:fixed;
bottom:20px;
right:20px;
padding:16px 25px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,var(--gold2),var(--gold));
color:black;
font-weight:bold;
cursor:pointer;
z-index:9999;
display:none;
font-size:16px;
}

/* MOBILE */

.mobile-menu{
display:none;
position:fixed;
top:15px;
left:15px;
background:var(--gold2);
border:none;
padding:12px;
border-radius:10px;
color:white;
font-size:20px;
z-index:1000;
}

@media(max-width:900px){

.sidebar{
left:-100%;
}

.sidebar.active{
left:0;
}

.main{
margin-left:0;
}

.mobile-menu{
display:block;
}

.hero{
padding:100px 25px 40px;
}

.hero-content h1{
font-size:40px;
}

.hero-content p{
font-size:16px;
}

}

</style>
</head>

<body>

<button class="mobile-menu" onclick="toggleMenu()">
<i class="fa-solid fa-bars"></i>
</button>

<div class="sidebar" id="sidebar">

<div class="logo">
<i class="fa-solid fa-mug-hot"></i>
<h1>D' Mezzanine</h1>
<p>Premium Cafe Management</p>
</div>

<div class="menu">

<button><i class="fa-solid fa-house"></i> Dashboard</button>

<button><i class="fa-solid fa-cash-register"></i> POS / Cashier</button>

<button><i class="fa-solid fa-boxes-stacked"></i> Inventory</button>

<button><i class="fa-solid fa-chart-line"></i> Sales Reports</button>

<button><i class="fa-solid fa-receipt"></i> Receipts</button>

<button><i class="fa-solid fa-users"></i> Employees</button>

<button><i class="fa-solid fa-gear"></i> Settings</button>

<button><i class="fa-solid fa-right-from-bracket"></i> Logout</button>

</div>

</div>

<div class="main">

<div class="hero">

<div class="hero-content">

<h1>D' Mezzanine Cafe</h1>

<p>
Modern Coffee Shop Management System with premium branding,
mobile responsive design, installable app support,
POS system, inventory management, and sales monitoring.
</p>

</div>

</div>

</div>

<button class="install-btn" id="installBtn">
<i class="fa-solid fa-download"></i>
 Install App
</button>

<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

// INSTALL APP

let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e)=>{

e.preventDefault();

deferredPrompt = e;

installBtn.style.display = 'block';

});

installBtn.addEventListener('click', async()=>{

if(deferredPrompt){

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

installBtn.style.display = 'none';

}

});

// SERVICE WORKER

if('serviceWorker' in navigator){

window.addEventListener('load', ()=>{

navigator.serviceWorker.register('sw.js');

});

}

</script>

</body>
</html>
