<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>D' Mezzanine Dashboard</title>

<link rel="manifest"
href="manifest.json">

<meta name="theme-color"
content="#facc15">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:260px;
background:#111827;
padding:20px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:28px;
font-weight:700;
color:#facc15;
margin-bottom:30px;
}

.menu a{
display:flex;
align-items:center;
gap:12px;
padding:14px;
margin-bottom:10px;
background:#1e293b;
border-radius:12px;
text-decoration:none;
color:white;
transition:.3s;
font-size:15px;
}

.menu a:hover{
background:#2563eb;
}

.main{
flex:1;
overflow-y:auto;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.topbar h1{
font-size:32px;
}

.datetime{
font-size:16px;
color:#facc15;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
color:#cbd5e1;
margin-bottom:10px;
font-size:14px;
}

.card h2{
font-size:32px;
color:#facc15;
}

.quick-links{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-top:25px;
}

.quick-card{
background:#1e293b;
padding:25px;
border-radius:20px;
text-align:center;
text-decoration:none;
color:white;
transition:.3s;
}

.quick-card:hover{
background:#2563eb;
transform:translateY(-5px);
}

.quick-card i{
font-size:40px;
margin-bottom:15px;
color:#facc15;
}

.sales-box{
background:#1e293b;
padding:25px;
border-radius:20px;
margin-top:25px;
}

.sales-box h2{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#111827;
padding:15px;
text-align:left;
color:#facc15;
}

table td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.low-stock{
color:#ef4444;
font-weight:700;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
gap:10px;
}

.menu{
display:flex;
gap:10px;
}

.menu a{
min-width:180px;
margin-bottom:0;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

D' Mezzanine

</div>

<div class="menu">

<a href="cashier.html">

<i class="fa-solid fa-cash-register"></i>

Cashier POS

</a>

<a href="products.html">

<i class="fa-solid fa-box"></i>

Products

</a>

<a href="inventory.html">

<i class="fa-solid fa-warehouse"></i>

Inventory

</a>

<a href="sales-report.html">

<i class="fa-solid fa-chart-line"></i>

Sales Report

</a>

<a href="accounts.html">

<i class="fa-solid fa-book"></i>

Accounts

</a>

<a href="hr.html">

<i class="fa-solid fa-users"></i>

HR

</a>

<a href="settings.html">

<i class="fa-solid fa-gear"></i>

Settings

</a>

<a href="login.html"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>Dashboard 📊</h1>

<div class="datetime"
id="datetime"></div>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">

<h3>Today's Sales</h3>

<h2 id="todaySales">₱0</h2>

</div>

<div class="card">

<h3>Today's Orders</h3>

<h2 id="todayOrders">0</h2>

</div>

<div class="card">

<h3>Total Products</h3>

<h2 id="totalProducts">0</h2>

</div>

<div class="card">

<h3>Low Stock Items</h3>

<h2 id="lowStockCount">0</h2>

</div>

</div>

<!-- QUICK LINKS -->

<div class="quick-links">

<a href="cashier.html"
class="quick-card">

<i class="fa-solid fa-cash-register"></i>

<h3>Open POS</h3>

</a>

<a href="products.html"
class="quick-card">

<i class="fa-solid fa-box"></i>

<h3>Manage Products</h3>

</a>

<a href="sales-report.html"
class="quick-card">

<i class="fa-solid fa-chart-line"></i>

<h3>Sales Reports</h3>

</a>

<a href="accounts.html"
class="quick-card">

<i class="fa-solid fa-book"></i>

<h3>Accounting</h3>

</a>

</div>

<!-- LOW STOCK -->

<div class="sales-box">

<h2>Low Stock Products</h2>

<table>

<thead>

<tr>

<th>Product</th>
<th>Category</th>
<th>Stock</th>

</tr>

</thead>

<tbody id="lowStockTable">

<tr>

<td colspan="3">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

// DATE TIME

function updateDateTime(){

document.getElementById("datetime")
.innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();

// LOAD DASHBOARD SALES

async function loadDashboardSales(){

try{

const snapshot =
await getDocs(
collection(db,"sales")
);

let todaySales = 0;
let totalOrders = 0;

const today =
new Date().toLocaleDateString();

snapshot.forEach((doc)=>{

const sale = doc.data();

const rawDate =
sale.date || sale.createdAt;

const saleDate =
new Date(rawDate);

if(!isNaN(saleDate)){

if(
saleDate.toLocaleDateString()
=== today
){

todaySales +=
Number(sale.total || 0);

totalOrders++;

}

}

});

document.getElementById("todaySales")
.innerText =

"₱" +
todaySales.toLocaleString();

document.getElementById("todayOrders")
.innerText =
totalOrders;

}catch(error){

console.log(error);

document.getElementById("todaySales")
.innerText = "₱0";

}

}

// LOAD PRODUCTS

async function loadProducts(){

const snapshot =
await getDocs(
collection(db,"products")
);

document.getElementById("totalProducts")
.innerText =
snapshot.size;

let lowStock = 0;

const lowStockTable =
document.getElementById("lowStockTable");

lowStockTable.innerHTML = "";

snapshot.forEach((doc)=>{

const product = doc.data();

const stock =
product.quantity || 0;

if(stock <= 5){

lowStock++;

lowStockTable.innerHTML += `

<tr>

<td>${product.name}</td>

<td>${product.category}</td>

<td class="low-stock">

${stock}

</td>

</tr>

`;

}

});

if(lowStock === 0){

lowStockTable.innerHTML = `

<tr>

<td colspan="3">

No low stock items

</td>

</tr>

`;

}

document.getElementById("lowStockCount")
.innerText = lowStock;

}

// LOGOUT

window.logout = function(){

localStorage.removeItem("isLoggedIn");

window.location.href = "login.html";

}

// AUTO REFRESH

window.addEventListener("storage",()=>{

loadDashboardSales();
loadProducts();

});

// LOAD ALL

loadDashboardSales();

loadProducts();

</script>

</body>
</html>
