<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accounts Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
padding:15px;
}

.back-btn{
display:inline-block;
margin-bottom:15px;
text-decoration:none;
background:#facc15;
color:black;
padding:12px 18px;
border-radius:10px;
font-weight:600;
}

.window{
background:#f4f4f4;
border:2px solid #8aa8c5;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.header{
background:#9bb3cc;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
color:#001f5c;
font-weight:bold;
flex-wrap:wrap;
gap:10px;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

.header h1{
font-size:34px;
font-family:Georgia;
color:#003399;
}

.tabs{
display:flex;
gap:10px;
padding:10px;
background:#ececec;
border-bottom:1px solid #999;
flex-wrap:wrap;
}

.tab-btn{
border:none;
padding:12px 18px;
border-radius:10px;
background:#1e40af;
color:white;
font-weight:600;
cursor:pointer;
}

.tab-btn:hover{
background:#2563eb;
}

.toolbar{
background:#ececec;
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.toolbar button{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.save-btn{
background:#22c55e;
color:white;
}

.print-btn{
background:#facc15;
}

.add-btn{
background:#2563eb;
color:white;
}

.form-section{
padding:15px;
background:#f9f9f9;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:15px;
}

.form-grid input,
.form-grid textarea,
.form-grid select{
width:100%;
padding:10px;
border:1px solid #999;
border-radius:8px;
}

.form-grid textarea{
height:80px;
resize:none;
}

.table-container{
padding:10px;
overflow:auto;
background:#b5b5b5;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

table th{
background:#4a82d1;
color:white;
padding:10px;
font-size:13px;
border:1px solid #999;
}

table td{
border:1px solid #999;
padding:8px;
font-size:13px;
}

table input,
table select{
width:100%;
padding:6px;
border:none;
outline:none;
font-size:12px;
}

.footer{
background:#ececec;
padding:12px;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:15px;
border-top:2px solid #999;
}

.total-box{
background:#ffff99;
padding:10px 20px;
font-weight:bold;
border:1px solid #999;
min-width:150px;
text-align:center;
}

.bottom-bar{
background:#0033cc;
color:white;
padding:8px;
font-weight:bold;
font-size:14px;
}

.delete-btn{
background:#ef4444;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.account-preview{
background:#e0f2fe;
padding:10px;
border-radius:8px;
margin-top:10px;
font-weight:600;
color:#0f172a;
}

</style>

</head>

<body>

<a href="index.html" class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

Dashboard

</a>

<div class="window">

<div class="header">

<div class="header-left">

<i class="fa-solid fa-book fa-2x"></i>

<div>

<h1>Accounts Management</h1>

<div>ERP Accounting System</div>

</div>

</div>

<div id="currentDate"></div>

</div>

<div class="tabs">

<button class="tab-btn"
onclick="showSection('journalSection')">

Journal Voucher

</button>

<button class="tab-btn"
onclick="showSection('chartSection')">

Chart of Accounts

</button>

<button class="tab-btn"
onclick="showSection('customerSection')">

Customers / Suppliers

</button>

</div>

<!-- JOURNAL SECTION -->

<div id="journalSection">

<div class="toolbar">

<button class="save-btn"
onclick="saveVoucher()">

Save Voucher

</button>

<button class="add-btn"
onclick="addRow()">

Add Row

</button>

<button class="print-btn"
onclick="window.print()">

Print

</button>

</div>

<div class="form-section">

<div class="form-grid">

<input type="text"
id="refNo"
placeholder="Reference No">

<select id="voucherType">

<option>General Journal</option>
<option>Cash Receipt</option>
<option>Cash Payment</option>

</select>

<textarea id="remarks"
placeholder="Remarks"></textarea>

</div>

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>D/C</th>
<th>Account Code</th>
<th>Account Name</th>
<th>Debit</th>
<th>Credit</th>
<th>Action</th>

</tr>

</thead>

<tbody id="voucherBody">

<tr>

<td>

<select>
<option>Debit</option>
<option>Credit</option>
</select>

</td>

<td>

<input type="text"
onkeyup="autoFillAccount(this)">

</td>

<td>

<input type="text"
class="accountName">

</td>

<td>

<input type="number"
class="debit"
value="0"
oninput="computeTotals()">

</td>

<td>

<input type="number"
class="credit"
value="0"
oninput="computeTotals()">

</td>

<td>

<button class="delete-btn"
onclick="deleteRow(this)">

Delete

</button>

</td>

</tr>

</tbody>

</table>

</div>

<div class="footer">

<div class="total-box"
id="totalDebit">

Debit: ₱0

</div>

<div class="total-box"
id="totalCredit">

Credit: ₱0

</div>

<div class="total-box"
id="difference">

Difference: ₱0

</div>

</div>

</div>

<!-- CHART OF ACCOUNTS -->

<div id="chartSection"
style="display:none;">

<div class="form-section">

<h2>Chart of Accounts</h2>

<div class="form-grid">

<select id="accountCategory"
onchange="generateCode()">

<option value="">Select Category</option>

<option value="1">Assets</option>
<option value="2">Liabilities</option>
<option value="3">Equity</option>
<option value="4">Income</option>
<option value="5">Expenses</option>

</select>

<input type="text"
id="accountCode"
placeholder="Auto Account Code"
readonly>

<input type="text"
id="accountName"
placeholder="Account Name">

<input type="number"
id="openingBalance"
placeholder="Opening Balance">

</div>

<div class="account-preview"
id="accountPreview">

Account Preview: -

</div>

<button class="save-btn"
onclick="saveAccount()">

Save Account

</button>

</div>

</div>

<!-- CUSTOMER SECTION -->

<div id="customerSection"
style="display:none;">

<div class="form-section">

<h2>Customers / Suppliers</h2>

<div class="form-grid">

<select id="partyType">

<option>Customer</option>
<option>Supplier</option>

</select>

<input type="text"
id="companyName"
placeholder="Company Name">

<input type="text"
id="contactPerson"
placeholder="Contact Person">

<input type="text"
id="mobileNumber"
placeholder="Mobile Number">

<input type="text"
id="emailAddress"
placeholder="Email Address">

<input type="text"
id="address"
placeholder="Address">

</div>

<button class="save-btn"
onclick="saveCustomerSupplier()">

Save Details

</button>

</div>

</div>

<div class="bottom-bar">

ERP Accounting System Ready

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let accountCounter = 1000;

window.showSection = function(sectionId){

document.getElementById("journalSection")
.style.display = "none";

document.getElementById("chartSection")
.style.display = "none";

document.getElementById("customerSection")
.style.display = "none";

document.getElementById(sectionId)
.style.display = "block";

}

window.generateCode = function(){

const category =
document.getElementById("accountCategory").value;

accountCounter++;

const generatedCode =
category + accountCounter;

document.getElementById("accountCode").value =
generatedCode;

const categoryName =
document.getElementById("accountCategory")
.options[
document.getElementById("accountCategory")
.selectedIndex
].text;

document.getElementById("accountPreview")
.innerText =
"Account Preview: " +
categoryName +
" - " +
generatedCode;

}

window.addRow = function(){

const tbody =
document.getElementById("voucherBody");

tbody.innerHTML += `

<tr>

<td>

<select>
<option>Debit</option>
<option>Credit</option>
</select>

</td>

<td>

<input type="text"
onkeyup="autoFillAccount(this)">

</td>

<td>

<input type="text"
class="accountName">

</td>

<td>

<input type="number"
class="debit"
value="0"
oninput="computeTotals()">

</td>

<td>

<input type="number"
class="credit"
value="0"
oninput="computeTotals()">

</td>

<td>

<button class="delete-btn"
onclick="deleteRow(this)">

Delete

</button>

</td>

</tr>

`;

}

window.autoFillAccount = async function(input){

const accountCode = input.value;

const snapshot =
await getDocs(
collection(db,"chartOfAccounts")
);

snapshot.forEach((doc)=>{

const data = doc.data();

if(data.accountCode === accountCode){

const row =
input.closest("tr");

row.querySelector(".accountName").value =
data.accountName;

}

});

}

window.deleteRow = function(button){

button.closest("tr").remove();

computeTotals();

}

window.computeTotals = function(){

let debit = 0;
let credit = 0;

document.querySelectorAll(".debit")
.forEach(input=>{

debit += Number(input.value || 0);

});

document.querySelectorAll(".credit")
.forEach(input=>{

credit += Number(input.value || 0);

});

const diff = debit - credit;

document.getElementById("totalDebit")
.innerText =
"Debit: ₱" + debit.toLocaleString();

document.getElementById("totalCredit")
.innerText =
"Credit: ₱" + credit.toLocaleString();

document.getElementById("difference")
.innerText =
"Difference: ₱" + diff.toLocaleString();

}

window.saveVoucher = async function(){

try{

await addDoc(
collection(db,"journalVouchers"),
{
createdAt:new Date().toISOString()
}
);

alert("Voucher Saved!");

}catch(error){

console.log(error);

}

}

window.saveAccount = async function(){

const accountCategory =
document.getElementById("accountCategory").value;

const accountCode =
document.getElementById("accountCode").value;

const accountName =
document.getElementById("accountName").value;

const openingBalance =
document.getElementById("openingBalance").value;

try{

await addDoc(
collection(db,"chartOfAccounts"),
{

accountCategory,
accountCode,
accountName,
openingBalance,
createdAt:new Date().toISOString()

}

);

alert("Account Saved!");

}catch(error){

console.log(error);

}

}

window.saveCustomerSupplier =
async function(){

const partyType =
document.getElementById("partyType").value;

const companyName =
document.getElementById("companyName").value;

const contactPerson =
document.getElementById("contactPerson").value;

const mobileNumber =
document.getElementById("mobileNumber").value;

const emailAddress =
document.getElementById("emailAddress").value;

const address =
document.getElementById("address").value;

try{

await addDoc(
collection(db,"customersSuppliers"),
{

partyType,
companyName,
contactPerson,
mobileNumber,
emailAddress,
address,
createdAt:new Date().toISOString()

}

);

alert("Details Saved!");

}catch(error){

console.log(error);

}

}

computeTotals();

document.getElementById("currentDate")
.innerText =
new Date().toDateString();

</script>

</body>
</html>
