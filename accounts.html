<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounts Management - Journal Voucher</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
padding:15px;
}

.back-btn{
display:inline-block;
margin-bottom:15px;
text-decoration:none;
background:#facc15;
color:black;
padding:12px 18px;
border-radius:10px;
font-weight:600;
}

.window{
background:#f4f4f4;
border:2px solid #8aa8c5;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.header{
background:#9bb3cc;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
color:#001f5c;
font-weight:bold;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

.header h1{
font-size:34px;
font-family:Georgia;
color:#003399;
}

.toolbar{
background:#ececec;
border-top:1px solid #999;
border-bottom:1px solid #999;
padding:8px;
display:flex;
gap:12px;
flex-wrap:wrap;
}

.toolbar button{
background:white;
border:1px solid #999;
padding:8px 14px;
cursor:pointer;
font-size:13px;
border-radius:4px;
}

.toolbar button:hover{
background:#d9edf7;
}

.form-section{
padding:15px;
border-bottom:2px solid #8aa8c5;
background:#f9f9f9;
}

.form-grid{
display:grid;
grid-template-columns:120px 1fr 200px;
gap:10px;
align-items:start;
}

.form-grid input,
.form-grid textarea,
.form-grid select{
width:100%;
padding:8px;
border:1px solid #999;
background:white;
}

.form-grid textarea{
height:80px;
resize:none;
}

.table-container{
padding:10px;
overflow:auto;
height:400px;
background:#b5b5b5;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

table th{
background:#4a82d1;
color:white;
padding:8px;
font-size:13px;
border:1px solid #999;
}

table td{
border:1px solid #999;
padding:6px;
font-size:13px;
}

table input,
table select{
width:100%;
padding:6px;
border:none;
outline:none;
font-size:12px;
}

.footer{
background:#ececec;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
border-top:2px solid #999;
}

.footer-box{
display:flex;
gap:20px;
}

.total-box{
background:#ffff99;
padding:10px 20px;
font-weight:bold;
border:1px solid #999;
min-width:150px;
text-align:center;
}

.bottom-bar{
background:#0033cc;
color:white;
padding:8px;
font-weight:bold;
font-size:14px;
}

.save-btn{
background:#22c55e !important;
color:white;
}

.delete-btn{
background:#ef4444 !important;
color:white;
}

.add-row-btn{
background:#facc15 !important;
}

@media(max-width:900px){

.form-grid{
grid-template-columns:1fr;
}

.footer{
flex-direction:column;
align-items:flex-start;
}

}

</style>

</head>

<body>

<a href="index.html" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
Dashboard
</a>

<div class="window">

<div class="header">

<div class="header-left">

<i class="fa-solid fa-book fa-2x"></i>

<div>

<h1>Journal Voucher</h1>

<div>Accounts Management</div>

</div>

</div>

<div>

<div>(Not Saved)</div>

<div id="currentDate"></div>

</div>

</div>

<div class="toolbar">

<button class="save-btn"
onclick="saveVoucher()">

<i class="fa-solid fa-floppy-disk"></i>
Save

</button>

<button class="add-row-btn"
onclick="addRow()">

<i class="fa-solid fa-plus"></i>
Add Row

</button>

<button onclick="window.print()">

<i class="fa-solid fa-print"></i>
Print

</button>

<button onclick="loadVouchers()">

<i class="fa-solid fa-rotate-right"></i>
Refresh

</button>

<button class="delete-btn"
onclick="clearVoucher()">

<i class="fa-solid fa-trash"></i>
Clear

</button>

</div>

<div class="form-section">

<div class="form-grid">

<div>

<label>Ref No</label>

<input type="text"
id="refNo"
placeholder="Reference No">

</div>

<div>

<label>Remarks</label>

<textarea id="remarks"
placeholder="Enter remarks..."></textarea>

</div>

<div>

<label>Voucher Type</label>

<select id="voucherType">

<option>General Journal</option>
<option>Cash Receipt</option>
<option>Cash Payment</option>
<option>Adjustment</option>

</select>

</div>

</div>

</div>

<div class="table-container">

<table id="voucherTable">

<thead>

<tr>

<th>SNo</th>
<th>D/C</th>
<th>Acc.Code</th>
<th>Account Name</th>
<th>Sub.Code</th>
<th>Narration</th>
<th>Debit</th>
<th>Credit</th>
<th>Sub.Name</th>
<th>Action</th>

</tr>

</thead>

<tbody id="voucherBody">

<tr>

<td>1</td>

<td>

<select>
<option>Debit</option>
<option>Credit</option>
</select>

</td>

<td>
<input type="text"
placeholder="1001">
</td>

<td>
<input type="text"
placeholder="Cash Account">
</td>

<td>
<input type="text"
placeholder="001">
</td>

<td>
<input type="text"
placeholder="Narration">
</td>

<td>

<input type="number"
class="debit"
value="0"
oninput="computeTotals()">

</td>

<td>

<input type="number"
class="credit"
value="0"
oninput="computeTotals()">

</td>

<td>

<input type="text"
placeholder="Sub Name">

</td>

<td>

<button onclick="deleteRow(this)">
Delete
</button>

</td>

</tr>

</tbody>

</table>

</div>

<div class="footer">

<div class="footer-box">

<div>

<h4>Total Debit</h4>

<div class="total-box"
id="totalDebit">

₱0

</div>

</div>

<div>

<h4>Total Credit</h4>

<div class="total-box"
id="totalCredit">

₱0

</div>

</div>

<div>

<h4>Difference</h4>

<div class="total-box"
id="difference">

₱0

</div>

</div>

</div>

<div>

Search by Doc#

<input type="text"
placeholder="Search..."
style="padding:8px;border:1px solid #999;">

</div>

</div>

<div class="bottom-bar">

F4-Save | F3-Delete | F11-Preview | F12-Print | Esc-Exit | NextDocNo : 2507929

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.addRow = function(){

const tbody =
document.getElementById("voucherBody");

const rowCount =
tbody.rows.length + 1;

const row = `

<tr>

<td>${rowCount}</td>

<td>

<select>
<option>Debit</option>
<option>Credit</option>
</select>

</td>

<td><input type="text"></td>
<td><input type="text"></td>
<td><input type="text"></td>
<td><input type="text"></td>

<td>

<input type="number"
class="debit"
value="0"
oninput="computeTotals()">

</td>

<td>

<input type="number"
class="credit"
value="0"
oninput="computeTotals()">

</td>

<td><input type="text"></td>

<td>

<button onclick="deleteRow(this)">
Delete
</button>

</td>

</tr>

`;

tbody.innerHTML += row;

}

window.deleteRow = function(button){

button.closest("tr").remove();

computeTotals();

}

window.computeTotals = function(){

let debit = 0;
let credit = 0;

document.querySelectorAll(".debit")
.forEach(input=>{

debit += Number(input.value || 0);

});

document.querySelectorAll(".credit")
.forEach(input=>{

credit += Number(input.value || 0);

});

const diff = debit - credit;

document.getElementById("totalDebit")
.innerText =
"₱" + debit.toLocaleString();

document.getElementById("totalCredit")
.innerText =
"₱" + credit.toLocaleString();

document.getElementById("difference")
.innerText =
"₱" + diff.toLocaleString();

}

window.clearVoucher = function(){

location.reload();

}

window.saveVoucher = async function(){

const refNo =
document.getElementById("refNo").value;

const remarks =
document.getElementById("remarks").value;

const voucherType =
document.getElementById("voucherType").value;

const rows =
document.querySelectorAll("#voucherBody tr");

let entries = [];

rows.forEach(row=>{

const inputs =
row.querySelectorAll("input,select");

entries.push({

dc: inputs[0].value,
accCode: inputs[1].value,
accName: inputs[2].value,
subCode: inputs[3].value,
narration: inputs[4].value,
debit: inputs[5].value,
credit: inputs[6].value,
subName: inputs[7].value

});

});

try{

await addDoc(
collection(db,"journalVouchers"),
{

refNo,
remarks,
voucherType,
entries,
createdAt:new Date().toISOString()

}

);

alert("Voucher Saved Successfully!");

}catch(error){

console.log(error);

alert("Save Failed");

}

}

window.loadVouchers = async function(){

const snapshot =
await getDocs(collection(db,"journalVouchers"));

console.log(
snapshot.size + " vouchers loaded"
);

}

computeTotals();

document.getElementById("currentDate")
.innerText =
new Date().toDateString();

</script>

</body>
</html>
