<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accounts Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.topbar h1{
font-size:30px;
}

.back-btn{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
background:#facc15;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:600;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
}

.card h3{
color:#cbd5e1;
margin-bottom:10px;
}

.card h2{
color:#facc15;
font-size:30px;
}

.form-box,
.table-box{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:25px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.form-grid input,
.form-grid select,
.form-grid textarea{
padding:14px;
border:none;
border-radius:12px;
background:#0f172a;
color:white;
}

textarea{
resize:none;
height:100px;
}

.add-btn{
margin-top:20px;
border:none;
padding:14px 20px;
border-radius:12px;
background:#22c55e;
color:white;
font-weight:700;
cursor:pointer;
}

.refresh-btn{
margin-top:20px;
margin-left:10px;
border:none;
padding:14px 20px;
border-radius:12px;
background:#facc15;
color:black;
font-weight:700;
cursor:pointer;
}

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#0f172a;
color:white;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#111827;
color:#facc15;
padding:15px;
text-align:left;
white-space:nowrap;
}

table td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.income{
color:#22c55e;
font-weight:700;
}

.expense{
color:#ef4444;
font-weight:700;
}

.delete-btn{
background:#ef4444;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

@media(max-width:700px){

table{
font-size:12px;
}

.card h2{
font-size:24px;
}

}

</style>

</head>

<body>

<a href="index.html" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
Dashboard
</a>

<div class="topbar">

<h1>Accounts Management 💰</h1>

<h2 id="todayDate"></h2>

</div>

<div class="cards">

<div class="card">

<h3>Total Income</h3>

<h2 id="totalIncome">₱0</h2>

</div>

<div class="card">

<h3>Total Expenses</h3>

<h2 id="totalExpenses">₱0</h2>

</div>

<div class="card">

<h3>Net Profit</h3>

<h2 id="netProfit">₱0</h2>

</div>

</div>

<div class="form-box">

<h2 style="margin-bottom:20px;">
Add Financial Record
</h2>

<div class="form-grid">

<input type="text"
id="recordTitle"
placeholder="Title">

<select id="recordType">
<option value="Income">Income</option>
<option value="Expense">Expense</option>
</select>

<input type="number"
id="recordAmount"
placeholder="Amount">

<input type="date"
id="recordDate">

<select id="paymentMethod">
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
<option value="Bank Transfer">Bank Transfer</option>
<option value="Card">Card</option>
</select>

<input type="text"
id="referenceNumber"
placeholder="Reference Number">

<textarea id="recordNotes"
placeholder="Notes"></textarea>

</div>

<button class="add-btn"
onclick="saveRecord()">

<i class="fa-solid fa-plus"></i>
Save Record

</button>

<button class="refresh-btn"
onclick="loadRecords()">

<i class="fa-solid fa-rotate-right"></i>
Refresh

</button>

</div>

<div class="table-box">

<div class="search-box">

<input type="text"
id="searchInput"
placeholder="Search records..."
onkeyup="searchRecord()">

</div>

<table>

<thead>

<tr>

<th>Date</th>
<th>Title</th>
<th>Type</th>
<th>Amount</th>
<th>Payment</th>
<th>Reference</th>
<th>Notes</th>
<th>Action</th>

</tr>

</thead>

<tbody id="accountsTable">

<tr>
<td colspan="8"
style="text-align:center;padding:30px;">
Loading records...
</td>
</tr>

</tbody>

</table>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3",

measurementId: "G-1X8L2KQDYF"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

document.getElementById("todayDate").innerText =
new Date().toLocaleDateString();

window.saveRecord = async function(){

const title = recordTitle.value;
const type = recordType.value;
const amount = parseFloat(recordAmount.value);
const date = recordDate.value;
const paymentMethod = paymentMethod.value;
const referenceNumber = referenceNumber.value;
const notes = recordNotes.value;

if(!title || !amount || !date){

alert("Please complete required fields");
return;

}

try{

await addDoc(collection(db,"accounts"),{

title:title,
type:type,
amount:amount,
date:date,
paymentMethod:paymentMethod,
referenceNumber:referenceNumber,
notes:notes,
createdAt:new Date().toISOString()

});

alert("Record Saved!");

recordTitle.value = "";
recordAmount.value = "";
referenceNumber.value = "";
recordNotes.value = "";

loadRecords();

}catch(error){

console.log(error);
alert("Failed to save record");

}

}

window.deleteRecord = async function(id){

let confirmDelete =
confirm("Delete this record?");

if(!confirmDelete) return;

try{

await deleteDoc(doc(db,"accounts",id));

alert("Record Deleted!");

loadRecords();

}catch(error){

console.log(error);
alert("Delete failed");

}

}

window.loadRecords = async function(){

const accountsTable =
document.getElementById("accountsTable");

accountsTable.innerHTML = "";

let totalIncome = 0;
let totalExpenses = 0;

const snapshot =
await getDocs(collection(db,"accounts"));

if(snapshot.empty){

accountsTable.innerHTML = `
<tr>
<td colspan="8"
style="text-align:center;padding:30px;">
No records found
</td>
</tr>
`;

return;

}

snapshot.forEach((record)=>{

const data = record.data();

let amountClass = "income";

if(data.type === "Income"){

totalIncome += data.amount;

}else{

amountClass = "expense";

totalExpenses += data.amount;

}

accountsTable.innerHTML += `

<tr>

<td>${data.date}</td>

<td>${data.title}</td>

<td>${data.type}</td>

<td class="${amountClass}">
₱${data.amount.toLocaleString()}
</td>

<td>${data.paymentMethod}</td>

<td>${data.referenceNumber || '-'}</td>

<td>${data.notes || '-'}</td>

<td>

<button class="delete-btn"
onclick="deleteRecord('${record.id}')">
Delete
</button>

</td>

</tr>

`;

});

let netProfit = totalIncome - totalExpenses;


document.getElementById("totalIncome").innerText =
"₱" + totalIncome.toLocaleString();


document.getElementById("totalExpenses").innerText =
"₱" + totalExpenses.toLocaleString();


document.getElementById("netProfit").innerText =
"₱" + netProfit.toLocaleString();

}

window.searchRecord = function(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

let rows =
document.querySelectorAll("#accountsTable tr");

rows.forEach(row=>{

let text = row.innerText.toLowerCase();

if(text.includes(input)){

row.style.display = "";

}else{

row.style.display = "none";

}

});

}

loadRecords();

</script>

</body>
</html>
