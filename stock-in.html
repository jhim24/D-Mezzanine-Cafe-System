<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Stock In</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#111827;
padding:20px;
overflow-y:auto;
}

.logo{
font-size:24px;
font-weight:700;
margin-bottom:30px;
color:#facc15;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
padding:15px;
border-radius:14px;
text-decoration:none;
color:white;
background:#1e293b;
transition:.3s;
display:flex;
align-items:center;
gap:10px;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow-y:auto;
}

.header{
margin-bottom:25px;
}

.header h1{
font-size:38px;
}

/* FORM */

.form-box{
background:#1e293b;
padding:25px;
border-radius:20px;

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:15px;

margin-bottom:25px;
}

.form-box input,
.form-box select{
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;
}

.save-btn{
background:#22c55e;
border:none;
padding:14px;
border-radius:12px;
font-weight:700;
cursor:pointer;
color:white;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1000px;
}

th{
background:#111827;
color:#facc15;
padding:15px;
text-align:left;
}

td{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

/* MOBILE */

@media(max-width:900px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
}

.menu{
flex-direction:row;
}

.menu a{
min-width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

D'Mezzanine

</div>

<div class="menu">

<a href="index.html">

<i class="fa-solid fa-chart-line"></i>
Dashboard

</a>

<a href="items-masterlist.html">

<i class="fa-solid fa-box"></i>
Items Masterlist

</a>

<a href="stock-in.html"
class="active">

<i class="fa-solid fa-truck"></i>
Stock In

</a>

<a href="stock-out.html">

<i class="fa-solid fa-arrow-right-arrow-left"></i>
Stock Out

</a>

<a href="waste.html">

<i class="fa-solid fa-trash"></i>
Waste

</a>

<a href="daily-inventory.html">

<i class="fa-solid fa-clipboard-list"></i>
Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<h1>Stock In 📥</h1>

</div>

<!-- FORM -->

<div class="form-box">

<input type="date"
id="date">

<select id="itemSelect">

<option value="">
Select Item
</option>

</select>

<input type="number"
id="quantity"
placeholder="Quantity">

<input type="text"
id="supplier"
placeholder="Supplier">

<input type="text"
id="invoice"
placeholder="Invoice No">

<button class="save-btn"
onclick="saveStockIn()">

<i class="fa-solid fa-floppy-disk"></i>
Save Stock In

</button>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Date</th>
<th>Item</th>
<th>Quantity</th>
<th>Supplier</th>
<th>Invoice</th>

</tr>

</thead>

<tbody id="stockInTable">

<tr>

<td colspan="5">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
onSnapshot,
doc,
updateDoc,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* LOAD ITEMS */

async function loadItems(){

const select =
document.getElementById("itemSelect");

select.innerHTML = `

<option value="">
Select Item
</option>

`;

const snapshot =
await getDocs(
collection(db,"inventoryMasterlist")
);

snapshot.forEach((firebaseDoc)=>{

const item =
firebaseDoc.data();

select.innerHTML += `

<option value="${firebaseDoc.id}">

${item.itemName}

</option>

`;

});

}

/* SAVE STOCK IN */

window.saveStockIn =
async function(){

try{

const date =
document.getElementById("date").value;

const itemId =
document.getElementById("itemSelect").value;

const quantity =
Number(
document.getElementById("quantity").value
);

const supplier =
document.getElementById("supplier").value;

const invoice =
document.getElementById("invoice").value;

if(
!date ||
!itemId ||
!quantity
){

alert("Complete all fields");

return;

}

/* GET ITEM */

const snapshot =
await getDocs(
collection(db,"inventoryMasterlist")
);

let selectedItem = null;

snapshot.forEach((firebaseDoc)=>{

if(firebaseDoc.id === itemId){

selectedItem = {

id:firebaseDoc.id,
...firebaseDoc.data()

};

}

});

if(!selectedItem){

alert("Item not found");

return;

}

/* SAVE STOCK IN */

await addDoc(
collection(db,"stockIn"),
{

date,
itemId,
itemName:
selectedItem.itemName,

quantity,
supplier,
invoice,

createdAt:
new Date()

}
);

/* UPDATE STOCK */

const newStock =

Number(selectedItem.stock || 0)
+
quantity;

await updateDoc(

doc(
db,
"inventoryMasterlist",
itemId
),

{

stock:newStock

}

);

alert("Stock In Saved");

/* CLEAR */

document.getElementById("quantity")
.value = "";

document.getElementById("supplier")
.value = "";

document.getElementById("invoice")
.value = "";

}catch(error){

console.error(error);

alert(error.message);

}

}

/* LOAD STOCK IN */

function loadStockIn(){

const table =
document.getElementById("stockInTable");

onSnapshot(

collection(db,"stockIn"),

(snapshot)=>{

table.innerHTML = "";

snapshot.forEach((firebaseDoc)=>{

const data =
firebaseDoc.data();

table.innerHTML += `

<tr>

<td>${data.date}</td>

<td>${data.itemName}</td>

<td>${data.quantity}</td>

<td>${data.supplier}</td>

<td>${data.invoice}</td>

</tr>

`;

});

}

);

}

/* LOAD */

loadItems();
loadStockIn();

</script>

</body>
</html>
