.menu a{
display:flex;

gap:14px;

text-decoration:none;

.menu a:hover,
.menu a.active{

}

/* MAIN */

.main{

}

.header-box h1{
font-size:38px;
}

.header-box p{
color:#cbd5e1;
margin-top:8px;
}

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:24px;
position:relative;
overflow:hidden;
}

.card i{
position:absolute;
top:20px;
right:20px;
font-size:38px;
color:rgba(250,204,21,0.25);

.card h4{

.card h2{

.card p{

.form-box{
background:#1e293b;

.form-box input,
.form-box select{
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;

.save-btn{
background:#22c55e;
border:none;
padding:14px;
border-radius:12px;
font-weight:700;

color:white;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:24px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1100px;
}

th{
background:#111827;
color:#facc15;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.delete-btn{
background:#ef4444;
border:none;
padding:8px 12px;
border-radius:8px;

@media(max-width:950px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;

.menu{
flex-direction:row;

.menu a{

}

<script>

/* DATE TIME */

function updateDateTime(){

document.getElementById("dateTime")
.innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();

/* LOAD ITEMS */

function loadItems(){

const select =
document.getElementById("itemSelect");

select.innerHTML = `
<option value="">
Select Item
</option>
`;

let items =
JSON.parse(
localStorage.getItem("inventoryItems")
) || [];

items.forEach(item=>{

select.innerHTML += `

<option value="${item.id}">
${item.name}
</option>

`;

});

}

/* SAVE STOCK IN */

function saveStockIn(){

const itemId =
document.getElementById("itemSelect").value;

const itemName =
document.getElementById("itemSelect")
.options[
document.getElementById("itemSelect")
.selectedIndex
].text;

const qty =
Number(
document.getElementById("quantity").value
);

const supplier =
document.getElementById("supplier").value;

const date =
document.getElementById("date").value;

if(
!itemId ||
!qty ||
!supplier ||
!date
){

alert("Complete all fields");

return;

}

/* UPDATE STOCK */

let items =
JSON.parse(
localStorage.getItem("inventoryItems")
) || [];

items = items.map(item=>{

if(item.id === itemId){

item.stock =
Number(item.stock || 0)
+
qty;

}

return item;

});

localStorage.setItem(
"inventoryItems",
JSON.stringify(items)
);

/* SAVE STOCK IN */

let stockIns =
JSON.parse(
localStorage.getItem("stockInRecords")
) || [];

stockIns.unshift({

itemId:itemId,
itemName:itemName,
qty:qty,
supplier:supplier,
date:date,
createdAt:new Date()

});

localStorage.setItem(
"stockInRecords",
JSON.stringify(stockIns)
);

alert("Stock In Saved");

document.getElementById("quantity")
.value = "";

document.getElementById("supplier")
.value = "";

loadStockIn();

}
