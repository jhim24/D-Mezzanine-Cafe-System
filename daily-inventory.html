<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control"
content="no-cache, no-store, must-revalidate">

<meta http-equiv="Pragma"
content="no-cache">

<meta http-equiv="Expires"
content="0">

<title>D'Mezzanine Daily Inventory</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#d8ecec;
color:#111827;
overflow:hidden;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:8px;
height:8px;
}

::-webkit-scrollbar-thumb{
background:#0f766e;
border-radius:10px;
}

/* LAYOUT */

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#0f172a;
padding:20px;
overflow-y:auto;
border-right:3px solid #134e4a;
}

.logo-box{
display:flex;
align-items:center;
gap:14px;
margin-bottom:30px;
}

.logo-box img{
width:70px;
height:70px;
border-radius:50%;
background:white;
padding:5px;
border:3px solid #facc15;
object-fit:contain;
}

.logo-text h2{
font-size:24px;
font-weight:700;
color:white;
}

.logo-text p{
font-size:13px;
color:#cbd5e1;
margin-top:3px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-title{
font-size:13px;
font-weight:700;
color:#facc15;
margin-top:18px;
margin-bottom:5px;
padding-left:5px;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:16px;
border-radius:14px;
text-decoration:none;
color:white;
font-size:15px;
font-weight:500;
transition:.3s;
background:#1e293b;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
transform:translateX(4px);
}

/* MAIN */

.main{
flex:1;
padding:20px;
overflow-y:auto;
}

/* HEADER */

.header-box{
background:#b8dede;
padding:20px;
border:2px solid #6b9e9e;
margin-bottom:18px;
}

.header-box h1{
font-size:32px;
font-weight:700;
}

.header-box p{
margin-top:5px;
font-size:14px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#c7e4e4;
border:2px solid #7aa6a6;
padding:20px;
position:relative;
}

.card i{
position:absolute;
top:15px;
right:15px;
font-size:34px;
color:#134e4a;
}

.card h3{
font-size:15px;
margin-bottom:10px;
}

.card h2{
font-size:38px;
color:#0f172a;
}

/* BUTTONS */

.refresh-btn{
background:#0f766e;
border:none;
padding:14px 20px;
color:white;
font-weight:700;
cursor:pointer;
margin-bottom:20px;
transition:.3s;
}

.refresh-btn:hover{
background:#115e59;
}

.save-btn{
background:#2563eb;
border:none;
padding:10px 14px;
color:white;
font-weight:700;
cursor:pointer;
font-size:13px;
}

/* TABLE */

.table-box{
background:#c7e4e4;
border:2px solid #7aa6a6;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:2400px;
background:white;
}

th{
background:#374151;
padding:7px 10px;
border:1px solid #111827;
font-size:13px;
font-weight:700;
text-align:left;
color:white;
white-space:nowrap;
line-height:1.1;
}

td{
padding:5px 10px;
border:1px solid #4b5563;
font-size:13px;
font-weight:700;
background:#d1d5db;
color:#000;
white-space:nowrap;
line-height:1.1;
}

/* INPUT */

.actual-input{
width:120px;
padding:5px 8px;
border:1px solid #4b5563;
background:white;
font-weight:700;
color:black;
height:30px;
}
/* STATUS */

.positive{
color:#15803d;
font-weight:700;
}

.negative{
color:#dc2626;
font-weight:700;
}

/* MOBILE */

@media(max-width:950px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
}

.menu{
flex-direction:row;
}

.menu a{
min-width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Inventory System</p>

</div>

</div>

<div class="menu">

<div class="menu-title">
MAIN
</div>

<a href="index.html">

<i class="fa-solid fa-chart-line"></i>
Dashboard

</a>

<div class="menu-title">
INVENTORY
</div>

<a href="items-masterlist.html">

<i class="fa-solid fa-box"></i>
Items Masterlist

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>
Stock In

</a>

<a href="stock-out.html">

<i class="fa-solid fa-arrow-right-arrow-left"></i>
Stock Out

</a>

<a href="waste.html">

<i class="fa-solid fa-trash"></i>
Waste

</a>

<a href="daily-inventory.html"
class="active">

<i class="fa-solid fa-clipboard-list"></i>
Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header-box">

<h1>Daily Inventory 📋</h1>

<p id="dateTime"></p>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">

<i class="fa-solid fa-warehouse"></i>

<h3>Total Items</h3>

<h2 id="totalItems">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-chart-column"></i>

<h3>Total Variance</h3>

<h2 id="totalVariance">0</h2>

</div>

</div>

<button class="refresh-btn"
onclick="loadDailyInventory()">

<i class="fa-solid fa-rotate-right"></i>
Refresh Inventory

</button>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Date</th>
<th>Item</th>
<th>Beginning</th>
<th>Stock In</th>
<th>Sold</th>
<th>Stock Out</th>
<th>Waste</th>
<th>System Ending</th>
<th>Actual Count</th>
<th>Variance</th>
<th>Final Ending</th>
<th>Action</th>

</tr>

</thead>

<tbody id="dailyTable">

<tr>

<td colspan="12">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
doc,
setDoc

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* DATE TIME */

function updateDateTime(){

document.getElementById("dateTime")
.innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();

/* LOAD DAILY INVENTORY */

window.loadDailyInventory =
async function(){

const table =
document.getElementById("dailyTable");

table.innerHTML = "";

const today =
new Date().toISOString().split("T")[0];

/* COLLECTIONS */

const itemsSnapshot =
await getDocs(
collection(db,"inventoryMasterlist")
);

const stockInSnapshot =
await getDocs(
collection(db,"stockIn")
);

const stockOutSnapshot =
await getDocs(
collection(db,"stockOut")
);

const wasteSnapshot =
await getDocs(
collection(db,"waste")
);

const salesSnapshot =
await getDocs(
collection(db,"sales")
);

let totalItems = 0;
let totalVariance = 0;

/* LOOP ITEMS */

for(const firebaseDoc of itemsSnapshot.docs){

const item =
firebaseDoc.data();

const itemId =
firebaseDoc.id;

const itemName =
item.itemName;

const currentStock =
Number(item.stock || 0);

let stockIn = 0;
let stockOut = 0;
let waste = 0;
let sold = 0;

/* STOCK IN */

stockInSnapshot.forEach((doc)=>{

const data =
doc.data();

if(data.itemId === itemId){

stockIn +=
Number(data.quantity || 0);

}

});

/* STOCK OUT */

stockOutSnapshot.forEach((doc)=>{

const data =
doc.data();

if(data.itemId === itemId){

stockOut +=
Number(data.quantity || 0);

}

});

/* WASTE */

wasteSnapshot.forEach((doc)=>{

const data =
doc.data();

if(data.itemId === itemId){

waste +=
Number(data.quantity || 0);

}

});

/* SALES */

salesSnapshot.forEach((doc)=>{

const sale =
doc.data();

if(
sale.items &&
Array.isArray(sale.items)
){

sale.items.forEach((saleItem)=>{

if(
saleItem.name === itemName
){

sold +=
Number(saleItem.qty || 0);

}

});

}

});

/* BEGINNING */

const beginning =

currentStock
-
stockIn
+
sold
+
stockOut
+
waste;

/* SYSTEM ENDING */

const systemEnding =

beginning
+
stockIn
-
sold
-
stockOut
-
waste;

totalItems++;

table.innerHTML += `

<tr>

<td>${today}</td>

<td>${itemName}</td>

<td>${beginning}</td>

<td>${stockIn}</td>

<td>${sold}</td>

<td>${stockOut}</td>

<td>${waste}</td>

<td>${systemEnding}</td>

<td>

<input
type="number"
class="actual-input"
id="actual-${itemId}"
value="${systemEnding}">

</td>

<td id="variance-${itemId}">
0
</td>

<td id="ending-${itemId}">
${systemEnding}
</td>

<td>

<button
class="save-btn"
onclick="saveDailyInventory(
'${itemId}',
'${itemName}',
${beginning},
${stockIn},
${sold},
${stockOut},
${waste},
${systemEnding}
)">

Save

</button>

</td>

</tr>

`;

}

document.getElementById("totalItems")
.innerText =
totalItems;

document.getElementById("totalVariance")
.innerText =
totalVariance;

}

/* SAVE DAILY INVENTORY */

window.saveDailyInventory =
async function(
itemId,
itemName,
beginning,
stockIn,
sold,
stockOut,
waste,
systemEnding
){

try{

const actualCount =
Number(
document.getElementById(
`actual-${itemId}`
).value
);

const variance =
actualCount - systemEnding;

const finalEnding =
actualCount;

document.getElementById(
`variance-${itemId}`
).innerHTML =

variance >= 0

?

`<span class="positive">
${variance}
</span>`

:

`<span class="negative">
${variance}
</span>`;

document.getElementById(
`ending-${itemId}`
).innerText =
finalEnding;

const today =
new Date().toISOString().split("T")[0];

await setDoc(

doc(
db,
"dailyInventory",
today + "_" + itemId
),

{

date:today,

itemId,

itemName,

beginning,

stockIn,

sold,

stockOut,

waste,

systemEnding,

actualCount,

variance,

finalEnding,

createdAt:
new Date()

}

);

alert("Daily Inventory Saved");

}catch(error){

console.error(error);

alert(error.message);

}

}

/* LOAD */

loadDailyInventory();

</script>

</body>
</html>
