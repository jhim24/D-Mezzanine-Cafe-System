<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Daily Inventory</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f3f4f6;
overflow:hidden;
}

/* LAYOUT */

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#050505;
padding:20px;
overflow-y:auto;
}

.logo-box{
display:flex;
align-items:center;
gap:12px;
margin-bottom:30px;
}

.logo-box img{
width:60px;
height:60px;
border-radius:50%;
background:white;
padding:4px;
border:3px solid #facc15;
}

.logo-text h2{
color:white;
font-size:20px;
}

.logo-text p{
color:#d1d5db;
font-size:13px;
}

.menu{
display:flex;
flex-direction:column;
gap:8px;
}

.menu-title{
color:#facc15;
font-size:13px;
font-weight:700;
margin-top:15px;
margin-bottom:8px;
padding-left:10px;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:14px;
border-radius:14px;
text-decoration:none;
color:white;
font-size:15px;
transition:.3s;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
font-weight:600;
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow-y:auto;
}

/* HEADER */

.header{
background:#0f172a;
padding:25px;
border-radius:20px;
color:white;
margin-bottom:25px;
}

.header h1{
font-size:34px;
margin-bottom:8px;
}

/* TABLE */

.table-box{
background:white;
padding:20px;
border-radius:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1200px;
}

table th{
background:#0f172a;
color:white;
padding:14px;
font-size:14px;
}

table td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
text-align:center;
}

.good-stock{
color:#16a34a;
font-weight:700;
}

.low-stock{
color:#ef4444;
font-weight:700;
}

/* MOBILE */

@media(max-width:900px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
}

.main{
padding:15px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Stock Room System</p>

</div>

</div>

<div class="menu">

<p class="menu-title">
INVENTORY
</p>

<a href="stockroom.html">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="items.html">

<i class="fa-solid fa-boxes-stacked"></i>

Items

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>

Stock In

</a>

<a href="stock-out.html">

<i class="fa-solid fa-arrow-right-arrow-left"></i>

Stock Out

</a>

<a href="waste.html">

<i class="fa-solid fa-trash"></i>

Waste

</a>

<a href="daily-inventory.html"
class="active">

<i class="fa-solid fa-clipboard-list"></i>

Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header">

<h1>Daily Inventory</h1>

<p>
Realtime Daily Inventory Monitoring
</p>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>ITEM</th>

<th>BEGINNING</th>

<th>STOCK IN</th>

<th>STOCK OUT</th>

<th>WASTE</th>

<th>ENDING</th>

<th>STATUS</th>

</tr>

</thead>

<tbody id="dailyInventoryTable">

<tr>

<td colspan="7"
style="padding:20px;">

Loading Inventory...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

/* INIT */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* LOAD DAILY INVENTORY */

async function loadDailyInventory(){

const table =
document.getElementById("dailyInventoryTable");

table.innerHTML = "";

/* ITEMS */

const itemsSnapshot =
await getDocs(
collection(db,"inventoryItems")
);

/* STOCK IN */

const stockInSnapshot =
await getDocs(
collection(db,"stockIn")
);

/* STOCK OUT */

const stockOutSnapshot =
await getDocs(
collection(db,"stockOut")
);

/* WASTE */

const wasteSnapshot =
await getDocs(
collection(db,"waste")
);

/* EMPTY */

if(itemsSnapshot.empty){

table.innerHTML = `

<tr>

<td colspan="7"
style="padding:20px;">

No Inventory Items

</td>

</tr>

`;

return;

}

/* LOOP ITEMS */

itemsSnapshot.forEach((itemDoc)=>{

const item =
itemDoc.data();

const itemId =
itemDoc.id;

/* BEGINNING */

const beginning =
Number(item.stock || 0);

/* STOCK IN */

let stockInTotal = 0;

stockInSnapshot.forEach((docu)=>{

const data =
docu.data();

if(data.itemId === itemId){

stockInTotal +=
Number(data.qty || 0);

}

});

/* STOCK OUT */

let stockOutTotal = 0;

stockOutSnapshot.forEach((docu)=>{

const data =
docu.data();

if(data.itemId === itemId){

stockOutTotal +=
Number(data.qty || 0);

}

});

/* WASTE */

let wasteTotal = 0;

wasteSnapshot.forEach((docu)=>{

const data =
docu.data();

if(data.itemId === itemId){

wasteTotal +=
Number(data.qty || 0);

}

});

/* ENDING */

const ending =

beginning +
stockInTotal -
stockOutTotal -
wasteTotal;

/* STATUS */

let status = "GOOD";
let statusClass = "good-stock";

if(ending <= Number(item.low || 5)){

status = "LOW STOCK";
statusClass = "low-stock";

}

/* TABLE */

table.innerHTML += `

<tr>

<td>
${item.name || "-"}
</td>

<td>
${beginning}
</td>

<td>
${stockInTotal}
</td>

<td>
${stockOutTotal}
</td>

<td>
${wasteTotal}
</td>

<td class="${statusClass}">
${ending}
</td>

<td class="${statusClass}">
${status}
</td>

</tr>

`;

});

}

/* LOAD */

loadDailyInventory();

</script>

</body>
</html>
