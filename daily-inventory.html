<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Daily Inventory</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f3f4f6;
overflow:hidden;
}

/* LAYOUT */

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#050505;
padding:20px;
overflow-y:auto;
}

.logo-box{
display:flex;
align-items:center;
gap:12px;
margin-bottom:30px;
}

.logo-box img{
width:60px;
height:60px;
border-radius:50%;
background:white;
padding:4px;
border:3px solid #facc15;
}

.logo-text h2{
color:white;
font-size:20px;
}

.logo-text p{
color:#d1d5db;
font-size:13px;
}

.menu{
display:flex;
flex-direction:column;
gap:8px;
}

.menu-title{
color:#facc15;
font-size:13px;
font-weight:700;
margin-top:15px;
margin-bottom:8px;
padding-left:10px;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:14px;
border-radius:14px;
text-decoration:none;
color:white;
font-size:15px;
transition:.3s;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
font-weight:600;
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow-y:auto;
}

/* HEADER */

.header{
background:#0f172a;
padding:25px;
border-radius:20px;
color:white;
margin-bottom:25px;
}

.header h1{
font-size:34px;
margin-bottom:8px;
}

/* TABLE */

.table-box{
background:white;
padding:20px;
border-radius:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1800px;
}

table th{
background:#0f172a;
color:white;
padding:14px;
font-size:14px;
white-space:nowrap;
}

table td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
text-align:center;
white-space:nowrap;
}

table input{
padding:10px;
border:1px solid #d1d5db;
border-radius:10px;
width:120px;
text-align:center;
}

/* STATUS */

.good{
color:#16a34a;
font-weight:700;
}

.short{
color:#ef4444;
font-weight:700;
}

.over{
color:#2563eb;
font-weight:700;
}

/* BUTTON */

.save-btn{
margin-top:20px;
background:#facc15;
color:black;
border:none;
padding:14px 25px;
border-radius:14px;
font-size:15px;
font-weight:700;
cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
}

.main{
padding:15px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Stock Room System</p>

</div>

</div>

<div class="menu">

<p class="menu-title">
INVENTORY
</p>

<a href="stockroom.html">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="items.html">

<i class="fa-solid fa-boxes-stacked"></i>

Items

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>

Stock In

</a>

<a href="stock-out.html">

<i class="fa-solid fa-arrow-right-arrow-left"></i>

Stock Out

</a>

<a href="waste.html">

<i class="fa-solid fa-trash"></i>

Waste

</a>

<a href="daily-inventory.html"
class="active">

<i class="fa-solid fa-clipboard-list"></i>

Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<h1>Daily Inventory</h1>

<p>
Closing Inventory Monitoring
</p>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>DATE</th>

<th>ITEM</th>

<th>BEGINNING</th>

<th>STOCK IN</th>

<th>STOCK OUT</th>

<th>WASTE</th>

<th>SYSTEM ENDING</th>

<th>ACTUAL COUNT</th>

<th>VARIANCE</th>

<th>STATUS</th>

</tr>

</thead>

<tbody id="dailyInventoryTable">

<tr>

<td colspan="10"
style="padding:20px;">

Loading Inventory...

</td>

</tr>

</tbody>

</table>

<button class="save-btn"
onclick="saveDailyInventory()">

<i class="fa-solid fa-floppy-disk"></i>

Save Daily Inventory

</button>

</div>

</div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
addDoc

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

/* INIT */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* LOAD DAILY INVENTORY */

async function loadDailyInventory(){

const table =
document.getElementById("dailyInventoryTable");

table.innerHTML = "";

/* ITEMS */

const itemsSnapshot =
await getDocs(
collection(db,"inventoryItems")
);

/* STOCK IN */

const stockInSnapshot =
await getDocs(
collection(db,"stockIn")
);

/* STOCK OUT */

const stockOutSnapshot =
await getDocs(
collection(db,"stockOut")
);

/* WASTE */

const wasteSnapshot =
await getDocs(
collection(db,"waste")
);

/* TODAY */

const today =
new Date().toISOString().split("T")[0];

itemsSnapshot.forEach((itemDoc)=>{

const item =
itemDoc.data();

const itemId =
itemDoc.id;

/* BEGINNING */

const beginning =
Number(item.stock || 0);

/* STOCK IN */

let stockInTotal = 0;

stockInSnapshot.forEach((docu)=>{

const data =
docu.data();

if(data.itemId === itemId){

stockInTotal +=
Number(data.qty || 0);

}

});

/* STOCK OUT */

let stockOutTotal = 0;

stockOutSnapshot.forEach((docu)=>{

const data =
docu.data();

if(data.itemId === itemId){

stockOutTotal +=
Number(data.qty || 0);

}

});

/* WASTE */

let wasteTotal = 0;

wasteSnapshot.forEach((docu)=>{

const data =
docu.data();

if(data.itemId === itemId){

wasteTotal +=
Number(data.qty || 0);

}

});

/* SYSTEM ENDING */

const systemEnding =

beginning +
stockInTotal -
stockOutTotal -
wasteTotal;

/* TABLE */

table.innerHTML += `

<tr>

<td>

${today}

</td>

<td>

${item.name || "-"}

</td>

<td>

${beginning}

</td>

<td>

${stockInTotal}

</td>

<td>

${stockOutTotal}

</td>

<td>

${wasteTotal}

</td>

<td id="system-${itemId}">

${systemEnding}

</td>

<td>

<input type="number"
id="actual-${itemId}"
value="${systemEnding}"
oninput="computeVariance(
'${itemId}',
${systemEnding}
)">

</td>

<td id="variance-${itemId}">

0

</td>

<td id="status-${itemId}"
class="good">

BALANCED

</td>

</tr>

`;

});

}

/* COMPUTE VARIANCE */

window.computeVariance =
function(itemId,systemEnding){

const actual =
Number(
document.getElementById(
`actual-${itemId}`
).value
);

const variance =
actual - systemEnding;

const varianceCell =
document.getElementById(
`variance-${itemId}`
);

const statusCell =
document.getElementById(
`status-${itemId}`
);

/* RESET */

varianceCell.className = "";
statusCell.className = "";

/* BALANCED */

if(variance === 0){

varianceCell.innerHTML = 0;

statusCell.innerHTML = "BALANCED";

varianceCell.classList.add("good");
statusCell.classList.add("good");

}

/* SHORT */

else if(variance < 0){

varianceCell.innerHTML = variance;

statusCell.innerHTML = "SHORT";

varianceCell.classList.add("short");
statusCell.classList.add("short");

}

/* OVER */

else{

varianceCell.innerHTML =
"+" + variance;

statusCell.innerHTML = "OVER";

varianceCell.classList.add("over");
statusCell.classList.add("over");

}

}

/* SAVE DAILY INVENTORY */

window.saveDailyInventory =
async function(){

const rows =
document.querySelectorAll(
"#dailyInventoryTable tr"
);

try{

for(const row of rows){

const cells =
row.querySelectorAll("td");

if(cells.length === 0) continue;

const date =
cells[0].innerText;

const item =
cells[1].innerText;

const beginning =
Number(cells[2].innerText);

const stockIn =
Number(cells[3].innerText);

const stockOut =
Number(cells[4].innerText);

const waste =
Number(cells[5].innerText);

const systemEnding =
Number(cells[6].innerText);

const actualCount =
Number(
cells[7]
.querySelector("input")
.value
);

const variance =
cells[8].innerText;

const status =
cells[9].innerText;

/* SAVE */

await addDoc(

collection(db,"dailyInventory"),

{

date:date,
item:item,
beginning:beginning,
stockIn:stockIn,
stockOut:stockOut,
waste:waste,
systemEnding:systemEnding,
actualCount:actualCount,
variance:variance,
status:status,
createdAt:new Date()

}

);

}

alert("Daily Inventory Saved!");

}catch(error){

console.error(error);

alert("Failed to save daily inventory");

}

}

/* LOAD */

loadDailyInventory();

</script>

</body>
</html>
