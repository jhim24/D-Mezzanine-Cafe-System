<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Daily Inventory</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

/* LAYOUT */

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#111827;
padding:20px;
overflow-y:auto;
}

.logo{
font-size:24px;
font-weight:700;
margin-bottom:30px;
color:#facc15;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
padding:15px;
border-radius:14px;
text-decoration:none;
color:white;
background:#1e293b;
transition:.3s;
display:flex;
align-items:center;
gap:10px;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow-y:auto;
}

/* HEADER */

.header{
margin-bottom:25px;
}

.header h1{
font-size:38px;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:2200px;
}

th{
background:#111827;
color:#facc15;
padding:15px;
text-align:left;
font-size:14px;
}

td{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.08);
font-size:14px;
}

/* INPUT */

.actual-input{
width:100px;
padding:10px;
border:none;
border-radius:8px;
background:#111827;
color:white;
}

/* BUTTONS */

.save-btn{
background:#22c55e;
border:none;
padding:10px 16px;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:700;
}

.refresh-btn{
background:#3b82f6;
border:none;
padding:10px 16px;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:700;
margin-bottom:20px;
}

/* VARIANCE */

.positive{
color:#22c55e;
font-weight:700;
}

.negative{
color:#ef4444;
font-weight:700;
}

/* MOBILE */

@media(max-width:900px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
}

.menu{
flex-direction:row;
}

.menu a{
min-width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

D'Mezzanine

</div>

<div class="menu">

<a href="index.html">

<i class="fa-solid fa-chart-line"></i>
Dashboard

</a>

<a href="items-masterlist.html">

<i class="fa-solid fa-box"></i>
Items Masterlist

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>
Stock In

</a>

<a href="stock-out.html">

<i class="fa-solid fa-arrow-right-arrow-left"></i>
Stock Out

</a>

<a href="waste.html">

<i class="fa-solid fa-trash"></i>
Waste

</a>

<a href="daily-inventory.html"
class="active">

<i class="fa-solid fa-clipboard-list"></i>
Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<h1>Daily Inventory 📋</h1>

</div>

<button class="refresh-btn"
onclick="loadDailyInventory()">

<i class="fa-solid fa-rotate-right"></i>
Refresh Inventory

</button>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Date</th>
<th>Item</th>
<th>Beginning</th>
<th>Stock In</th>
<th>Sold</th>
<th>Stock Out</th>
<th>Waste</th>
<th>System Ending</th>
<th>Actual Count</th>
<th>Variance</th>
<th>Final Ending</th>
<th>Action</th>

</tr>

</thead>

<tbody id="dailyTable">

<tr>

<td colspan="12">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
doc,
setDoc

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* LOAD DAILY INVENTORY */

window.loadDailyInventory =
async function(){

const table =
document.getElementById("dailyTable");

table.innerHTML = "";

const today =
new Date().toISOString().split("T")[0];

/* COLLECTIONS */

const itemsSnapshot =
await getDocs(
collection(db,"inventoryMasterlist")
);

const stockInSnapshot =
await getDocs(
collection(db,"stockIn")
);

const stockOutSnapshot =
await getDocs(
collection(db,"stockOut")
);

const wasteSnapshot =
await getDocs(
collection(db,"waste")
);

const salesSnapshot =
await getDocs(
collection(db,"sales")
);

/* LOOP ITEMS */

for(const firebaseDoc of itemsSnapshot.docs){

const item =
firebaseDoc.data();

const itemId =
firebaseDoc.id;

const itemName =
item.itemName;

const currentStock =
Number(item.stock || 0);

/* COMPUTE */

let stockIn = 0;
let stockOut = 0;
let waste = 0;
let sold = 0;

/* STOCK IN */

stockInSnapshot.forEach((doc)=>{

const data =
doc.data();

if(data.itemId === itemId){

stockIn +=
Number(data.quantity || 0);

}

});

/* STOCK OUT */

stockOutSnapshot.forEach((doc)=>{

const data =
doc.data();

if(data.itemId === itemId){

stockOut +=
Number(data.quantity || 0);

}

});

/* WASTE */

wasteSnapshot.forEach((doc)=>{

const data =
doc.data();

if(data.itemId === itemId){

waste +=
Number(data.quantity || 0);

}

});

/* SALES */
/* FIXED VERSION */

salesSnapshot.forEach((doc)=>{

const sale =
doc.data();

if(
sale.items &&
Array.isArray(sale.items)
){

sale.items.forEach((saleItem)=>{

/* IMPORTANT FIX */

if(
saleItem.name === itemName
){

sold +=
Number(saleItem.qty || 0);

}

});

}

});

/* BEGINNING */

const beginning =

currentStock
-
stockIn
+
sold
+
stockOut
+
waste;

/* SYSTEM ENDING */

const systemEnding =

beginning
+
stockIn
-
sold
-
stockOut
-
waste;

table.innerHTML += `

<tr>

<td>${today}</td>

<td>${itemName}</td>

<td>${beginning}</td>

<td>${stockIn}</td>

<td>${sold}</td>

<td>${stockOut}</td>

<td>${waste}</td>

<td>${systemEnding}</td>

<td>

<input
type="number"
class="actual-input"
id="actual-${itemId}"
value="${systemEnding}">

</td>

<td id="variance-${itemId}">
0
</td>

<td id="ending-${itemId}">
${systemEnding}
</td>

<td>

<button
class="save-btn"
onclick="saveDailyInventory(
'${itemId}',
'${itemName}',
${beginning},
${stockIn},
${sold},
${stockOut},
${waste},
${systemEnding}
)">

Save

</button>

</td>

</tr>

`;

}

}

/* SAVE DAILY INVENTORY */

window.saveDailyInventory =
async function(
itemId,
itemName,
beginning,
stockIn,
sold,
stockOut,
waste,
systemEnding
){

try{

const actualCount =
Number(
document.getElementById(
`actual-${itemId}`
).value
);

const variance =
actualCount - systemEnding;

const finalEnding =
actualCount;

document.getElementById(
`variance-${itemId}`
).innerHTML =

variance >= 0

?

`<span class="positive">
${variance}
</span>`

:

`<span class="negative">
${variance}
</span>`;

document.getElementById(
`ending-${itemId}`
).innerText =
finalEnding;

const today =
new Date().toISOString().split("T")[0];

await setDoc(

doc(
db,
"dailyInventory",
today + "_" + itemId
),

{

date:today,

itemId,

itemName,

beginning,

stockIn,

sold,

stockOut,

waste,

systemEnding,

actualCount,

variance,

finalEnding,

createdAt:
new Date()

}

);

alert("Daily Inventory Saved");

}catch(error){

console.error(error);

alert(error.message);

}

}

/* LOAD */

loadDailyInventory();

</script>

</body>
</html>
