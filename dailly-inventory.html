<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Daily Inventory</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:300px;
background:#111827;
padding:20px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo-box{
display:flex;
align-items:center;
gap:14px;
margin-bottom:30px;
}

.logo-box img{
width:65px;
height:65px;
border-radius:50%;
background:white;
padding:5px;
border:3px solid #facc15;
object-fit:contain;
}

.logo-text h2{
font-size:20px;
font-weight:700;
}

.logo-text p{
font-size:13px;
color:#d1d5db;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-title{
font-size:13px;
font-weight:700;
color:#facc15;
margin-top:15px;
padding-left:5px;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:15px;
border-radius:16px;
text-decoration:none;
color:white;
transition:.3s;
background:rgba(255,255,255,0.03);
font-size:15px;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
transform:translateX(4px);
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow-y:auto;
}

/* HEADER */

.header-box{
background:#1e293b;
padding:25px;
border-radius:24px;
margin-bottom:25px;
}

.header-box h1{
font-size:38px;
}

.header-box p{
color:#cbd5e1;
margin-top:8px;
}

/* TOP FORM */

.top-form{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:25px;

display:flex;
gap:15px;
align-items:center;
flex-wrap:wrap;
}

.top-form input{
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;
font-size:14px;
}

.generate-btn{
background:#facc15;
color:black;
border:none;
padding:14px 20px;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:24px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1600px;
}

th{
background:#111827;
color:#facc15;
padding:14px;
font-size:13px;
text-align:center;
white-space:nowrap;
}

td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.08);
text-align:center;
white-space:nowrap;
}

input.actual-input{
width:100px;
padding:10px;
border:none;
border-radius:8px;
background:#111827;
color:white;
text-align:center;
}

/* BUTTON */

.save-btn{
background:#22c55e;
border:none;
padding:10px 14px;
border-radius:10px;
font-weight:700;
color:white;
cursor:pointer;
}

/* STATUS */

.good{
color:#22c55e;
font-weight:700;
}

.bad{
color:#ef4444;
font-weight:700;
}

/* MOBILE */

@media(max-width:950px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
}

.menu{
flex-direction:row;
}

.menu a{
min-width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Inventory System</p>

</div>

</div>

<div class="menu">

<p class="menu-title">
STOCKROOM
</p>

<a href="stockroom.html">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="items.html">

<i class="fa-solid fa-boxes-stacked"></i>

Items

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>

Stock In

</a>

<a href="stock-out.html">

<i class="fa-solid fa-arrow-right-arrow-left"></i>

Stock Out

</a>

<a href="waste.html">

<i class="fa-solid fa-trash"></i>

Waste

</a>

<a href="daily-inventory.html"
class="active">

<i class="fa-solid fa-clipboard-list"></i>

Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header-box">

<h1>Daily Inventory 📋</h1>

<p id="dateTime"></p>

</div>

<!-- TOP -->

<div class="top-form">

<input type="date"
id="inventoryDate">

<button class="generate-btn"
onclick="generateInventory()">

Generate Inventory

</button>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Item</th>
<th>Beginning</th>
<th>Stock In</th>
<th>Stock Out</th>
<th>Waste</th>
<th>Expected</th>
<th>Actual Count</th>
<th>Variance</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="inventoryTable">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
query,
where,
addDoc

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_AUTH_DOMAIN",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_STORAGE_BUCKET",

messagingSenderId: "YOUR_MESSAGING_SENDER_ID",

appId: "YOUR_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* DATE TIME */

function updateDateTime(){

document.getElementById("dateTime")
.innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();

/* GENERATE */

window.generateInventory =
async function(){

const date =
document.getElementById("inventoryDate").value;

if(!date){

alert("Select date");

return;

}

const table =
document.getElementById("inventoryTable");

table.innerHTML = "";

/* ITEMS */

const itemsSnapshot =
await getDocs(
collection(db,"inventoryItems")
);

/* STOCK IN */

const stockInSnapshot =
await getDocs(
query(
collection(db,"stockIn"),
where("date","==",date)
)
);

/* STOCK OUT */

const stockOutSnapshot =
await getDocs(
query(
collection(db,"stockOut"),
where("date","==",date)
)
);

/* WASTE */

const wasteSnapshot =
await getDocs(
query(
collection(db,"waste"),
where("date","==",date)
)
);

let stockInMap = {};
let stockOutMap = {};
let wasteMap = {};

/* STOCK IN MAP */

stockInSnapshot.forEach(docu=>{

const data =
docu.data();

if(!stockInMap[data.itemId]){

stockInMap[data.itemId] = 0;

}

stockInMap[data.itemId] +=
Number(data.qty || 0);

});

/* STOCK OUT MAP */

stockOutSnapshot.forEach(docu=>{

const data =
docu.data();

if(!stockOutMap[data.itemId]){

stockOutMap[data.itemId] = 0;

}

stockOutMap[data.itemId] +=
Number(data.qty || 0);

});

/* WASTE MAP */

wasteSnapshot.forEach(docu=>{

const data =
docu.data();

if(!wasteMap[data.itemId]){

wasteMap[data.itemId] = 0;

}

wasteMap[data.itemId] +=
Number(data.qty || 0);

});

/* ITEMS LOOP */

itemsSnapshot.forEach((firebaseDoc)=>{

const item =
firebaseDoc.data();

const itemId =
firebaseDoc.id;

const beginning =
Number(item.stock || 0);

const stockIn =
stockInMap[itemId] || 0;

const stockOut =
stockOutMap[itemId] || 0;

const waste =
wasteMap[itemId] || 0;

const expected =

beginning +
stockIn -
stockOut -
waste;

table.innerHTML += `

<tr>

<td>${item.name}</td>

<td>${beginning}</td>

<td>${stockIn}</td>

<td>${stockOut}</td>

<td>${waste}</td>

<td>${expected}</td>

<td>

<input
type="number"
class="actual-input"
id="actual-${itemId}"
value="${expected}">

</td>

<td id="variance-${itemId}">
0
</td>

<td id="status-${itemId}"
class="good">

GOOD

</td>

<td>

<button
class="save-btn"
onclick="saveDailyInventory(
'${itemId}',
'${item.name}',
${beginning},
${stockIn},
${stockOut},
${waste},
${expected}
)">

Save

</button>

</td>

</tr>

`;

});

};

/* SAVE */

window.saveDailyInventory =
async function(

itemId,
itemName,
beginning,
stockIn,
stockOut,
waste,
expected

){

const date =
document.getElementById("inventoryDate").value;

const actual =
Number(
document.getElementById(
`actual-${itemId}`
).value
);

const variance =
actual - expected;

const varianceCell =
document.getElementById(
`variance-${itemId}`
);

const statusCell =
document.getElementById(
`status-${itemId}`
);

/* UI */

varianceCell.innerText =
variance;

if(variance === 0){

statusCell.innerText =
"GOOD";

statusCell.className =
"good";

}else{

statusCell.innerText =
"WITH VARIANCE";

statusCell.className =
"bad";

}

/* SAVE FIREBASE */

await addDoc(
collection(db,"dailyInventory"),
{

date:date,
itemId:itemId,
itemName:itemName,

beginning:beginning,
stockIn:stockIn,
stockOut:stockOut,
waste:waste,

expected:expected,
actual:actual,
variance:variance,

createdAt:new Date()

}
);

alert("Daily Inventory Saved");

};

</script>

</body>
</html>
