<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales Report</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

.topbar h1{
    font-size:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
}

.card h3{
    color:#cbd5e1;
    margin-bottom:10px;
}

.card h2{
    color:#facc15;
    font-size:30px;
}

.table-box{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#111827;
    color:#facc15;
    padding:15px;
    text-align:left;
    white-space:nowrap;
}

table td{
    padding:15px;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    background:#facc15;
    color:black;
    padding:12px 18px;
    border-radius:12px;
    font-weight:600;
}

.total-row{
    color:#4ade80;
    font-weight:600;
}

.loading{
    text-align:center;
    padding:30px;
    color:#cbd5e1;
}

@media(max-width:700px){

table{
    font-size:12px;
}

.card h2{
    font-size:24px;
}

}

</style>

</head>

<body>

<a href="index.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i>
    Dashboard
</a>

<div class="topbar">

    <h1>Sales Report 📊</h1>

    <h2 id="todayDate"></h2>

</div>

<div class="cards">

    <div class="card">

        <h3>Today's Sales</h3>

        <h2 id="todaySales">₱0</h2>

    </div>

    <div class="card">

        <h3>Total Orders</h3>

        <h2 id="totalOrders">0</h2>

    </div>

</div>

<div class="table-box">

    <table>

        <thead>

            <tr>

                <th>Order Date</th>

                <th>Product</th>

                <th>Quantity</th>

                <th>Total Amount</th>

            </tr>

        </thead>

        <tbody id="salesTable">

            <tr>

                <td colspan="4" class="loading">
                    Loading sales...
                </td>

            </tr>

        </tbody>

    </table>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

    getFirestore,
    collection,
    getDocs,
    query,
    orderBy

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyAdOguugiFH6-3OQK1HsYGfkCIXVTK9Wc4",

    authDomain: "d-mezzanine-cafe.firebaseapp.com",

    projectId: "d-mezzanine-cafe",

    storageBucket: "d-mezzanine-cafe.firebasestorage.app",

    messagingSenderId: "586558456999",

    appId: "1:586558456999:web:86fd07961a36abc2de0782",

    measurementId: "G-C48ZSREBT1"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

document.getElementById("todayDate").innerText =
new Date().toLocaleDateString();

async function loadSales(){

    try{

        const salesTable = document.getElementById("salesTable");

        salesTable.innerHTML = "";

        let totalToday = 0;

        let totalOrders = 0;

        let today = new Date().toLocaleDateString();

        const q = query(

            collection(db,"sales")

        );

        const querySnapshot = await getDocs(q);

        if(querySnapshot.empty){

            salesTable.innerHTML = `

            <tr>

                <td colspan="4" class="loading">
                    No sales found
                </td>

            </tr>

            `;

        }

        querySnapshot.forEach((doc)=>{

            const sale = doc.data();

            totalOrders++;

            let saleDate = new Date(sale.date).toLocaleDateString();

            if(saleDate === today){

                totalToday += sale.total;

            }

            if(sale.items){

                sale.items.forEach(item=>{

                    salesTable.innerHTML += `

                    <tr>

                        <td>${sale.date}</td>

                        <td>${item.name}</td>

                        <td>${item.qty}</td>

                        <td class="total-row">
                            ₱${item.price * item.qty}
                        </td>

                    </tr>

                    `;

                });

            }

        });

        document.getElementById("todaySales").innerText =

        "₱" + totalToday.toLocaleString();

        document.getElementById("totalOrders").innerText =

        totalOrders;

    }catch(error){

        console.log(error);

        document.getElementById("salesTable").innerHTML = `

        <tr>

            <td colspan="4" class="loading">
                Failed to load Firebase sales
            </td>

        </tr>

        `;

    }

}

loadSales();

</script>

</body>
</html>
