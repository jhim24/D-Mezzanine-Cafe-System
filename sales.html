<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales Report</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.topbar h1{
font-size:32px;
}

/* BUTTONS */

.back-btn{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
background:#facc15;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:600;
}

.filter-btn,
.print-btn{
border:none;
padding:12px 18px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.filter-btn{
background:#facc15;
color:black;
}

.print-btn{
background:#22c55e;
color:white;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

.card h3{
color:#cbd5e1;
margin-bottom:10px;
font-size:15px;
}

.card h2{
color:#facc15;
font-size:30px;
}

/* FILTER */

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.filters input{
padding:12px;
border:none;
border-radius:10px;
background:#111827;
color:white;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:20px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#111827;
color:#facc15;
padding:15px;
text-align:left;
white-space:nowrap;
}

table td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
font-size:14px;
}

.total-row{
color:#4ade80;
font-weight:700;
}

.loading{
text-align:center;
padding:30px;
color:#cbd5e1;
}

/* ACTION BUTTONS */

.view-btn{
background:#2563eb;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-right:5px;
font-weight:600;
}

.print-btn{
background:#22c55e;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin-right:5px;
}

.delete-btn{
background:#ef4444;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.delete-btn:hover{
background:#dc2626;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
padding:20px;
}

.modal-content{
background:#1e293b;
padding:25px;
border-radius:20px;
max-width:700px;
width:95%;
margin:auto;
margin-top:50px;
color:white;
position:relative;
}

.close-btn{
position:absolute;
right:20px;
top:10px;
font-size:30px;
cursor:pointer;
color:#facc15;
}

/* PRINT */

@media print{

body{
background:white;
color:black;
padding:0;
}

#salesChart{
display:none !important;
}

.back-btn,
.filters,
.delete-btn,
.view-btn,
.no-print,
th:last-child,
td:last-child{
display:none !important;
}

.card{
background:white;
border:1px solid #ccc;
color:black;
}

.card h3,
.card h2{
color:black;
}

.table-box{
background:white;
padding:0;
}

table th{
background:#ddd;
color:black;
}

table td{
color:black;
border-bottom:1px solid #ccc;
}

}

/* MOBILE */

@media(max-width:700px){

table{
font-size:12px;
}

.card h2{
font-size:24px;
}

}

</style>

</head>

<body>

<a href="index.html"
class="back-btn">

<i class="fa-solid fa-arrow-left"></i>
Dashboard

</a>

<div class="topbar">

<h1>Sales Report 📊</h1>

<h2 id="todayDate"></h2>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">
<h3>Today's Sales</h3>
<h2 id="todaySales">₱0</h2>
</div>

<div class="card">
<h3>Total Sales</h3>
<h2 id="overallSales">₱0</h2>
</div>

<div class="card">
<h3>Total Orders</h3>
<h2 id="totalOrders">0</h2>
</div>

<div class="card">
<h3>Cash Sales</h3>
<h2 id="cashSales">₱0</h2>
</div>

<div class="card">
<h3>GCash Sales</h3>
<h2 id="gcashSales">₱0</h2>
</div>

<div class="card">
<h3>Card Sales</h3>
<h2 id="cardSales">₱0</h2>
</div>

<div class="card">
<h3>Top Product</h3>
<h2 id="topProduct">-</h2>
</div>

</div>

<!-- FILTERS -->

<div class="filters no-print">

<input type="date" id="startDate">
<input type="date" id="endDate">

<button class="filter-btn"
onclick="loadSales()">

<i class="fa-solid fa-filter"></i>
Filter

</button>

<button class="print-btn"
onclick="window.print()">

<i class="fa-solid fa-print"></i>
Print Report

</button>

<button class="print-btn"
onclick="closeShift()">

<i class="fa-solid fa-cash-register"></i>
Close Shift

</button>

<button class="filter-btn"
onclick="filterToday()">

Today

</button>

<button class="filter-btn"
onclick="filterWeek()">

This Week

</button>

<button class="filter-btn"
onclick="filterMonth()">

This Month

</button>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Order Date</th>
<th>Product</th>
<th>Qty</th>
<th>Gross Sales</th>
<th>Senior Disc.</th>
<th>PWD Disc.</th>
<th>Net Sales</th>
<th>Payment</th>
<th>Reference</th>
<th>Action</th>

</tr>

</thead>

<tbody id="salesTable">

<tr>

<td colspan="10"
class="loading">

Loading sales...

</td>

</tr>

</tbody>

</table>

</div>

<!-- MODAL -->

<div id="viewModal"
class="modal">

<div class="modal-content">

<span class="close-btn"
onclick="closeModal()">

&times;

</span>

<h2>Sale Details</h2>

<br>

<div id="saleDetails"></div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
authDomain: "family-web-10cb8.firebaseapp.com",
projectId: "family-web-10cb8",
storageBucket: "family-web-10cb8.firebasestorage.app",
messagingSenderId: "152048365178",
appId: "1:152048365178:web:3e42c20e03a7c563d915c3",
measurementId: "G-1X8L2KQDYF"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const adminPassword = "admin123";

document.getElementById("todayDate")
.innerText =
new Date().toLocaleDateString();

window.closeModal =
function(){

document.getElementById("viewModal")
.style.display = "none";

}

window.viewSale =
function(sale){

document.getElementById("saleDetails")
.innerHTML = `

<table style="
width:100%;
border-collapse:collapse;
">

<tr>
<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);">
Gross Sales
</td>

<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);text-align:right;">
₱${Number(sale.subtotal || 0).toLocaleString()}
</td>
</tr>

<tr>
<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);">
Senior Discount
</td>

<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);text-align:right;">
₱${Number(sale.seniorDiscount || 0).toLocaleString()}
</td>
</tr>

<tr>
<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);">
PWD Discount
</td>

<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);text-align:right;">
₱${Number(sale.pwdDiscount || 0).toLocaleString()}
</td>
</tr>

<tr>
<td style="padding:12px;font-weight:bold;color:#4ade80;border:1px solid rgba(255,255,255,0.1);">
Net Sales
</td>

<td style="padding:12px;text-align:right;font-weight:bold;color:#4ade80;border:1px solid rgba(255,255,255,0.1);">
₱${Number(sale.total || 0).toLocaleString()}
</td>
</tr>

</table>

`;

document.getElementById("viewModal")
.style.display = "block";

}

</script>

</body>
</html>
