<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales Report</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:30px;
}

h1{
    color:#facc15;
}

a{
    display:inline-block;
    margin-bottom:20px;
    background:#facc15;
    color:black;
    padding:12px 18px;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#111827;
    color:#facc15;
    padding:15px;
}

td{
    padding:15px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

</style>

</head>

<body>

<a href="index.html">
Dashboard
</a>

<h1>Sales Report 📊</h1>

<div class="card">

    <h2>
        Today's Sales:
        ₱ <span id="todaySales">0</span>
    </h2>

</div>

<div class="card">

    <table>

        <thead>

            <tr>
                <th>Date</th>
                <th>Total</th>
            </tr>

        </thead>

        <tbody id="salesTable"></tbody>

    </table>

</div>

<script>

let sales = JSON.parse(localStorage.getItem("sales")) || [];

let today = new Date().toLocaleDateString();

let totalToday = 0;

sales.reverse().forEach(sale=>{

    let saleDate = new Date(sale.date).toLocaleDateString();

    if(saleDate === today){

        totalToday += sale.total;

    }

    document.getElementById("salesTable").innerHTML += `

        <tr>

            <td>${sale.date}</td>

            <td>₱${sale.total}</td>

        </tr>

    `;

});

document.getElementById("todaySales").innerText =
totalToday.toLocaleString();

</script>

</body>
</html>
