top:10px;  
font-size:30px;  
cursor:pointer;

/* LOAD SALES */  
  
window.loadSales =  
async function(){  
  
try{  
  
const salesTable =  
document.getElementById("salesTable");  
  
salesTable.innerHTML = "";  
  
let totalToday = 0;  
window.overallSales = 0;  
window.totalOrders = 0;  
  
window.cashSales = 0;  
window.gcashSales = 0;  
window.cardSales = 0;  
  
let productCounter = {};  
let dailySales = {};  
let today =  
new Date().toLocaleDateString();  
  
const startDate =  
document.getElementById("startDate").value;  
  
const endDate =  
document.getElementById("endDate").value;  
  
const querySnapshot =  
await getDocs(  
collection(db,"sales")  
);  
  
salesData = [];
  
querySnapshot.forEach((firebaseDoc)=>{  
  
    salesData.push({  
  
        id: firebaseDoc.id,  
  
        ...firebaseDoc.data()  
  
    });  
  
});  
  
/* SORT NEWEST FIRST */  
  
salesData.sort((a,b)=>  
  
    new Date(  
        b.date || b.createdAt  
    )  
  
    -  
  
    new Date(  
        a.date || a.createdAt  
    )  
  
);  
  
/* LOOP SALES */  
  
/* SORT BY LATEST DATE */  
  
salesData.sort((a,b)=>{  
  
    return new Date(b.date || b.createdAt)  
    -  
    new Date(a.date || a.createdAt);  
  
});  
  
if(querySnapshot.empty){  
  
salesTable.innerHTML = `  
  
<tr>  
  
<td colspan="7"  
class="loading">  
  
No sales found  
  
</td>  
  
</tr>  
  
`;  
  
return;  
  
}  
  
salesData.forEach((sale)=>{  
  
let rawDate =  
sale.date ||  
sale.createdAt ||  
new Date();  
  
let saleDateObject =  
new Date(rawDate);  
  
let saleDate =  
!isNaN(saleDateObject)  
? saleDateObject.toLocaleString()  
: "No Date";  
  
let saleOnlyDate = "";  
  
if(!isNaN(saleDateObject)){  
  
saleOnlyDate =  
saleDateObject  
.toISOString()  
.split('T')[0];  
  
}  
  
if(startDate &&  
saleOnlyDate < startDate){  
  
return;  
  
}  
  
if(endDate &&  
saleOnlyDate > endDate){  
  
return;  
  
}  
  
totalOrders++;  
overallSales =  
overallSales +  
Number(sale.total || 0);  
if(!isNaN(saleDateObject)){  
  
let chartDate =  
saleDateObject  
.toLocaleDateString();  
  
if(!dailySales[chartDate]){  
  
dailySales[chartDate] = 0;  
  
}  
  
dailySales[chartDate] +=  
Number(sale.total || 0);  
  
}  
    
if(  
!isNaN(saleDateObject) &&  
saleDateObject.toLocaleDateString()  
=== today  
){  
  
totalToday +=  
Number(sale.total || 0);  
  
}  
  
const paymentMethod =  
sale.paymentMethod || "Cash";  
  
if(paymentMethod === "Cash"){  
  
cashSales +=  
Number(sale.total || 0);  
  
}  
  
if(paymentMethod === "GCash"){  
  
gcashSales +=  
Number(sale.total || 0);  
  
}  
  
if(paymentMethod === "Card"){  
  
cardSales +=  
Number(sale.total || 0);  
  
}  
  
/* PRODUCT COUNTER */  
  
if(sale.items){  
  
sale.items.forEach((item)=>{  
  
if(!productCounter[item.name]){  
  
productCounter[item.name] = 0;  
  
}  
  
productCounter[item.name] +=  
Number(item.qty || 1);  
  
});  
  
}  
  
/* TABLE */  
  
if(  
sale.items &&  
sale.items.length > 0  
){  
  
sale.items.forEach((item)=>{  
  
salesTable.innerHTML += `  
  
<tr>  
  
<td>${saleDate}</td>  
  
<td>${item.name || "-"}</td>  
  
<td>${item.qty || 0}</td>  
  
<td>${sale.paymentMethod || "Cash"}</td>  
  
<td>${sale.referenceNumber || "-"}</td>  
  
<td class="total-row">  
  
₱${(  
(item.price || 0)  
*  
(item.qty || 0)  
).toLocaleString()}  
  
</td>  
  
<td>  
  
<button class="view-btn"  
onclick='viewSale(${JSON.stringify(sale)})'>  
  
View  
  
</button>  
  
<button class="print-btn"  
onclick='printReceipt(${JSON.stringify(sale)})'>  
  
Receipt  
  
</button>  
  
<button class="delete-btn"

Delete  
  
</button>  
  
</td>  
  
</tr>  
  
`;  
  
});  
  
}else{  
  
salesTable.innerHTML += `  
  
<tr>  
  
<td>${saleDate}</td>  
  
<td>Old Transaction</td>  
  
<td>-</td>  
  
<td>${sale.paymentMethod || "Cash"}</td>  
  
<td>${sale.referenceNumber || "-"}</td>  
  
<td class="total-row">  
  
₱${Number(  
sale.total || 0  
).toLocaleString()}  
  
</td>  
  
<td>  
  
<button class="view-btn"  
onclick='viewSale(${JSON.stringify(sale)})'>  
  
View  
  
</button>  
  
<button class="delete-btn"  
onclick="deleteSale('${sale.id}')"  
  
Delete  
  
</button>  
  
</td>  
  
</tr>  
  
`;  
  
}  
  
});  
  
/* UPDATE CARDS */  
  
document.getElementById("todaySales")  
.innerText =  
"₱" +  
totalToday.toLocaleString();  
document.getElementById("overallSales")  
.innerText =  
"₱" +  
overallSales.toLocaleString();  
document.getElementById("totalOrders")  
.innerText =  
totalOrders;  
  
document.getElementById("cashSales")  
.innerText =  
"₱" +  
cashSales.toLocaleString();  
  
document.getElementById("gcashSales")  
.innerText =  
"₱" +  
gcashSales.toLocaleString();  
  
document.getElementById("cardSales")  
.innerText =  
"₱" +  
cardSales.toLocaleString();  
  
/* TOP PRODUCT */  
  
let topProduct = "-";  
let highest = 0;  
  
for(let product in productCounter){  
  
if(  
productCounter[product]  
> highest  
){  
  
highest =  
productCounter[product];  
  
topProduct =  
product;  
  
}  
  
}  
  
document.getElementById("topProduct")  
.innerText =  
topProduct;

Object.keys(dailySales);  
  
const values =  
Object.values(dailySales);  
  
const ctx =  
document.getElementById("salesChart");

options:{  
  
responsive:true,  
  
plugins:{  
  
legend:{  
labels:{

}  
  
},  
  
scales:{  
  
x:{

}  
},  
  
y:{  
ticks:{  
color:"white"  
}  
}  
  
}  
  
}  
  
});

function(){

new Date();

new Date(  
today.getFullYear(),  
today.getMonth(),  
1
