<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Sales Report</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
}

.title-box h1{
font-size:32px;
font-weight:700;
}

.title-box p{
color:#94a3b8;
margin-top:5px;
}

.header-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:12px 18px;
border-radius:14px;
font-weight:600;
cursor:pointer;
transition:0.3s;
font-size:14px;
}

.btn:hover{
transform:translateY(-2px);
}

.btn-dashboard{
background:#facc15;
color:black;
text-decoration:none;
display:flex;
align-items:center;
gap:8px;
}

.btn-print{
background:#22c55e;
color:white;
}

.btn-shift{
background:#3b82f6;
color:white;
}

.btn-filter{
background:#f97316;
color:white;
}

/* DASHBOARD CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:linear-gradient(145deg,#1e293b,#111827);
padding:24px;
border-radius:22px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
position:relative;
overflow:hidden;
border:1px solid rgba(255,255,255,0.05);
}

.card::before{
content:'';
position:absolute;
right:-20px;
top:-20px;
width:100px;
height:100px;
background:rgba(255,255,255,0.03);
border-radius:50%;
}

.card .icon{
font-size:28px;
margin-bottom:12px;
color:#facc15;
}

.card h3{
font-size:14px;
font-weight:500;
color:#cbd5e1;
margin-bottom:10px;
}

.card h2{
font-size:30px;
font-weight:700;
}

/* FILTERS */

.filters{
background:#1e293b;
padding:20px;
border-radius:20px;
display:flex;
flex-wrap:wrap;
gap:15px;
align-items:center;
margin-bottom:25px;
}

.filters input,
.filters select{
padding:12px 15px;
background:#111827;
border:1px solid rgba(255,255,255,0.08);
border-radius:12px;
color:white;
outline:none;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:22px;
overflow-x:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#111827;
color:#facc15;
padding:16px;
font-size:14px;
font-weight:600;
text-align:left;
white-space:nowrap;
}

table td{
padding:16px;
border-bottom:1px solid rgba(255,255,255,0.06);
font-size:14px;
white-space:nowrap;
}

tr:hover{
background:rgba(255,255,255,0.03);
}

.total-row{
color:#4ade80;
font-weight:700;
}

/* BADGES */

.badge{
padding:6px 12px;
border-radius:50px;
font-size:12px;
font-weight:600;
}

.cash{
background:rgba(34,197,94,0.15);
color:#4ade80;
}

.gcash{
background:rgba(59,130,246,0.15);
color:#60a5fa;
}

.cardpay{
background:rgba(168,85,247,0.15);
color:#c084fc;
}

/* ACTION BUTTONS */

.action-btn{
border:none;
padding:8px 12px;
border-radius:10px;
font-size:13px;
font-weight:600;
cursor:pointer;
margin-right:5px;
margin-bottom:5px;
}

.view-btn{
background:#2563eb;
color:white;
}

.receipt-btn{
background:#22c55e;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
padding:20px;
overflow:auto;
}

.modal-content{
background:#1e293b;
max-width:1000px;
width:100%;
margin:auto;
padding:25px;
border-radius:22px;
position:relative;
margin-top:30px;
}

.close-btn{
position:absolute;
right:20px;
top:15px;
font-size:28px;
cursor:pointer;
color:#facc15;
}

/* RESPONSIVE */

@media(max-width:768px){

.header{
flex-direction:column;
align-items:flex-start;
}

.title-box h1{
font-size:24px;
}

.card h2{
font-size:24px;
}

.filters{
flex-direction:column;
align-items:stretch;
}

.filters input,
.filters select,
.filters button{
width:100%;
}

}

@media print{

body{
background:white;
color:black;
}

.header-actions,
.filters,
.action-btn,
.close-btn{
display:none;
}

.table-box,
.card,
.modal-content{
box-shadow:none;
border:1px solid #ccc;
}

}

</style>
</head>
<body>

<div class="header">

<div class="title-box">
<h1>Sales Report Dashboard 📊</h1>
<p id="todayDate"></p>
</div>

<div class="header-actions">
<a href="index.html" class="btn btn-dashboard">
<i class="fa-solid fa-arrow-left"></i>
Dashboard
</a>

<button class="btn btn-print" onclick="window.print()">
<i class="fa-solid fa-print"></i>
Print Report
</button>

<button class="btn btn-shift" onclick="closeShift()">
<i class="fa-solid fa-cash-register"></i>
Close Shift
</button>
</div>

</div>

<!-- DASHBOARD CARDS -->

<div class="cards">

<div class="card">
<div class="icon"><i class="fa-solid fa-money-bill-wave"></i></div>
<h3>Total Sales</h3>
<h2 id="overallSales">₱0</h2>
</div>

<div class="card">
<div class="icon"><i class="fa-solid fa-cart-shopping"></i></div>
<h3>Total Orders</h3>
<h2 id="totalOrders">0</h2>
</div>

<div class="card">
<div class="icon"><i class="fa-solid fa-cash-register"></i></div>
<h3>Cash Sales</h3>
<h2 id="cashSales">₱0</h2>
</div>

<div class="card">
<div class="icon"><i class="fa-solid fa-wallet"></i></div>
<h3>GCash Sales</h3>
<h2 id="gcashSales">₱0</h2>
</div>

<div class="card">
<div class="icon"><i class="fa-solid fa-credit-card"></i></div>
<h3>Card Sales</h3>
<h2 id="cardSales">₱0</h2>
</div>

<div class="card">
<div class="icon"><i class="fa-solid fa-star"></i></div>
<h3>Top Product</h3>
<h2 id="topProduct">-</h2>
</div>

</div>

<!-- FILTERS -->

<div class="filters">

<input type="date" id="startDate">
<input type="date" id="endDate">

<select id="paymentFilter">
<option value="All">All Payments</option>
<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
<option value="Card">Card</option>
</select>

<button class="btn btn-filter" onclick="loadSales()">
<i class="fa-solid fa-filter"></i>
Filter Sales
</button>

</div>

<!-- TABLE -->

<div class="table-box">
<table>
<thead>
<tr>
<th>Date</th>
<th>Product</th>
<th>Qty</th>
<th>Gross</th>
<th>Discount</th>
<th>Net</th>
<th>Payment</th>
<th>Reference</th>
<th>Action</th>
</tr>
</thead>

<tbody id="salesTable">
<tr>
<td colspan="9" style="text-align:center;padding:30px;">
Loading Sales...
</td>
</tr>
</tbody>

</table>
</div>

<!-- MODAL -->

<div class="modal" id="viewModal">
<div class="modal-content">
<span class="close-btn" onclick="closeModal()">&times;</span>
<div id="saleDetails"></div>
</div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_STORAGE_BUCKET",
messagingSenderId: "YOUR_SENDER_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let overallSales = 0;
let totalOrders = 0;
let cashSales = 0;
let gcashSales = 0;
let cardSales = 0;

const productCounter = {};

document.getElementById("todayDate").innerText =
new Date().toLocaleString();

window.closeModal = function(){
document.getElementById("viewModal").style.display = "none";
}

window.loadSales = async function(){

const salesTable = document.getElementById("salesTable");
salesTable.innerHTML = "";

overallSales = 0;
totalOrders = 0;
cashSales = 0;
gcashSales = 0;
cardSales = 0;

const paymentFilter = document.getElementById("paymentFilter").value;
const startDate = document.getElementById("startDate").value;
const endDate = document.getElementById("endDate").value;

const querySnapshot = await getDocs(collection(db,"sales"));

let salesData = [];

querySnapshot.forEach((firebaseDoc)=>{

salesData.push({
id: firebaseDoc.id,
...firebaseDoc.data()
});

});

salesData.sort((a,b)=>
new Date(b.date || b.createdAt)
-
new Date(a.date || a.createdAt)
);

salesData.forEach((sale)=>{

const saleDateRaw = new Date(sale.date || sale.createdAt);
const saleDate = saleDateRaw.toLocaleString();

if(startDate){
if(saleDateRaw < new Date(startDate)) return;
}

if(endDate){
if(saleDateRaw > new Date(endDate + 'T23:59:59')) return;
}

if(paymentFilter !== 'All' && sale.paymentMethod !== paymentFilter){
return;
}

overallSales += Number(sale.total || 0);
totalOrders++;

if(sale.paymentMethod === 'Cash'){
cashSales += Number(sale.total || 0);
}

if(sale.paymentMethod === 'GCash'){
gcashSales += Number(sale.total || 0);
}

if(sale.paymentMethod === 'Card'){
cardSales += Number(sale.total || 0);
}

if(sale.items){

sale.items.forEach((item)=>{

if(!productCounter[item.name]){
productCounter[item.name] = 0;
}

productCounter[item.name] += Number(item.qty || 0);

});

}

let paymentClass = 'cash';

if(sale.paymentMethod === 'GCash'){
paymentClass = 'gcash';
}

if(sale.paymentMethod === 'Card'){
paymentClass = 'cardpay';
}

const totalDiscount =
Number(sale.seniorDiscount || 0)
+
Number(sale.pwdDiscount || 0);

salesTable.innerHTML += `
<tr>
<td>${saleDate}</td>
<td>${sale.items?.[0]?.name || '-'}</td>
<td>${sale.items?.[0]?.qty || 0}</td>
<td>₱${Number(sale.subtotal || 0).toLocaleString()}</td>
<td>₱${totalDiscount.toLocaleString()}</td>
<td class="total-row">₱${Number(sale.total || 0).toLocaleString()}</td>
<td>
<span class="badge ${paymentClass}">
${sale.paymentMethod || 'Cash'}
</span>
</td>
<td>${sale.referenceNumber || '-'}</td>
<td>
<button class="action-btn view-btn"
onclick='viewSale(${JSON.stringify(sale)})'>
View
</button>

<button class="action-btn receipt-btn"
onclick='printReceipt(${JSON.stringify(sale)})'>
Receipt
</button>

<button class="action-btn delete-btn"
onclick="deleteSale('${sale.id}')">
Delete
</button>
</td>
</tr>
`;

});

let topProduct = '-';
let highestQty = 0;

for(const product in productCounter){

if(productCounter[product] > highestQty){
highestQty = productCounter[product];
topProduct = product;
}

}

if(salesTable.innerHTML === ''){

salesTable.innerHTML = `
<tr>
<td colspan="9" style="text-align:center;padding:30px;">
No sales found.
</td>
</tr>
`;

}


document.getElementById('overallSales').innerText =
'₱' + overallSales.toLocaleString();


document.getElementById('cashSales').innerText =
'₱' + cashSales.toLocaleString();


document.getElementById('gcashSales').innerText =
'₱' + gcashSales.toLocaleString();


document.getElementById('cardSales').innerText =
'₱' + cardSales.toLocaleString();


document.getElementById('totalOrders').innerText =
totalOrders;


document.getElementById('topProduct').innerText =
topProduct;

}

window.viewSale = function(sale){

let itemsHTML = '';

sale.items?.forEach((item)=>{

itemsHTML += `
<tr>
<td style="padding:12px;border-bottom:1px solid rgba(255,255,255,0.08);">
${item.name}
</td>
<td style="padding:12px;border-bottom:1px solid rgba(255,255,255,0.08);">
${item.qty}
</td>
<td style="padding:12px;border-bottom:1px solid rgba(255,255,255,0.08);">
₱${Number(item.price || 0).toLocaleString()}
</td>
<td style="padding:12px;border-bottom:1px solid rgba(255,255,255,0.08);">
₱${Number((item.price || 0)*(item.qty || 0)).toLocaleString()}
</td>
</tr>
`;

});

const totalDiscount =
Number(sale.seniorDiscount || 0)
+
Number(sale.pwdDiscount || 0);


document.getElementById('saleDetails').innerHTML = `

<h2 style="margin-bottom:20px;color:#facc15;">
Sale Details
</h2>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px;">

<div style="background:#111827;padding:15px;border-radius:14px;">
<b>Date</b><br>
${sale.date || '-'}
</div>

<div style="background:#111827;padding:15px;border-radius:14px;">
<b>Payment</b><br>
${sale.paymentMethod || 'Cash'}
</div>

<div style="background:#111827;padding:15px;border-radius:14px;">
<b>Reference</b><br>
${sale.referenceNumber || '-'}
</div>

<div style="background:#111827;padding:15px;border-radius:14px;">
<b>Net Sales</b><br>
₱${Number(sale.total || 0).toLocaleString()}
</div>

</div>

<table style="width:100%;border-collapse:collapse;background:#0f172a;border-radius:15px;overflow:hidden;">
<thead>
<tr>
<th style="padding:12px;text-align:left;">Item</th>
<th style="padding:12px;text-align:left;">Qty</th>
<th style="padding:12px;text-align:left;">Price</th>
<th style="padding:12px;text-align:left;">Total</th>
</tr>
</thead>
<tbody>
${itemsHTML}
</tbody>
</table>

<div style="margin-top:25px;background:#111827;padding:20px;border-radius:16px;">

<p style="margin-bottom:10px;">
Gross Sales: ₱${Number(sale.subtotal || 0).toLocaleString()}
</p>

<p style="margin-bottom:10px;">
Discount: ₱${totalDiscount.toLocaleString()}
</p>

<h2 style="color:#4ade80;">
Net Sales: ₱${Number(sale.total || 0).toLocaleString()}
</h2>

</div>

`;


document.getElementById('viewModal').style.display = 'block';

}

window.printReceipt = function(sale){
window.print();
}

window.deleteSale = async function(id){

const confirmDelete = confirm('Delete this sale?');

if(!confirmDelete) return;

await deleteDoc(doc(db,'sales',id));

alert('Sale Deleted Successfully');

loadSales();

}

window.closeShift = function(){

const expectedCash = overallSales - (gcashSales + cardSales);

alert(
'SHIFT CLOSED' +
'\n\nTOTAL SALES: ₱' + overallSales.toLocaleString() +
'\nCASH SALES: ₱' + cashSales.toLocaleString() +
'\nGCASH SALES: ₱' + gcashSales.toLocaleString() +
'\nCARD SALES: ₱' + cardSales.toLocaleString() +
'\nEXPECTED CASH: ₱' + expectedCash.toLocaleString()
);

}

loadSales();

</script>
</body>
</html>
