<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales Report</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.topbar h1{
font-size:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
}

.card h3{
color:#cbd5e1;
margin-bottom:10px;
}

.card h2{
color:#facc15;
font-size:30px;
}

.table-box{
background:#1e293b;
padding:20px;
border-radius:20px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#111827;
color:#facc15;
padding:15px;
text-align:left;
white-space:nowrap;
}

table td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.back-btn{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
background:#facc15;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:600;
}

.total-row{
color:#4ade80;
font-weight:600;
}

.loading{
text-align:center;
padding:30px;
color:#cbd5e1;
}

.delete-btn{
background:#ef4444;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.delete-btn:hover{
background:#dc2626;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.filters input{
padding:12px;
border:none;
border-radius:10px;
background:#111827;
color:white;
}

.filter-btn,
.print-btn{
border:none;
padding:12px 18px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.filter-btn{
background:#facc15;
color:black;
}

.print-btn{
background:#22c55e;
color:white;
}

@media print{

body{
background:white;
color:black;
padding:0;
}

.back-btn,
.filters,
.delete-btn,
.no-print,
th:last-child,
td:last-child{
display:none !important;
}

.topbar{
margin-bottom:20px;
}

.card{
background:white;
border:1px solid #ccc;
color:black;
}

.card h3,
.card h2{
color:black;
}

.table-box{
background:white;
padding:0;
}

table{
width:100%;
}

table th{
background:#ddd;
color:black;
}

table td{
color:black;
border-bottom:1px solid #ccc;
}

}

@media(max-width:700px){

table{
font-size:12px;
}

.card h2{
font-size:24px;
}

}

</style>

</head>

<body>

<a href="index.html" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
Dashboard
</a>

<div class="topbar">

<h1>Sales Report 📊</h1>

<h2 id="todayDate"></h2>

</div>

<div class="cards">

<div class="card">

<h3>Today's Sales</h3>

<h2 id="todaySales">₱0</h2>

</div>

<div class="card">

<h3>Total Orders</h3>

<h2 id="totalOrders">0</h2>

</div>

</div>

<div class="filters no-print">

<input type="date" id="startDate">

<input type="date" id="endDate">

<button class="filter-btn"
onclick="loadSales()">

<i class="fa-solid fa-filter"></i>
Filter

</button>

<button class="print-btn"
onclick="window.print()">

<i class="fa-solid fa-print"></i>
Print Report

</button>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>Order Date</th>
<th>Product</th>
<th>Quantity</th>
<th>Payment</th>
<th>Total Amount</th>
<th>Action</th>

</tr>

</thead>

<tbody id="salesTable">

<tr>

<td colspan="6" class="loading">
Loading sales...
</td>

</tr>

</tbody>

</table>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
deleteDoc,
doc

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3",

measurementId: "G-1X8L2KQDYF"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

document.getElementById("todayDate").innerText =
new Date().toLocaleDateString();

window.deleteSale = async function(id){

let confirmDelete =
confirm("Delete this sale?");

if(!confirmDelete) return;

try{

await deleteDoc(doc(db,"sales",id));

alert("Sale Deleted!");

loadSales();

}catch(error){

console.log(error);

alert("Delete failed");

}

}

window.loadSales = async function(){

try{

const salesTable =
document.getElementById("salesTable");

salesTable.innerHTML = "";

let totalToday = 0;

let totalOrders = 0;

let today =
new Date().toLocaleDateString();

const startDate =
document.getElementById("startDate").value;

const endDate =
document.getElementById("endDate").value;

const querySnapshot =
await getDocs(collection(db,"sales"));

if(querySnapshot.empty){

salesTable.innerHTML = `

<tr>

<td colspan="6" class="loading">
No sales found
</td>

</tr>

`;

return;

}

querySnapshot.forEach((firebaseDoc)=>{

const sale = firebaseDoc.data();

let rawDate =
sale.date ||
sale.createdAt ||
new Date();

let saleDateObject =
new Date(rawDate);

let saleDate =
isNaN(saleDateObject)
? "No Date"
: saleDateObject.toLocaleString();

let saleOnlyDate = "";

if(!isNaN(saleDateObject)){

saleOnlyDate =
saleDateObject.toISOString().split('T')[0];

}

if(startDate && saleOnlyDate < startDate){

return;

}

if(endDate && saleOnlyDate > endDate){

return;

}

totalOrders++;

if(
!isNaN(saleDateObject) &&
saleDateObject.toLocaleDateString()
=== today
){

totalToday += Number(sale.total || 0);

}

if(sale.items && sale.items.length > 0){

sale.items.forEach(item=>{

salesTable.innerHTML += `

<tr>

<td>${saleDate}</td>

<td>${item.name || "-"}</td>

<td>${item.qty || 0}</td>

<td>${sale.paymentMethod || "Cash"}</td>

<td class="total-row">
₱${(item.price || 0) * (item.qty || 0)}
</td>

<td>

<button class="delete-btn"
onclick="deleteSale('${firebaseDoc.id}')">

Delete

</button>

</td>

</tr>

`;

});

}else{

salesTable.innerHTML += `

<tr>

<td>${saleDate}</td>

<td>Old Transaction</td>

<td>-</td>

<td>${sale.paymentMethod || "Cash"}</td>

<td class="total-row">
₱${sale.total || 0}
</td>

<td>

<button class="delete-btn"
onclick="deleteSale('${firebaseDoc.id}')">

Delete

</button>

</td>

</tr>

`;

}

});

document.getElementById("todaySales").innerText =
"₱" + totalToday.toLocaleString();

document.getElementById("totalOrders").innerText =
totalOrders;

}catch(error){

console.error("Firebase Error:", error);
alert(error.message);

document.getElementById("salesTable").innerHTML = `

<tr>

<td colspan="6" class="loading">
Failed to load Firebase sales
</td>

</tr>

`;

}

}

loadSales();

</script>

</body>
</html>
