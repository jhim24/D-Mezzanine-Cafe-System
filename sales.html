<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales Report</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.topbar h1{
font-size:32px;
}

/* BUTTONS */

.back-btn{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
background:#facc15;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:600;
}

.filter-btn,
.print-btn{
border:none;
padding:12px 18px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.filter-btn{
background:#facc15;
color:black;
}

.print-btn{
background:#22c55e;
color:white;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

.card h3{
color:#cbd5e1;
margin-bottom:10px;
font-size:15px;
}

.card h2{
color:#facc15;
font-size:30px;
}

/* FILTER */

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.filters input{
padding:12px;
border:none;
border-radius:10px;
background:#111827;
color:white;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:20px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#111827;
color:#facc15;
padding:15px;
text-align:left;
white-space:nowrap;
}

table td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
font-size:14px;
}

.total-row{
color:#4ade80;
font-weight:700;
}

.loading{
text-align:center;
padding:30px;
color:#cbd5e1;
}

/* ACTION BUTTONS */

.view-btn{
background:#2563eb;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-right:5px;
font-weight:600;
}
.print-btn{
background:#22c55e;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin-right:5px;
}
.delete-btn{
background:#ef4444;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.delete-btn:hover{
background:#dc2626;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
padding:20px;
}

.modal-content{
background:#1e293b;
padding:25px;
border-radius:20px;
max-width:500px;
margin:auto;
margin-top:50px;
color:white;
position:relative;
}

.close-btn{
position:absolute;
right:20px;
top:10px;
font-size:30px;
cursor:pointer;
color:#facc15;
}

/* PRINT */

@media print{

body{
background:white;
color:black;
padding:0;
}
#salesChart{
display:none !important;
}
.back-btn,
.filters,
.delete-btn,
.view-btn,
.no-print,
th:last-child,
td:last-child{
display:none !important;
}

.card{
background:white;
border:1px solid #ccc;
color:black;
}

.card h3,
.card h2{
color:black;
}

.table-box{
background:white;
padding:0;
}

table th{
background:#ddd;
color:black;
}

table td{
color:black;
border-bottom:1px solid #ccc;
}

}

/* MOBILE */

@media(max-width:700px){

table{
font-size:12px;
}

.card h2{
font-size:24px;
}

}

</style>

</head>

<body>

<a href="index.html"
class="back-btn">

<i class="fa-solid fa-arrow-left"></i>
Dashboard

</a>

<div class="topbar">

<h1>Sales Report 📊</h1>

<h2 id="todayDate"></h2>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">

<h3>Today's Sales</h3>

<h2 id="todaySales">₱0</h2>

</div>

<div class="card">

<h3>Total Sales</h3>

<h2 id="overallSales">₱0</h2>

</div>
  
<div class="card">

<h3>Total Orders</h3>

<h2 id="totalOrders">0</h2>

</div>

<div class="card">

<h3>Cash Sales</h3>

<h2 id="cashSales">₱0</h2>

</div>

<div class="card">

<h3>GCash Sales</h3>

<h2 id="gcashSales">₱0</h2>

</div>

<div class="card">

<h3>Card Sales</h3>

<h2 id="cardSales">₱0</h2>

</div>

<div class="card">

<h3>Top Product</h3>

<h2 id="topProduct">-</h2>

</div>

</div>

<!-- FILTERS -->

<div class="filters no-print">

<input type="date"
id="startDate">

<input type="date"
id="endDate">

<button class="filter-btn"
onclick="loadSales()">

<i class="fa-solid fa-filter"></i>
Filter

</button>

<button class="print-btn"
onclick="window.print()">

<i class="fa-solid fa-print"></i>
Print Report

</button>

<button class="filter-btn"
onclick="filterToday()">

Today

</button>

<button class="filter-btn"
onclick="filterWeek()">

This Week

</button>

<button class="filter-btn"
onclick="filterMonth()">

This Month

</button>
  
</div>

<canvas id="salesChart"
style="
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:25px;
max-height:400px;
"></canvas>
  
<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Order Date</th>
<th>Product</th>
<th>Quantity</th>
<th>Payment</th>
<th>Reference No.</th>
<th>Total Amount</th>
<th>Action</th>

</tr>

</thead>

<tbody id="salesTable">

<tr>

<td colspan="7"
class="loading">

Loading sales...

</td>

</tr>

</tbody>

</table>

</div>

<!-- MODAL -->

<div id="viewModal"
class="modal">

<div class="modal-content">

<span class="close-btn"
onclick="closeModal()">

&times;

</span>

<h2>Sale Details</h2>

<br>

<div id="saleDetails"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
deleteDoc,
doc

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3",

measurementId: "G-1X8L2KQDYF"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);
/* ADMIN PASSWORD */

const adminPassword =
"admin123";
let salesChart;
/* DATE */

document.getElementById("todayDate")
.innerText =
new Date().toLocaleDateString();

/* DELETE */

window.deleteSale =
async function(id){

let password =
prompt("Enter Admin Password");

if(password === null){

return;

}

if(password !== adminPassword){

alert("Wrong Admin Password");

return;

}

let confirmDelete =
confirm("Delete this sale?");

if(!confirmDelete) return;

try{

await deleteDoc(
doc(db,"sales",id)
);

alert("Sale Deleted!");

loadSales();

}catch(error){

console.error(error);

alert("Delete failed");

}

}
/* VIEW */

window.viewSale =
function(sale){

let itemsHTML = "";

if(sale.items){

sale.items.forEach((item)=>{

itemsHTML += `

<li>

${item.name}
x ${item.qty}

</li>

`;

});

}

document.getElementById("saleDetails")
.innerHTML = `

<p>
<b>Date:</b>
${sale.date || "-"}
</p>

<br>

<p>
<b>Payment:</b>
${sale.paymentMethod || "Cash"}
</p>

<br>

<p>
<b>Reference:</b>
${sale.referenceNumber || "-"}
</p>

<br>

<p>
<b>Total:</b>
₱${sale.total || 0}
</p>

<br>

<b>Products:</b>

<ul>

${itemsHTML}

</ul>

`;

document.getElementById("viewModal")
.style.display = "block";

}

window.closeModal =
function(){

document.getElementById("viewModal")
.style.display = "none";

}

/* LOAD SALES */

window.loadSales =
async function(){

try{

const salesTable =
document.getElementById("salesTable");

salesTable.innerHTML = "";

let totalToday = 0;
let overallSales = 0;
let totalOrders = 0;

let cashSales = 0;
let gcashSales = 0;
let cardSales = 0;

let productCounter = {};
let dailySales = {};
let today =
new Date().toLocaleDateString();

const startDate =
document.getElementById("startDate").value;

const endDate =
document.getElementById("endDate").value;

const querySnapshot =
await getDocs(
collection(db,"sales")
);

let salesData = [];

querySnapshot.forEach((firebaseDoc)=>{

    salesData.push({

        id: firebaseDoc.id,

        ...firebaseDoc.data()

    });

});

/* SORT NEWEST FIRST */

salesData.sort((a,b)=>

    new Date(
        b.date || b.createdAt
    )

    -

    new Date(
        a.date || a.createdAt
    )

);

/* LOOP SALES */

/* SORT BY LATEST DATE */

salesData.sort((a,b)=>{

    return new Date(b.date || b.createdAt)
    -
    new Date(a.date || a.createdAt);

});

if(querySnapshot.empty){

salesTable.innerHTML = `

<tr>

<td colspan="7"
class="loading">

No sales found

</td>

</tr>

`;

return;

}

salesData.forEach((sale)=>{

let rawDate =
sale.date ||
sale.createdAt ||
new Date();

let saleDateObject =
new Date(rawDate);

let saleDate =
!isNaN(saleDateObject)
? saleDateObject.toLocaleString()
: "No Date";

let saleOnlyDate = "";

if(!isNaN(saleDateObject)){

saleOnlyDate =
saleDateObject
.toISOString()
.split('T')[0];

}

if(startDate &&
saleOnlyDate < startDate){

return;

}

if(endDate &&
saleOnlyDate > endDate){

return;

}

totalOrders++;
overallSales =
overallSales +
Number(sale.total || 0);
if(!isNaN(saleDateObject)){

let chartDate =
saleDateObject
.toLocaleDateString();

if(!dailySales[chartDate]){

dailySales[chartDate] = 0;

}

dailySales[chartDate] +=
Number(sale.total || 0);

}
  
if(
!isNaN(saleDateObject) &&
saleDateObject.toLocaleDateString()
=== today
){

totalToday +=
Number(sale.total || 0);

}

const paymentMethod =
sale.paymentMethod || "Cash";

if(paymentMethod === "Cash"){

cashSales +=
Number(sale.total || 0);

}

if(paymentMethod === "GCash"){

gcashSales +=
Number(sale.total || 0);

}

if(paymentMethod === "Card"){

cardSales +=
Number(sale.total || 0);

}

/* PRODUCT COUNTER */

if(sale.items){

sale.items.forEach((item)=>{

if(!productCounter[item.name]){

productCounter[item.name] = 0;

}

productCounter[item.name] +=
Number(item.qty || 1);

});

}

/* TABLE */

if(
sale.items &&
sale.items.length > 0
){

sale.items.forEach((item)=>{

salesTable.innerHTML += `

<tr>

<td>${saleDate}</td>

<td>${item.name || "-"}</td>

<td>${item.qty || 0}</td>

<td>${sale.paymentMethod || "Cash"}</td>

<td>${sale.referenceNumber || "-"}</td>

<td class="total-row">

₱${(
(item.price || 0)
*
(item.qty || 0)
).toLocaleString()}

</td>

<td>

<button class="view-btn"
onclick='viewSale(${JSON.stringify(sale)})'>

View

</button>

<button class="print-btn"
onclick='printReceipt(${JSON.stringify(sale)})'>

Receipt

</button>

<button class="delete-btn"
onclick="deleteSale('${sale.id}')">

Delete

</button>

</td>

</tr>

`;

});

}else{

salesTable.innerHTML += `

<tr>

<td>${saleDate}</td>

<td>Old Transaction</td>

<td>-</td>

<td>${sale.paymentMethod || "Cash"}</td>

<td>${sale.referenceNumber || "-"}</td>

<td class="total-row">

₱${Number(
sale.total || 0
).toLocaleString()}

</td>

<td>

<button class="view-btn"
onclick='viewSale(${JSON.stringify(sale)})'>

View

</button>

<button class="delete-btn"
onclick="deleteSale('${sale.id}')"

Delete

</button>

</td>

</tr>

`;

}

});

/* UPDATE CARDS */

document.getElementById("todaySales")
.innerText =
"₱" +
totalToday.toLocaleString();
document.getElementById("overallSales")
.innerText =
"₱" +
overallSales.toLocaleString();
document.getElementById("totalOrders")
.innerText =
totalOrders;

document.getElementById("cashSales")
.innerText =
"₱" +
cashSales.toLocaleString();

document.getElementById("gcashSales")
.innerText =
"₱" +
gcashSales.toLocaleString();

document.getElementById("cardSales")
.innerText =
"₱" +
cardSales.toLocaleString();

/* TOP PRODUCT */

let topProduct = "-";
let highest = 0;

for(let product in productCounter){

if(
productCounter[product]
> highest
){

highest =
productCounter[product];

topProduct =
product;

}

}

document.getElementById("topProduct")
.innerText =
topProduct;

const labels =
Object.keys(dailySales);

const values =
Object.values(dailySales);

const ctx =
document.getElementById("salesChart");

if(salesChart){

salesChart.destroy();

}

salesChart =
new Chart(ctx,{

type:"bar",

data:{

labels:labels,

datasets:[{

label:"Daily Sales",

data:values,

borderWidth:1

}]

},

options:{

responsive:true,

plugins:{

legend:{
labels:{
color:"white"
}
}

},

scales:{

x:{
ticks:{
color:"white"
}
},

y:{
ticks:{
color:"white"
}
}

}

}

});
  
}catch(error){

console.error(error);

document.getElementById("salesTable")
.innerHTML = `

<tr>

<td colspan="7"
class="loading">

Failed to load Firebase sales

</td>

</tr>

`;

}

}
/* TODAY FILTER */

window.filterToday =
function(){

let today =
new Date()
.toISOString()
.split("T")[0];

document.getElementById("startDate")
.value = today;

document.getElementById("endDate")
.value = today;

loadSales();

}

/* WEEK FILTER */

window.filterWeek =
function(){

let today =
new Date();

let firstDay =
new Date(
today.setDate(
today.getDate() - 7
));

document.getElementById("startDate")
.value =
firstDay.toISOString()
.split("T")[0];

document.getElementById("endDate")
.value =
new Date()
.toISOString()
.split("T")[0];

loadSales();

}

/* MONTH FILTER */

window.filterMonth =
function(){

let today =
new Date();

let firstDay =
new Date(
today.getFullYear(),
today.getMonth(),
1
);

document.getElementById("startDate")
.value =
firstDay.toISOString()
.split("T")[0];

document.getElementById("endDate")
.value =
new Date()
.toISOString()
.split("T")[0];

loadSales();

}
  /* PRINT RECEIPT */

window.printReceipt =
function(sale){

let itemsHTML = "";

if(sale.items){

sale.items.forEach((item)=>{

itemsHTML += `

<tr>

<td>${item.name}</td>

<td>${item.qty}</td>

<td>
₱${(
(item.price || 0)
*
(item.qty || 0)
).toLocaleString()}
</td>

</tr>

`;

});

}

let receiptWindow =
window.open("","","width=400,height=700");

receiptWindow.document.write(`

<html>

<head>

<title>Receipt</title>

<style>

body{
font-family:Arial;
padding:20px;
text-align:center;
}

.logo{
width:80px;
height:80px;
object-fit:contain;
margin-bottom:10px;
}

h2{
margin:5px 0;
}

p{
margin:3px 0;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table th,
table td{
border-bottom:1px dashed #999;
padding:8px;
font-size:13px;
text-align:left;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:15px;
}

.footer{
margin-top:25px;
font-size:13px;
}

</style>

</head>

<body>

<img src="./logo.png"
class="logo">

<h2>D' Mezzanine Cafe</h2>

<p>Official Receipt</p>

<hr>

<p>
Date:
${new Date().toLocaleString()}
</p>

<p>
Payment:
${sale.paymentMethod || "Cash"}
</p>

<p>
Reference:
${sale.referenceNumber || "-"}
</p>

<table>

<thead>

<tr>

<th>Item</th>
<th>Qty</th>
<th>Total</th>

</tr>

</thead>

<tbody>

${itemsHTML}

</tbody>

</table>

<div class="total">

TOTAL:
₱${Number(
sale.total || 0
).toLocaleString()}

</div>

<div class="footer">

Thank you for dining with us ☕

<br><br>

Please come again.

</div>

<script>

window.onload = function(){

window.print();

}

<\/script>

</body>

</html>

`);

receiptWindow.document.close();

}
/* LOAD */

loadSales();

</script>

</body>
</html>
