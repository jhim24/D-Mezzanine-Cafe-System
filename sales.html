<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales Report</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.topbar h1{
    font-size:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
}

.card h3{
    color:#cbd5e1;
    margin-bottom:10px;
}

.card h2{
    color:#facc15;
    font-size:30px;
}

.table-box{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#111827;
    color:#facc15;
    padding:15px;
    text-align:left;
}

table td{
    padding:15px;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    background:#facc15;
    color:black;
    padding:12px 18px;
    border-radius:12px;
    font-weight:600;
}

@media(max-width:700px){

table{
    font-size:12px;
}

}

</style>

</head>

<body>

<a href="index.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i>
    Dashboard
</a>

<div class="topbar">

    <h1>Sales Report 📊</h1>

    <h2 id="todayDate"></h2>

</div>

<div class="cards">

    <div class="card">

        <h3>Today's Sales</h3>

        <h2 id="todaySales">₱0</h2>

    </div>

    <div class="card">

        <h3>Total Orders</h3>

        <h2 id="totalOrders">0</h2>

    </div>

</div>

<div class="table-box">

    <table>

        <thead>

            <tr>

                <th>Date</th>

                <th>Total Sales</th>

            </tr>

        </thead>

        <tbody id="salesTable"></tbody>

    </table>

</div>

<script>

let sales = JSON.parse(localStorage.getItem("sales")) || [];

let today = new Date().toLocaleDateString();

let totalToday = 0;

document.getElementById("todayDate").innerText = today;

document.getElementById("totalOrders").innerText = sales.length;

sales.reverse().forEach(sale=>{

    let saleDate = new Date(sale.date).toLocaleDateString();

    if(saleDate === today){

        totalToday += sale.total;

    }

    document.getElementById("salesTable").innerHTML += `

        <tr>

            <td>${sale.date}</td>

            <td>₱${sale.total}</td>

        </tr>

    `;

});

document.getElementById("todaySales").innerText =
"₱" + totalToday.toLocaleString();

</script>

</body>
</html>
