<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Report</title><link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.topbar h1{
font-size:32px;
}

.back-btn{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
background:#facc15;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:600;
}

.filter-btn,
.print-btn{
border:none;
padding:12px 18px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.filter-btn{
background:#facc15;
color:black;
}

.print-btn{
background:#22c55e;
color:white;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

.card h3{
color:#cbd5e1;
margin-bottom:10px;
font-size:15px;
}

.card h2{
color:#facc15;
font-size:30px;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.filters input{
padding:12px;
border:none;
border-radius:10px;
background:#111827;
color:white;
}

.table-box{
background:#1e293b;
padding:20px;
border-radius:20px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#111827;
color:#facc15;
padding:15px;
text-align:left;
white-space:nowrap;
}

table td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
font-size:14px;
}

.total-row{
color:#4ade80;
font-weight:700;
}

.loading{
text-align:center;
padding:30px;
color:#cbd5e1;
}

.view-btn{
background:#2563eb;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-right:5px;
font-weight:600;
}

.delete-btn{
background:#ef4444;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
padding:20px;
overflow:auto;
}

.modal-content{
background:#1e293b;
padding:25px;
border-radius:20px;
max-width:1000px;
width:95%;
margin:auto;
margin-top:40px;
color:white;
position:relative;
}

.close-btn{
position:absolute;
right:20px;
top:10px;
font-size:30px;
cursor:pointer;
color:#facc15;
}

@media(max-width:700px){

.card h2{
font-size:24px;
}

.modal-content{
padding:15px;
}

}

</style></head>
<body><a href="index.html" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
Dashboard
</a><div class="topbar">
<h1>Sales Report 📊</h1>
<h2 id="todayDate"></h2>
</div><div class="cards"><div class="card">
<h3>Today's Sales</h3>
<h2 id="todaySales">₱0</h2>
</div><div class="card">
<h3>Total Sales</h3>
<h2 id="overallSales">₱0</h2>
</div><div class="card">
<h3>Total Orders</h3>
<h2 id="totalOrders">0</h2>
</div><div class="card">
<h3>Cash Sales</h3>
<h2 id="cashSales">₱0</h2>
</div><div class="card">
<h3>GCash Sales</h3>
<h2 id="gcashSales">₱0</h2>
</div><div class="card">
<h3>Card Sales</h3>
<h2 id="cardSales">₱0</h2>
</div><div class="card">
<h3>Top Product</h3>
<h2 id="topProduct">-</h2>
</div></div><div class="filters"><input type="date" id="startDate">
<input type="date" id="endDate"><button class="filter-btn" onclick="loadSales()">
<i class="fa-solid fa-filter"></i>
Filter
</button><input type="number"
id="actualCashInput"
placeholder="Actual Cash On Hand"
style="width:250px;">

<button class="print-btn" onclick="window.print()">
<i class="fa-solid fa-print"></i>
Print
</button><button class="print-btn" onclick="closeShift()">
<i class="fa-solid fa-cash-register"></i>
Close Shift
</button></div><div class="table-box"><table>
<thead>
<tr>
<th>Date</th>
<th>Product</th>
<th>Qty</th>
<th>Gross</th>
<th>Senior</th>
<th>PWD</th>
<th>Net</th>
<th>Payment</th>
<th>Reference</th>
<th>Action</th>
</tr>
</thead><tbody id="salesTable">
<tr>
<td colspan="10" class="loading">
Loading sales...
</td>
</tr>
</tbody></table></div><div id="viewModal" class="modal">
<div class="modal-content"><span class="close-btn" onclick="closeModal()">
&times;
</span><div id="saleDetails"></div></div>
</div><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",
authDomain: "family-web-10cb8.firebaseapp.com",
projectId: "family-web-10cb8",
storageBucket: "family-web-10cb8.firebasestorage.app",
messagingSenderId: "152048365178",
appId: "1:152048365178:web:3e42c20e03a7c563d915c3",
measurementId: "G-1X8L2KQDYF"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.overallSales = 0;
window.totalOrders = 0;
window.cashSales = 0;
window.gcashSales = 0;
window.cardSales = 0;
window.totalSeniorDiscount = 0;
window.totalPwdDiscount = 0;

document.getElementById("todayDate")
.innerText = new Date().toLocaleDateString();

window.closeModal = function(){
document.getElementById("viewModal").style.display = "none";
}

window.viewSale = function(sale){

let grossSales = Number(sale.subtotal || 0);
let seniorDiscount = Number(sale.seniorDiscount || 0);
let pwdDiscount = Number(sale.pwdDiscount || 0);
let netSales = Number(sale.total || 0);

let cash = sale.paymentMethod === "Cash" ? netSales : 0;
let gcash = sale.paymentMethod === "GCash" ? netSales : 0;
let card = sale.paymentMethod === "Card" ? netSales : 0;

let itemsHTML = "";

if(sale.items){

sale.items.forEach((item)=>{

itemsHTML += `
<tr>
<td style="padding:10px;border:1px solid rgba(255,255,255,0.1);">
${item.name}
</td>
<td style="padding:10px;text-align:center;border:1px solid rgba(255,255,255,0.1);">
${item.qty}
</td>
<td style="padding:10px;text-align:right;border:1px solid rgba(255,255,255,0.1);">
₱${Number(item.price || 0).toLocaleString()}
</td>
<td style="padding:10px;text-align:right;border:1px solid rgba(255,255,255,0.1);">
₱${((item.price || 0)*(item.qty || 0)).toLocaleString()}
</td>
</tr>
`;

});

}

document.getElementById("saleDetails")
.innerHTML = `

<h2 style="margin-bottom:20px;color:#facc15;text-align:center;">
SALE DETAILS
</h2>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:20px;">

<div style="background:#111827;padding:15px;border-radius:12px;">
<b>Date</b><br>
${sale.date || "-"}
</div>

<div style="background:#111827;padding:15px;border-radius:12px;">
<b>Payment</b><br>
${sale.paymentMethod || "Cash"}
</div>

<div style="background:#111827;padding:15px;border-radius:12px;">
<b>Reference</b><br>
${sale.referenceNumber || "-"}
</div>

<div style="background:#111827;padding:15px;border-radius:12px;">
<b>Net Sales</b><br>
₱${netSales.toLocaleString()}
</div>

</div>

<h3 style="margin-bottom:10px;color:#facc15;">
ORDER ITEMS
</h3>

<table style="width:100%;border-collapse:collapse;background:#0f172a;margin-bottom:25px;">
<thead>
<tr>
<th style="padding:12px;">Item</th>
<th style="padding:12px;">Qty</th>
<th style="padding:12px;">Price</th>
<th style="padding:12px;">Total</th>
</tr>
</thead>
<tbody>
${itemsHTML}
</tbody>
</table>

<table style="width:100%;border-collapse:collapse;background:#0f172a;">

<tr>
<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);font-weight:bold;">
Gross Sales
</td>
<td style="padding:12px;text-align:right;border:1px solid rgba(255,255,255,0.1);">
₱${grossSales.toLocaleString()}
</td>
</tr>

<tr>
<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);">
Senior Discount
</td>
<td style="padding:12px;text-align:right;border:1px solid rgba(255,255,255,0.1);">
₱${seniorDiscount.toLocaleString()}
</td>
</tr>

<tr>
<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);">
PWD Discount
</td>
<td style="padding:12px;text-align:right;border:1px solid rgba(255,255,255,0.1);">
₱${pwdDiscount.toLocaleString()}
</td>
</tr>

<tr>
<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);font-weight:bold;color:#4ade80;">
Net Sales
</td>
<td style="padding:12px;text-align:right;border:1px solid rgba(255,255,255,0.1);font-weight:bold;color:#4ade80;">
₱${netSales.toLocaleString()}
</td>
</tr>

<tr>
<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);">
Cash Sales
</td>
<td style="padding:12px;text-align:right;border:1px solid rgba(255,255,255,0.1);">
₱${cash.toLocaleString()}
</td>
</tr>

<tr>
<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);">
GCash Sales
</td>
<td style="padding:12px;text-align:right;border:1px solid rgba(255,255,255,0.1);">
₱${gcash.toLocaleString()}
</td>
</tr>

<tr>
<td style="padding:12px;border:1px solid rgba(255,255,255,0.1);">
Card Sales
</td>
<td style="padding:12px;text-align:right;border:1px solid rgba(255,255,255,0.1);">
₱${card.toLocaleString()}
</td>
</tr>

</table>
`;

document.getElementById("viewModal")
.style.display = "block";
}

window.deleteSale = async function(id){

let confirmDelete = confirm("Delete this sale?");

if(!confirmDelete) return;

await deleteDoc(doc(db,"sales",id));

alert("Sale Deleted");

loadSales();
}

window.loadSales = async function(){

const salesTable =
document.getElementById("salesTable");

salesTable.innerHTML = "";

overallSales = 0;
totalOrders = 0;
cashSales = 0;
gcashSales = 0;
cardSales = 0;
totalSeniorDiscount = 0;
totalPwdDiscount = 0;

const querySnapshot =
await getDocs(collection(db,"sales"));

let salesData = [];

querySnapshot.forEach((firebaseDoc)=>{

salesData.push({
id: firebaseDoc.id,
...firebaseDoc.data()
});

});

salesData.sort((a,b)=>
new Date(b.date || b.createdAt)
-
new Date(a.date || a.createdAt)
);

salesData.forEach((sale)=>{

let saleDate =
new Date(
sale.date || sale.createdAt
).toLocaleString();

overallSales += Number(sale.total || 0);

totalOrders++;

totalSeniorDiscount +=
Number(sale.seniorDiscount || 0);

totalPwdDiscount +=
Number(sale.pwdDiscount || 0);

if(sale.paymentMethod === "Cash"){
cashSales += Number(sale.total || 0);
}

if(sale.paymentMethod === "GCash"){
gcashSales += Number(sale.total || 0);
}

if(sale.paymentMethod === "Card"){
cardSales += Number(sale.total || 0);
}

salesTable.innerHTML += `
<tr>
<td>${saleDate}</td>
<td>${sale.items?.[0]?.name || "-"}</td>
<td>${sale.items?.[0]?.qty || 0}</td>
<td>₱${Number(sale.subtotal || 0).toLocaleString()}</td>
<td>₱${Number(sale.seniorDiscount || 0).toLocaleString()}</td>
<td>₱${Number(sale.pwdDiscount || 0).toLocaleString()}</td>
<td class="total-row">₱${Number(sale.total || 0).toLocaleString()}</td>
<td>${sale.paymentMethod || "Cash"}</td>
<td>${sale.referenceNumber || "-"}</td>
<td>

<button class="view-btn"
onclick='viewSale(${JSON.stringify(sale)})'>
View
</button>

<button class="print-btn"
onclick='printReceipt(${JSON.stringify(sale)})'>
Receipt
</button>

<button class="delete-btn"
onclick="deleteSale('${sale.id}')">
Delete
</button>

</td>
</tr>
`;

});

document.getElementById("overallSales")
.innerText = "₱" + overallSales.toLocaleString();


document.getElementById("cashSales")
.innerText = "₱" + cashSales.toLocaleString();


document.getElementById("gcashSales")
.innerText = "₱" + gcashSales.toLocaleString();


document.getElementById("cardSales")
.innerText = "₱" + cardSales.toLocaleString();


document.getElementById("totalOrders")
.innerText = totalOrders;
}

window.printReceipt = function(sale){
window.print();
}

window.closeShift = function(){

let actualCash = Number(document.getElementById("actualCashInput").value || 0);

let expectedCash = overallSales - (gcashSales + cardSales);

let shortOver = actualCash - expectedCash;

alert(
"NET SALES: ₱" + overallSales.toLocaleString() +
"\nEXPECTED CASH: ₱" + expectedCash.toLocaleString() +
"\nSHORT/OVER: ₱" + shortOver.toLocaleString()
);
}

loadSales();

</script></body>
</html>
