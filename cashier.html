<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D' Mezzanine Cashier POS</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#facc15">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

.left{
width:70%;
padding:20px;
overflow-y:auto;
}

.right{
width:30%;
background:#111827;
padding:20px;
border-left:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
gap:10px;
}

.topbar h1{
font-size:30px;
}

.time{
color:#facc15;
font-size:18px;
}

.refresh-btn{
border:none;
width:42px;
height:42px;
border-radius:12px;
background:#facc15;
color:black;
cursor:pointer;
font-size:16px;
}

.categories{
display:flex;
gap:12px;
margin-bottom:25px;
overflow-x:auto;
flex-wrap:wrap;
}

.category-btn{
border:none;
padding:12px 18px;
border-radius:14px;
background:#1e293b;
color:white;
cursor:pointer;
white-space:nowrap;
transition:.3s;
font-weight:600;
}

.category-btn.active,
.category-btn:hover{
background:#facc15;
color:black;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.product{
background:#1e293b;
border-radius:20px;
padding:15px;
text-align:center;
transition:.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
border-radius:14px;
margin-bottom:10px;
background:none;
padding:0;
display:block;
}

.product h3{
margin-bottom:5px;
}

.product small{
display:block;
margin-bottom:10px;
color:#cbd5e1;
}

.product p{
color:#facc15;
margin-bottom:10px;
}

.product button{
width:100%;
border:none;
padding:10px;
border-radius:10px;
background:#facc15;
color:black;
font-weight:600;
cursor:pointer;
}

.low-stock{
background:#ef4444;
padding:5px 10px;
border-radius:30px;
font-size:11px;
font-weight:600;
display:inline-block;
margin-bottom:10px;
}

.cart-title{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.cart-items{
flex:1;
overflow-y:auto;
max-height:280px;
padding-right:4px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
padding:8px 10px;
border-radius:10px;
margin-bottom:8px;
min-height:58px;
}

.cart-item h4{
font-size:12px;
margin-bottom:2px;
}

.cart-item p{
font-size:11px;
color:#facc15;
}

.qty{
display:flex;
align-items:center;
gap:5px;
font-size:12px;
}

.qty button{
width:24px;
height:24px;
font-size:12px;
border:none;
border-radius:8px;
background:#facc15;
color:black;
font-weight:bold;
cursor:pointer;
}

.summary{
margin-top:20px;
border-top:1px solid rgba(255,255,255,0.08);
padding-top:20px;
}

.summary div{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

.total{
font-size:24px;
color:#facc15;
font-weight:700;
}

.payment{
margin-top:15px;
}

.payment input,
.payment select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
margin-top:10px;
}

.checkout{
width:100%;
margin-top:20px;
border:none;
padding:15px;
border-radius:14px;
background:#22c55e;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.clear{
width:100%;
margin-top:10px;
border:none;
padding:12px;
border-radius:12px;
background:#ef4444;
color:white;
cursor:pointer;
}

@media(max-width:950px){

.container{
flex-direction:column;
}

.left,
.right{
width:100%;
}

.right{
height:50vh;
}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<div class="topbar">

<h1>Cashier POS ☕</h1>

<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">

<button
onclick="openHistory()"
style="
border:none;
padding:10px 14px;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
">

<i class="fa-solid fa-clock-rotate-left"></i>

History

</button>
<a href="cash-drawer.html"
style="
text-decoration:none;
background:#22c55e;
color:white;
padding:10px 15px;
border-radius:12px;
font-weight:600;
display:flex;
align-items:center;
gap:8px;
">

<i class="fa-solid fa-cash-register"></i>

Drawer

</a>

<button id="logoutBtn"
style="
border:none;
padding:10px 16px;
border-radius:12px;
background:#ef4444;
color:white;
cursor:pointer;
font-weight:600;
">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</button>

<div class="time" id="time"></div>

<button class="refresh-btn"
onclick="refreshProducts()">

<i class="fa-solid fa-rotate-right"></i>

</button>

</div>

</div>

<div class="categories"
id="categoryButtons"></div>

<div class="products"
id="productsContainer"></div>

</div>

<div class="right">

<div class="cart-title">

<h2>Current Order</h2>

<i class="fa-solid fa-cart-shopping"></i>

</div>

<div class="cart-items"
id="cartItems"></div>

<div class="summary">

<div>
<span>Items</span>
<span id="itemCount">0</span>
</div>

<div class="total">
<span>Total</span>
<span>₱ <span id="total">0</span></span>
</div>

<div class="payment">

<label>Payment Method</label>

<select id="paymentMethod"
onchange="toggleReferenceField()">

<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
<option value="Maya">Maya</option>
<option value="Card">Card</option>
<option value="Bank Transfer">Bank Transfer</option>

</select>

<input type="number"
id="cash"
placeholder="Enter payment amount">

<input type="text"
id="referenceNumber"
placeholder="Reference Number"
style="display:none;">

<input type="number"
id="seniorDiscount"
placeholder="Senior Discount"
value="0">

<input type="number"
id="pwdDiscount"
placeholder="PWD Discount"
value="0">
  
</div>

<button class="checkout"
onclick="checkout()">

COMPLETE ORDER

</button>

<button class="clear"
onclick="clearCart()">

CLEAR CART

</button>

</div>

</div>

</div>
<!-- ORDER HISTORY MODAL -->

<div id="historyModal"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:99999;
padding:20px;
overflow:auto;
">

<div
style="
background:#1e293b;
padding:20px;
border-radius:20px;
max-width:1000px;
margin:auto;
color:white;
">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
">

<h2>Order History</h2>

<button
onclick="closeHistory()"
style="
border:none;
background:#ef4444;
color:white;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
">

Close

</button>

</div>

<div style="overflow:auto;">

<table
style="
width:100%;
border-collapse:collapse;
">

<thead>

<tr>

<th style="padding:12px;background:#111827;color:#facc15;">
OR #
</th>

<th style="padding:12px;background:#111827;color:#facc15;">
Date
</th>

<th style="padding:12px;background:#111827;color:#facc15;">
Payment
</th>

<th style="padding:12px;background:#111827;color:#facc15;">
Total
</th>

<th style="padding:12px;background:#111827;color:#facc15;">
Action
</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>

<td colspan="5"
style="padding:20px;text-align:center;">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let cart = [];

window.toggleReferenceField = function(){

const paymentMethod =
document.getElementById("paymentMethod").value;

const referenceField =
document.getElementById("referenceNumber");

if(paymentMethod === "Cash"){

referenceField.style.display = "none";

}else{

referenceField.style.display = "block";

}

}

/* CATEGORY */

async function loadCategoryButtons(){

const snapshot =
await getDocs(
collection(db,"categories")
);

const container =
document.getElementById("categoryButtons");

container.innerHTML = `

<button class="category-btn active"
onclick="filterProducts('all',event)">

All

</button>

`;

snapshot.forEach((doc)=>{

const data = doc.data();

container.innerHTML += `

<button class="category-btn"
onclick="filterProducts('${data.name}',event)">

${data.name}

</button>

`;

});

}

/* FILTER */

window.filterProducts =
function(category,event){

const allProducts =
document.querySelectorAll(".product");

const buttons =
document.querySelectorAll(".category-btn");

buttons.forEach(btn=>{

btn.classList.remove("active");

});

if(event){

event.target.classList.add("active");

}

allProducts.forEach(product=>{

const productCategory =
product.getAttribute("data-category");

if(category === "all"){

product.style.display = "block";

}else if(productCategory === category){

product.style.display = "block";

}else{

product.style.display = "none";

}

});

}

/* LOAD PRODUCTS */

async function loadProducts(){

const productsContainer =
document.getElementById("productsContainer");

productsContainer.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"products")
);

snapshot.forEach((product)=>{

const data = product.data();

let stock =
data.quantity || data.stock || 0;

let stockStatus = "";

if(stock <= 5){

stockStatus = `

<div class="low-stock">

LOW STOCK

</div>

`;

}

productsContainer.innerHTML += `

<div class="product"
data-category="${data.category}">

<img src="${data.image}"
onerror="this.src='./logo.png'">

${stockStatus}

<h3>${data.name}</h3>

<small>${data.category}</small>

<p>₱${data.price}</p>

<p>Stock: ${stock}</p>

<button onclick="addItem(
'${data.name}',
${data.price}
)">

Add

</button>

</div>

`;

});

}

/* REFRESH */

window.refreshProducts =
async function(){

await loadProducts();

alert("Products Refreshed!");

}

/* LOGOUT */

function logout(){

localStorage.clear();

window.location.href =
"index.html";

}

/* LOGOUT BUTTON */

document
.getElementById("logoutBtn")

.addEventListener(
"click",
function(){

logout();

}
);

/* CART */

window.addItem =
function(name,price){

let existing =
cart.find(item =>
item.name === name
);

if(existing){

existing.qty++;

}else{

cart.push({

name:name,
price:price,
qty:1

});

}

renderCart();

}

function renderCart(){

const cartItems =
document.getElementById("cartItems");

cartItems.innerHTML = "";

let total = 0;
let count = 0;

cart.forEach((item,index)=>{

total += item.price * item.qty;

count += item.qty;

cartItems.innerHTML += `

<div class="cart-item">

<div>

<h4>${item.name}</h4>

<p>₱${item.price}</p>

</div>

<div class="qty">

<button onclick="decreaseQty(${index})">

-

</button>

<span>${item.qty}</span>

<button onclick="increaseQty(${index})">

+

</button>

</div>

</div>

`;

});

document.getElementById("total")
.innerText = total;

document.getElementById("itemCount")
.innerText = count;

}

window.increaseQty =
function(index){

cart[index].qty++;

renderCart();

}

window.decreaseQty =
function(index){

if(cart[index].qty > 1){

cart[index].qty--;

}else{

cart.splice(index,1);

}

renderCart();

}

window.clearCart =
function(){

cart = [];

renderCart();

}

/* PRINT RECEIPT */

window.printReceipt =
function(sale){

let itemsHTML = "";

if(sale.items){

sale.items.forEach((item)=>{

itemsHTML += `

<tr>

<td>${item.name}</td>

<td>
₱${Number(
item.price || 0
).toLocaleString()}
</td>

<td>${item.qty}</td>

<td>
₱${(
(item.price || 0)
*
(item.qty || 0)
).toLocaleString()}
</td>

</tr>
`;

});

}

let receiptWindow =
window.open("","","width=400,height=700");

receiptWindow.document.write(`

<html>

<head>

<title>Receipt</title>

<style>

body{
font-family:Arial;
padding:20px;
text-align:center;
}

.logo{
width:80px;
height:80px;
object-fit:contain;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table th,
table td{
border-bottom:1px dashed #999;
padding:8px;
font-size:13px;
text-align:left;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:15px;
}

.footer{
margin-top:25px;
font-size:13px;
}

</style>

</head>

<body>

<img src="./logo.png"
class="logo">

<h2>D' Mezzanine Cafe</h2>

<p>Official Receipt</p>

<hr>

<p>
Date:
${new Date().toLocaleString()}
</p>

<p>
Payment:
${sale.paymentMethod || "Cash"}
</p>

<p>
Receipt No:
${sale.receiptNumber || "-"}
</p>

<p>
Reference:
${sale.referenceNumber || "-"}
</p>

<table>

<thead>

<tr>

<th>Item</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>

</tr>
</thead>

<tbody>

${itemsHTML}

</tbody>

</table>

<div style="
margin-top:15px;
text-align:right;
font-size:14px;
">

<p>
Subtotal:
₱${Number(
sale.subtotal || 0
).toLocaleString()}
</p>

<p>
Senior Discount:
₱${Number(
sale.seniorDiscount || 0
).toLocaleString()}
</p>

<p>
PWD Discount:
₱${Number(
sale.pwdDiscount || 0
).toLocaleString()}
</p>

</div>

<div class="total">

TOTAL:
₱${Number(
sale.total || 0
).toLocaleString()}

</div>

<div class="footer">

Thank you for dining with us ☕

<br><br>

Please come again.

</div>

<script>

window.onload = function(){

window.print();

}

<\/script>


`);

receiptWindow.document.close();

}

/* CHECKOUT */

window.checkout =
async function(){

if(cart.length === 0){

alert("Cart is empty!");

return;

}

let subtotal =
cart.reduce((sum,item)=>
sum + (item.price * item.qty),0);

const seniorDiscount =
parseFloat(
document.getElementById(
"seniorDiscount"
).value
) || 0;

const pwdDiscount =
parseFloat(
document.getElementById(
"pwdDiscount"
).value
) || 0;

let total =
subtotal -
seniorDiscount -
pwdDiscount;

if(total < 0){

total = 0;

}

const paymentMethod =
document.getElementById("paymentMethod").value;

let cash = parseFloat(
document.getElementById("cash").value
);

if(paymentMethod === "Cash"){

if(isNaN(cash) || cash < total){

alert("Insufficient payment!");

return;

}

}else{

cash = total;

}

const referenceNumber =
document.getElementById("referenceNumber").value;

if(paymentMethod !== "Cash" &&
!referenceNumber){

alert("Reference number required!");

return;

}

/* UPDATE STOCK */

for(const item of cart){

const snapshot =
await getDocs(
collection(db,"products")
);

snapshot.forEach(async(product)=>{

const data = product.data();

if(data.name === item.name){

let currentQty =
data.quantity || data.stock || 0;

let newQty =
currentQty - item.qty;

if(newQty < 0){

newQty = 0;

}

await updateDoc(

doc(db,"products",product.id),

{
quantity:newQty
}

);

}

});

}

try{

const receiptNumber =
"OR-" + Date.now();

await addDoc(collection(db,"sales"),{

receiptNumber:receiptNumber,

date:new Date().toISOString(),

subtotal:subtotal,

seniorDiscount:seniorDiscount,

pwdDiscount:pwdDiscount,

total:total,

paymentMethod:paymentMethod,

referenceNumber:
paymentMethod === "Cash"
? ""
: referenceNumber,

items: cart.map(item => ({

name:item.name,
qty:item.qty,
price:item.price

}))

});

/* PRINT */

printReceipt({

receiptNumber: receiptNumber,

items: cart,

subtotal: subtotal,

seniorDiscount: seniorDiscount,

pwdDiscount: pwdDiscount,
  
paymentMethod: paymentMethod,

referenceNumber:
paymentMethod === "Cash"
? "-"
: referenceNumber,

total: total

});

localStorage.setItem(
"salesUpdated",
Date.now()
);

alert("Order Saved!");

await loadProducts();

}catch(error){

console.log(error);

alert("Firebase save failed");

return;

}

/* CLEAR CART */

cart = [];

renderCart();

document.getElementById("cash").value = "";

document.getElementById("referenceNumber").value = "";

}
/* ORDER HISTORY */

window.openHistory =
async function(){

document.getElementById("historyModal")
.style.display = "block";

await loadOrderHistory();

}

window.closeHistory =
function(){

document.getElementById("historyModal")
.style.display = "none";

}

async function loadOrderHistory(){

const snapshot =
await getDocs(
collection(db,"sales")
);

const historyTable =
document.getElementById("historyTable");

historyTable.innerHTML = "";

if(snapshot.empty){

historyTable.innerHTML = `

<tr>

<td colspan="5"
style="padding:20px;text-align:center;">

No Orders Found

</td>

</tr>

`;

return;

}

snapshot.forEach((firebaseDoc)=>{

const sale = firebaseDoc.data();

const safeSale =
encodeURIComponent(
JSON.stringify(sale)
);

historyTable.innerHTML += `

<tr>

<td style="padding:12px;">
${sale.receiptNumber || "-"}
</td>

<td style="padding:12px;">
${new Date(sale.date)
.toLocaleString()}
</td>

<td style="padding:12px;">
${sale.paymentMethod || "Cash"}
</td>

<td style="padding:12px;">
₱${Number(sale.total || 0)
.toLocaleString()}
</td>

<td style="padding:12px;">

<button
onclick="reprintSale('${safeSale}')"
style="
border:none;
padding:8px 12px;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
">

Reprint

</button>

</td>

</tr>

`;

});

}

window.reprintSale =
function(encodedSale){

const sale =
JSON.parse(
decodeURIComponent(encodedSale)
);

printReceipt(sale);

}
/* TIME */

function updateTime(){

document.getElementById("time")
.innerText =
new Date().toLocaleString();

}

setInterval(updateTime,1000);

updateTime();

loadCategoryButtons();

loadProducts();

</script>

</body>
</html>
