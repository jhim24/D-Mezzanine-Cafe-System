<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D' Mezzanine Cashier POS</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#facc15">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:#0f172a;

    color:white;

    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

.left{

    width:70%;

    padding:20px;

    overflow-y:auto;
}

.right{

    width:30%;

    background:#111827;

    padding:20px;

    border-left:1px solid rgba(255,255,255,0.08);

    display:flex;

    flex-direction:column;
}

.topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;
}

.topbar h1{
    font-size:30px;
}

.time{

    color:#facc15;

    font-size:18px;
}

.categories{

    display:flex;

    gap:12px;

    margin-bottom:25px;

    overflow-x:auto;
}

.categories button{

    border:none;

    padding:12px 18px;

    border-radius:14px;

    background:#1e293b;

    color:white;

    cursor:pointer;

    white-space:nowrap;

    transition:.3s;
}

.categories button:hover,
.categories .active{

    background:#facc15;

    color:black;
}

.products{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

    gap:20px;
}

.product{

    background:#1e293b;

    border-radius:20px;

    padding:15px;

    text-align:center;

    cursor:pointer;

    transition:.3s;

    border:1px solid transparent;
}

.product:hover{

    transform:translateY(-5px);

    border-color:#facc15;
}

.product img{

    width:100%;

    height:140px;

    object-fit:cover;

    border-radius:14px;

    margin-bottom:10px;
}

.product h3{
    margin-bottom:5px;
}

.product p{

    color:#facc15;

    margin-bottom:10px;
}

.product button{

    width:100%;

    border:none;

    padding:10px;

    border-radius:10px;

    background:#facc15;

    color:black;

    font-weight:600;

    cursor:pointer;
}

.cart-title{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:20px;
}

.cart-items{

    flex:1;

    overflow-y:auto;
}

.cart-item{

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:#1e293b;

    padding:12px;

    border-radius:12px;

    margin-bottom:12px;
}

.cart-item h4{
    font-size:14px;
}

.cart-item p{
    color:#facc15;
    font-size:13px;
}

.qty{

    display:flex;

    align-items:center;

    gap:8px;
}

.qty button{

    width:28px;

    height:28px;

    border:none;

    border-radius:8px;

    background:#facc15;

    color:black;

    font-weight:bold;

    cursor:pointer;
}

.summary{

    margin-top:20px;

    border-top:1px solid rgba(255,255,255,0.08);

    padding-top:20px;
}

.summary div{

    display:flex;

    justify-content:space-between;

    margin-bottom:12px;
}

.total{

    font-size:24px;

    color:#facc15;

    font-weight:700;
}

.payment{

    margin-top:15px;
}

.payment input{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;

    margin-top:10px;
}

.checkout{

    width:100%;

    margin-top:20px;

    border:none;

    padding:15px;

    border-radius:14px;

    background:#22c55e;

    color:white;

    font-size:18px;

    font-weight:700;

    cursor:pointer;
}

.checkout:hover{
    background:#16a34a;
}

.clear{

    width:100%;

    margin-top:10px;

    border:none;

    padding:12px;

    border-radius:12px;

    background:#ef4444;

    color:white;

    cursor:pointer;
}

.receipt{

    position:fixed;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    width:350px;

    background:white;

    color:black;

    padding:20px;

    border-radius:20px;

    display:none;

    z-index:9999;
}

.receipt h2{

    text-align:center;

    margin-bottom:15px;
}

.receipt p{
    margin-bottom:8px;
}

.print-btn{

    width:100%;

    margin-top:15px;

    border:none;

    padding:12px;

    border-radius:10px;

    background:#111827;

    color:white;

    cursor:pointer;
}

.overlay{

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:100%;

    background:rgba(0,0,0,0.6);

    display:none;

    z-index:999;
}

@media(max-width:950px){

.container{
    flex-direction:column;
}

.left,
.right{
    width:100%;
}

.right{
    height:50vh;
}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

    <div class="topbar">

        <h1>Cashier POS ☕</h1>

        <div class="time" id="time"></div>

    </div>

    <div class="categories">

        <button class="active">Coffee</button>

        <button>Meals</button>

        <button>Frappes</button>

        <button>Desserts</button>

    </div>

    <div class="products">

        <div class="product">

            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=800">

            <h3>Spanish Latte</h3>

            <p>₱220</p>

            <button onclick="addItem('Spanish Latte',220)">
                Add
            </button>

        </div>

        <div class="product">

            <img src="https://images.unsplash.com/photo-1517701604599-bb29b565090c?q=80&w=800">

            <h3>Dark Mocha</h3>

            <p>₱250</p>

            <button onclick="addItem('Dark Mocha',250)">
                Add
            </button>

        </div>

        <div class="product">

            <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?q=80&w=800">

            <h3>Carbonara</h3>

            <p>₱320</p>

            <button onclick="addItem('Carbonara',320)">
                Add
            </button>

        </div>

        <div class="product">

            <img src="https://images.unsplash.com/photo-1562967916-eb82221dfb92?q=80&w=800">

            <h3>Chicken Wings</h3>

            <p>₱420</p>

            <button onclick="addItem('Chicken Wings',420)">
                Add
            </button>

        </div>

    </div>

</div>

<div class="right">

    <div class="cart-title">

        <h2>Current Order</h2>

        <i class="fa-solid fa-cart-shopping"></i>

    </div>

    <div class="cart-items" id="cartItems"></div>

    <div class="summary">

        <div>
            <span>Items</span>
            <span id="itemCount">0</span>
        </div>

        <div class="total">
            <span>Total</span>
            <span>₱ <span id="total">0</span></span>
        </div>

        <div class="payment">

            <label>Cash Payment</label>

            <input type="number" id="cash" placeholder="Enter cash amount">

        </div>

        <button class="checkout" onclick="checkout()">
            COMPLETE ORDER
        </button>

        <button class="clear" onclick="clearCart()">
            CLEAR CART
        </button>

    </div>

</div>

</div>

<div class="overlay" id="overlay"></div>

<div class="receipt" id="receipt">

    <h2>D' Mezzanine Cafe</h2>

    <div id="receiptItems"></div>

    <hr><br>

    <p><strong>Total:</strong> ₱ <span id="receiptTotal"></span></p>

    <p><strong>Cash:</strong> ₱ <span id="receiptCash"></span></p>

    <p><strong>Change:</strong> ₱ <span id="receiptChange"></span></p>

    <br>

    <p style="text-align:center;">
        Thank you ☕
    </p>

    <button class="print-btn" onclick="window.print()">
        PRINT RECEIPT
    </button>

</div>

<script>

let cart = [];

function addItem(name,price){

    let existing = cart.find(item=>item.name===name);

    if(existing){

        existing.qty++;

    }else{

        cart.push({

            name,

            price,

            qty:1

        });

    }

    renderCart();
}

function renderCart(){

    const cartItems = document.getElementById("cartItems");

    cartItems.innerHTML = "";

    let total = 0;

    let count = 0;

    cart.forEach((item,index)=>{

        total += item.price * item.qty;

        count += item.qty;

        cartItems.innerHTML += `

        <div class="cart-item">

            <div>

                <h4>${item.name}</h4>

                <p>₱${item.price}</p>

            </div>

            <div class="qty">

                <button onclick="decreaseQty(${index})">-</button>

                <span>${item.qty}</span>

                <button onclick="increaseQty(${index})">+</button>

            </div>

        </div>

        `;

    });

    document.getElementById("total").innerText = total;

    document.getElementById("itemCount").innerText = count;
}

function increaseQty(index){

    cart[index].qty++;

    renderCart();
}

function decreaseQty(index){

    if(cart[index].qty > 1){

        cart[index].qty--;

    }else{

        cart.splice(index,1);

    }

    renderCart();
}

function clearCart(){

    cart = [];

    renderCart();
}

function checkout(){

    let total = cart.reduce((sum,item)=>

        sum + (item.price * item.qty)

    ,0);

    let cash = parseFloat(document.getElementById("cash").value);

    if(isNaN(cash) || cash < total){

        alert("Insufficient cash!");

        return;
    }

    let change = cash - total;

    document.getElementById("overlay").style.display = "block";

    document.getElementById("receipt").style.display = "block";

    document.getElementById("receiptItems").innerHTML = cart.map(item=>

        `<p>${item.qty}x ${item.name} - ₱${item.price * item.qty}</p>`

    ).join("");

    document.getElementById("receiptTotal").innerText = total;

    document.getElementById("receiptCash").innerText = cash;

    document.getElementById("receiptChange").innerText = change;

    let sales = JSON.parse(localStorage.getItem("sales")) || [];

    sales.push({

        date:new Date().toLocaleString(),

        total

    });

    localStorage.setItem("sales",JSON.stringify(sales));

    cart = [];

    renderCart();
}

function updateTime(){

    document.getElementById("time").innerText =

    new Date().toLocaleString();

}

setInterval(updateTime,1000);

updateTime();

if ('serviceWorker' in navigator) {

    window.addEventListener('load', async () => {

        try {

            await navigator.serviceWorker.register('./sw.js?v=999');

        } catch (error) {

            console.log(error);

        }

    });

}

</script>

</body>
</html>
