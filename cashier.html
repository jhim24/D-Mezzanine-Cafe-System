<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D' Mezzanine Cashier POS</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#facc15">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

.left{
width:70%;
padding:20px;
overflow-y:auto;
}

.right{
width:30%;
background:#111827;
padding:20px;
border-left:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
gap:10px;
}

.topbar h1{
font-size:30px;
}

.time{
color:#facc15;
font-size:18px;
}

.refresh-btn{
border:none;
width:42px;
height:42px;
border-radius:12px;
background:#facc15;
color:black;
cursor:pointer;
font-size:16px;
}

.categories{
display:flex;
gap:12px;
margin-bottom:25px;
overflow-x:auto;
flex-wrap:wrap;
}

.category-btn{
border:none;
padding:12px 18px;
border-radius:14px;
background:#1e293b;
color:white;
cursor:pointer;
white-space:nowrap;
font-weight:600;
}

.category-btn.active,
.category-btn:hover{
background:#facc15;
color:black;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.product{
background:#1e293b;
border-radius:20px;
padding:15px;
text-align:center;
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:14px;
margin-bottom:10px;
}

.product p{
color:#facc15;
margin-bottom:10px;
}

.product button{
width:100%;
border:none;
padding:10px;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:600;
cursor:pointer;
}

.low-stock{
background:#ef4444;
padding:5px 10px;
border-radius:30px;
font-size:11px;
font-weight:600;
display:inline-block;
margin-bottom:10px;
}

.cart-items{
flex:1;
overflow-y:auto;
max-height:300px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.qty{
display:flex;
align-items:center;
gap:5px;
}

.qty button{
width:24px;
height:24px;
border:none;
border-radius:8px;
background:#facc15;
cursor:pointer;
font-weight:bold;
}

.summary{
margin-top:20px;
}

.payment{
margin-top:15px;
}

.payment input,
.payment select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
margin-top:10px;
}

.checkout{
width:100%;
margin-top:20px;
border:none;
padding:15px;
border-radius:14px;
background:#22c55e;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.clear{
width:100%;
margin-top:10px;
border:none;
padding:12px;
border-radius:12px;
background:#ef4444;
color:white;
cursor:pointer;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
z-index:999;
}

.receipt{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
background:white;
color:black;
padding:20px;
border-radius:10px;
display:none;
z-index:9999;
}

.receipt-items p,
.receipt-summary p{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.receipt-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.print-btn,
.close-btn{
flex:1;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.print-btn{
background:#111827;
color:white;
}

.close-btn{
background:#ef4444;
color:white;
}

@media(max-width:950px){

.container{
flex-direction:column;
}

.left,
.right{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<div class="topbar">

<h1>Cashier POS ☕</h1>

<div style="display:flex;align-items:center;gap:10px;">

<div class="time" id="time"></div>

<button class="refresh-btn"
onclick="refreshProducts()">

<i class="fa-solid fa-rotate-right"></i>

</button>

</div>

</div>

<div class="categories"
id="categoryButtons">

</div>

<div class="products"
id="productsContainer">

</div>

</div>

<div class="right">

<h2>Current Order</h2>

<div class="cart-items"
id="cartItems">

</div>

<div class="summary">

<h2>
Total:
₱ <span id="total">0</span>
</h2>

<div class="payment">

<label>Payment Method</label>

<select id="paymentMethod"
onchange="toggleReferenceField()">

<option value="Cash">Cash</option>
<option value="GCash">GCash</option>
<option value="Maya">Maya</option>
<option value="Card">Card</option>
<option value="Bank Transfer">Bank Transfer</option>

</select>

<input type="number"
id="cash"
placeholder="Enter payment amount">

<input type="text"
id="referenceNumber"
placeholder="Reference Number"
style="display:none;">

</div>

<button class="checkout"
onclick="checkout()">

COMPLETE ORDER

</button>

<button class="clear"
onclick="clearCart()">

CLEAR CART

</button>

</div>

</div>

</div>

<div class="overlay"
id="overlay"></div>

<div class="receipt"
id="receipt">

<h2>D' Mezzanine Cafe</h2>

<p id="receiptDate"></p>

<hr>

<div class="receipt-items"
id="receiptItems"></div>

<hr>

<div class="receipt-summary">

<p>
<span>Total</span>
<span>₱ <span id="receiptTotal"></span></span>
</p>

<p>
<span id="paymentLabel"></span>
<span>₱ <span id="receiptCash"></span></span>
</p>

<p id="referenceRow"
style="display:none;">

<span>Reference</span>

<span id="receiptReference"></span>

</p>

<p>
<span>Change</span>
<span>₱ <span id="receiptChange"></span></span>
</p>

</div>

<div class="receipt-buttons">

<button class="print-btn"
onclick="window.print()">

PRINT

</button>

<button class="close-btn"
onclick="closeReceipt()">

CLOSE

</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
addDoc,
doc,
updateDoc

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let cart = [];

window.toggleReferenceField = function(){

const paymentMethod =
document.getElementById("paymentMethod").value;

const referenceField =
document.getElementById("referenceNumber");

if(paymentMethod === "Cash"){

referenceField.style.display = "none";

}else{

referenceField.style.display = "block";

}

}

async function loadCategoryButtons(){

const snapshot =
await getDocs(
collection(db,"categories")
);

const container =
document.getElementById("categoryButtons");

container.innerHTML = `

<button class="category-btn active"
onclick="filterCategory('all',event)">

All

</button>

`;

snapshot.forEach((doc)=>{

const data = doc.data();

container.innerHTML += `

<button class="category-btn"

onclick="filterCategory('${data.name}',event)">

${data.name}

</button>

`;

});

}

window.filterCategory =
async function(category,event){

const buttons =
document.querySelectorAll(".category-btn");

buttons.forEach(btn=>{

btn.classList.remove("active");

});

if(event){
event.target.classList.add("active");
}

const snapshot =
await getDocs(
collection(db,"products")
);

const container =
document.getElementById("productsContainer");

container.innerHTML = "";

snapshot.forEach((doc)=>{

const data = doc.data();

if(
category === "all" ||
data.category === category
){

let stockBadge = "";

if(data.quantity <= 5){

stockBadge =
`<div class="low-stock">
LOW STOCK
</div>`;

}

container.innerHTML += `

<div class="product">

<img src="${data.image}">

${stockBadge}

<h3>${data.name}</h3>

<p>${data.category}</p>

<p>₱${data.price}</p>

<p>Stock: ${data.quantity}</p>

<button onclick="addItem(
'${doc.id}',
'${data.name}',
${data.price}
)">

Add

</button>

</div>

`;

}

});

}

window.refreshProducts =
async function(){

await filterCategory("all");

alert("Products Refreshed!");

}

window.addItem =
function(id,name,price){

const existing =
cart.find(item=>item.id===id);

if(existing){

existing.qty++;

}else{

cart.push({
id,
name,
price,
qty:1
});

}

renderCart();

}

function renderCart(){

const cartItems =
document.getElementById("cartItems");

cartItems.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{

total += item.price * item.qty;

cartItems.innerHTML += `

<div class="cart-item">

<div>

<h4>${item.name}</h4>

<p>₱${item.price}</p>

</div>

<div class="qty">

<button onclick="decreaseQty(${index})">

-

</button>

<span>${item.qty}</span>

<button onclick="increaseQty(${index})">

+

</button>

</div>

</div>

`;

});

document.getElementById("total")
.innerText = total;

}

window.increaseQty =
function(index){

cart[index].qty++;

renderCart();

}

window.decreaseQty =
function(index){

if(cart[index].qty > 1){

cart[index].qty--;

}else{

cart.splice(index,1);

}

renderCart();

}

window.clearCart =
function(){

cart = [];

renderCart();

}

window.checkout =
async function(){

if(cart.length === 0){

alert("Cart Empty");

return;

}

const paymentMethod =
document.getElementById("paymentMethod").value;

const cash =
parseFloat(
document.getElementById("cash").value
);

const reference =
document.getElementById("referenceNumber").value;

let total = 0;

cart.forEach(item=>{

total += item.price * item.qty;

});

if(cash < total){

alert("Insufficient Payment");

return;

}

if(paymentMethod !== "Cash" &&
reference === ""){

alert("Reference Required");

return;

}

for(const item of cart){

const snapshot =
await getDocs(
collection(db,"products")
);

snapshot.forEach(async(product)=>{

const data = product.data();

if(data.name === item.name){

let newQty =
data.quantity - item.qty;

if(newQty < 0){

newQty = 0;

}

await updateDoc(

doc(db,"products",product.id),

{
quantity:newQty
}

);

}

});

}

await addDoc(
collection(db,"sales"),
{
items:cart,
total:total,
paymentMethod,
reference,
createdAt:
new Date().toISOString()
}
);

let change = cash - total;

document.getElementById("overlay")
.style.display = "block";

document.getElementById("receipt")
.style.display = "block";

document.getElementById("receiptDate")
.innerText =
new Date().toLocaleString();

document.getElementById("receiptItems")
.innerHTML =

cart.map(item =>

`<p>
<span>${item.qty}x ${item.name}</span>
<span>₱${item.price * item.qty}</span>
</p>`

).join("");

document.getElementById("receiptTotal")
.innerText = total;

document.getElementById("paymentLabel")
.innerText = paymentMethod;

document.getElementById("receiptCash")
.innerText = cash;

document.getElementById("receiptChange")
.innerText = change;

if(paymentMethod !== "Cash"){

document.getElementById("referenceRow")
.style.display = "flex";

document.getElementById("receiptReference")
.innerText = reference;

}else{

document.getElementById("referenceRow")
.style.display = "none";

}

cart = [];

renderCart();

await filterCategory("all");

}

window.closeReceipt =
function(){

document.getElementById("receipt")
.style.display = "none";

document.getElementById("overlay")
.style.display = "none";

}

function updateTime(){

document.getElementById("time")
.innerText =
new Date().toLocaleString();

}

setInterval(updateTime,1000);

updateTime();

loadCategoryButtons();

filterCategory("all");

</script>

</body>
</html>
