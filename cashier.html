<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D' Mezzanine Cashier POS</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#facc15">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

.left{
width:70%;
padding:20px;
overflow-y:auto;
}

.right{
width:30%;
background:#111827;
padding:20px;
border-left:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.topbar h1{
font-size:30px;
}

.categories{
display:flex;
gap:12px;
margin-bottom:25px;
overflow-x:auto;
flex-wrap:wrap;
}

.category-btn{
border:none;
padding:12px 18px;
border-radius:14px;
background:#1e293b;
color:white;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.category-btn:hover,
.category-btn.active{
background:#facc15;
color:black;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.product{
background:#1e293b;
border-radius:20px;
padding:15px;
text-align:center;
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:14px;
margin-bottom:10px;
}

.product p{
color:#facc15;
margin-bottom:10px;
}

.product button{
width:100%;
border:none;
padding:10px;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:600;
cursor:pointer;
}

.low-stock{
background:#ef4444;
padding:5px 10px;
border-radius:30px;
font-size:11px;
font-weight:600;
display:inline-block;
margin-bottom:10px;
}

.cart-items{
flex:1;
overflow-y:auto;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.qty{
display:flex;
align-items:center;
gap:5px;
}

.qty button{
width:24px;
height:24px;
border:none;
border-radius:8px;
background:#facc15;
cursor:pointer;
font-weight:bold;
}

.summary{
margin-top:20px;
}

.checkout{
width:100%;
margin-top:20px;
border:none;
padding:15px;
border-radius:14px;
background:#22c55e;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.clear{
width:100%;
margin-top:10px;
border:none;
padding:12px;
border-radius:12px;
background:#ef4444;
color:white;
cursor:pointer;
}

@media(max-width:950px){

.container{
flex-direction:column;
}

.left,
.right{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<div class="topbar">

<h1>Cashier POS ☕</h1>

</div>

<!-- AUTO CATEGORY BUTTONS -->

<div class="categories"
id="categoryButtons">

</div>

<!-- PRODUCTS -->

<div class="products"
id="productsContainer">

</div>

</div>

<!-- RIGHT -->

<div class="right">

<h2>Current Order</h2>

<div class="cart-items"
id="cartItems">

</div>

<div class="summary">

<h2>
Total:
₱ <span id="total">0</span>
</h2>

<button class="checkout"
onclick="checkout()">

COMPLETE ORDER

</button>

<button class="clear"
onclick="clearCart()">

CLEAR CART

</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
addDoc,
doc,
updateDoc

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let cart = [];

async function loadCategoryButtons(){

const snapshot =
await getDocs(
collection(db,"categories")
);

const container =
document.getElementById("categoryButtons");

container.innerHTML = `

<button class="category-btn active"
onclick="filterCategory('all',event)">

All

</button>

`;

snapshot.forEach((doc)=>{

const data = doc.data();

container.innerHTML += `

<button class="category-btn"

onclick="filterCategory('${data.name}',event)">

${data.name}

</button>

`;

});

}

window.filterCategory =
async function(category,event){

const buttons =
document.querySelectorAll(".category-btn");

buttons.forEach(btn=>{

btn.classList.remove("active");

});

event.target.classList.add("active");

const snapshot =
await getDocs(
collection(db,"products")
);

const container =
document.getElementById("productsContainer");

container.innerHTML = "";

snapshot.forEach((doc)=>{

const data = doc.data();

if(
category === "all" ||
data.category === category
){

let stockBadge = "";

if(data.stock <= 5){

stockBadge =
`<div class="low-stock">
LOW STOCK
</div>`;

}

container.innerHTML += `

<div class="product">

<img src="${data.image}">

${stockBadge}

<h3>${data.name}</h3>

<small>${data.category}</small>

<p>₱${data.price}</p>

<p>Stock: ${data.stock}</p>

<button onclick="addItem(
'${doc.id}',
'${data.name}',
${data.price}
)">

Add

</button>

</div>

`;

}

});

}

window.addItem =
function(id,name,price){

const existing =
cart.find(item=>item.id===id);

if(existing){

existing.qty++;

}else{

cart.push({
id,
name,
price,
qty:1
});

}

renderCart();

}

function renderCart(){

const cartItems =
document.getElementById("cartItems");

cartItems.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{

total += item.price * item.qty;

cartItems.innerHTML += `

<div class="cart-item">

<div>

<h4>${item.name}</h4>

<p>₱${item.price}</p>

</div>

<div class="qty">

<button onclick="decreaseQty(${index})">

-

</button>

<span>${item.qty}</span>

<button onclick="increaseQty(${index})">

+

</button>

</div>

</div>

`;

});

document.getElementById("total")
.innerText = total;

}

window.increaseQty =
function(index){

cart[index].qty++;

renderCart();

}

window.decreaseQty =
function(index){

if(cart[index].qty > 1){

cart[index].qty--;

}else{

cart.splice(index,1);

}

renderCart();

}

window.clearCart =
function(){

cart = [];

renderCart();

}

window.checkout =
async function(){

if(cart.length === 0){

alert("Cart Empty");

return;

}

let total = 0;

for(const item of cart){

total += item.price * item.qty;

const snapshot =
await getDocs(
collection(db,"products")
);

snapshot.forEach(async(product)=>{

const data = product.data();

if(data.name === item.name){

let newStock =
data.stock - item.qty;

if(newStock < 0){

newStock = 0;

}

await updateDoc(

doc(db,"products",product.id),

{
stock:newStock
}

);

}

});

}

await addDoc(
collection(db,"sales"),
{
items:cart,
total:total,
createdAt:
new Date().toISOString()
}
);

alert("Order Complete!");

cart = [];

renderCart();

filterCategory("all",{
target:document.querySelector(".category-btn")
});

}

loadCategoryButtons();

filterCategory("all",{
target:document.querySelector(".category-btn")
});

</script>

</body>
</html>
