<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D' Mezzanine Cashier POS</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#facc15">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

.left{
width:70%;
padding:20px;
overflow-y:auto;
}

.right{
width:30%;
background:#111827;
padding:20px;
border-left:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.topbar h1{
font-size:30px;
}

.time{
color:#facc15;
font-size:18px;
}

.categories{
display:flex;
gap:12px;
margin-bottom:25px;
overflow-x:auto;
}

.category-btn{
border:none;
padding:12px 18px;
border-radius:14px;
background:#1e293b;
color:white;
cursor:pointer;
white-space:nowrap;
transition:.3s;
font-weight:600;
}

.category-btn:hover,
.category-btn.active{
background:#facc15;
color:black;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.product{
background:#1e293b;
border-radius:20px;
padding:15px;
text-align:center;
transition:.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:14px;
margin-bottom:10px;
}

.product h3{
margin-bottom:5px;
}

.product p{
color:#facc15;
margin-bottom:10px;
}

.product small{
display:block;
margin-bottom:10px;
color:#cbd5e1;
}

.product button{
width:100%;
border:none;
padding:10px;
border-radius:10px;
background:#facc15;
color:black;
font-weight:600;
cursor:pointer;
}

.low-stock{
background:#ef4444;
padding:5px 10px;
border-radius:30px;
font-size:11px;
font-weight:600;
display:inline-block;
margin-bottom:10px;
}

.cart-title{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.cart-items{
flex:1;
overflow-y:auto;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
padding:12px;
border-radius:12px;
margin-bottom:12px;
}

.qty{
display:flex;
align-items:center;
gap:8px;
}

.qty button{
width:28px;
height:28px;
border:none;
border-radius:8px;
background:#facc15;
color:black;
font-weight:bold;
cursor:pointer;
}

.summary{
margin-top:20px;
border-top:1px solid rgba(255,255,255,0.08);
padding-top:20px;
}

.summary div{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

.total{
font-size:24px;
color:#facc15;
font-weight:700;
}

.payment input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
margin-top:10px;
}

.checkout{
width:100%;
margin-top:20px;
border:none;
padding:15px;
border-radius:14px;
background:#22c55e;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.clear{
width:100%;
margin-top:10px;
border:none;
padding:12px;
border-radius:12px;
background:#ef4444;
color:white;
cursor:pointer;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
z-index:999;
}

.receipt{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
background:white;
color:black;
padding:20px;
border-radius:10px;
display:none;
z-index:9999;
}

.receipt-header{
text-align:center;
border-bottom:1px dashed #000;
padding-bottom:10px;
margin-bottom:10px;
}

.receipt-items p,
.receipt-summary p{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.receipt-summary{
border-top:1px dashed #000;
padding-top:10px;
margin-top:10px;
}

.receipt-footer{
text-align:center;
margin-top:15px;
border-top:1px dashed #000;
padding-top:10px;
font-size:13px;
}

.receipt-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.print-btn,
.close-btn{
flex:1;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.print-btn{
background:#111827;
color:white;
}

.close-btn{
background:#ef4444;
color:white;
}

@media(max-width:950px){

.container{
flex-direction:column;
}

.left,
.right{
width:100%;
}

.right{
height:50vh;
}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<div class="topbar">

<h1>Cashier POS ☕</h1>

<div class="time" id="time"></div>

</div>

<div class="categories">

<button class="category-btn active"
onclick="filterProducts('all',event)">
All
</button>

<button class="category-btn"
onclick="filterProducts('Coffee',event)">
Coffee
</button>

<button class="category-btn"
onclick="filterProducts('Meals',event)">
Meals
</button>

<button class="category-btn"
onclick="filterProducts('Frappes',event)">
Frappes
</button>

<button class="category-btn"
onclick="filterProducts('Desserts',event)">
Desserts
</button>

</div>

<div class="products" id="productsContainer">

<!-- DEFAULT PRODUCTS -->

<div class="product" data-category="Coffee">

<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=800">

<h3>Spanish Latte</h3>

<small>Coffee</small>

<p>₱220</p>

<button onclick="addItem('Spanish Latte',220)">
Add
</button>

</div>

<div class="product" data-category="Coffee">

<img src="https://images.unsplash.com/photo-1517701604599-bb29b565090c?q=80&w=800">

<h3>Dark Mocha</h3>

<small>Coffee</small>

<p>₱250</p>

<button onclick="addItem('Dark Mocha',250)">
Add
</button>

</div>

<div class="product" data-category="Meals">

<img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?q=80&w=800">

<h3>Carbonara</h3>

<small>Meals</small>

<p>₱320</p>

<button onclick="addItem('Carbonara',320)">
Add
</button>

</div>

<div class="product" data-category="Meals">

<img src="https://images.unsplash.com/photo-1562967916-eb82221dfb92?q=80&w=800">

<h3>Chicken Wings</h3>

<small>Meals</small>

<p>₱420</p>

<button onclick="addItem('Chicken Wings',420)">
Add
</button>

</div>

</div>

</div>

<div class="right">

<div class="cart-title">

<h2>Current Order</h2>

<i class="fa-solid fa-cart-shopping"></i>

</div>

<div class="cart-items" id="cartItems"></div>

<div class="summary">

<div>
<span>Items</span>
<span id="itemCount">0</span>
</div>

<div class="total">
<span>Total</span>
<span>₱ <span id="total">0</span></span>
</div>

<div class="payment">

<label>Cash Payment</label>

<input type="number"
id="cash"
placeholder="Enter cash amount">

</div>

<button class="checkout" onclick="checkout()">
COMPLETE ORDER
</button>

<button class="clear" onclick="clearCart()">
CLEAR CART
</button>

</div>

</div>

</div>

<div class="overlay" id="overlay"></div>

<div class="receipt" id="receipt">

<div class="receipt-header">

<h2>D' Mezzanine Cafe</h2>

<p>Cafe & Restaurant</p>

<small id="receiptDate"></small>

</div>

<div class="receipt-items" id="receiptItems"></div>

<div class="receipt-summary">

<p>
<span>Total</span>
<span>₱ <span id="receiptTotal"></span></span>
</p>

<p>
<span>Cash</span>
<span>₱ <span id="receiptCash"></span></span>
</p>

<p>
<span>Change</span>
<span>₱ <span id="receiptChange"></span></span>
</p>

</div>

<div class="receipt-footer">
Thank you for your order ☕
</div>

<div class="receipt-buttons">

<button class="print-btn" onclick="window.print()">
PRINT
</button>

<button class="close-btn" onclick="closeReceipt()">
CLOSE
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3",

measurementId: "G-1X8L2KQDYF"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.filterProducts = function(category,event){

const allProducts =
document.querySelectorAll(".product");

const buttons =
document.querySelectorAll(".category-btn");

buttons.forEach(btn=>{
btn.classList.remove("active");
});

event.target.classList.add("active");

allProducts.forEach(product=>{

const productCategory =
product.getAttribute("data-category");

if(category === "all"){

product.style.display = "block";

}else if(productCategory === category){

product.style.display = "block";

}else{

product.style.display = "none";

}

});

}

async function loadProducts(){

const productsContainer =
document.getElementById("productsContainer");

const snapshot = await getDocs(
collection(db,"products")
);

snapshot.forEach((product)=>{

const data = product.data();

let stockStatus = "";

if(data.quantity <= 5){

stockStatus =
`<div class="low-stock">LOW STOCK</div>`;

}

productsContainer.innerHTML += `

<div class="product"
data-category="${data.category}">

<img src="${data.image}">

${stockStatus}

<h3>${data.name}</h3>

<small>${data.category}</small>

<p>₱${data.price}</p>

<button onclick="addItem('${data.name}',${data.price})">
Add
</button>

</div>

`;

});

}

let cart = [];

window.addItem = function(name,price){

let existing = cart.find(item => item.name === name);

if(existing){

existing.qty++;

}else{

cart.push({
name:name,
price:price,
qty:1
});

}

renderCart();

}

function renderCart(){

const cartItems =
document.getElementById("cartItems");

cartItems.innerHTML = "";

let total = 0;

let count = 0;

cart.forEach((item,index)=>{

total += item.price * item.qty;

count += item.qty;

cartItems.innerHTML += `

<div class="cart-item">

<div>

<h4>${item.name}</h4>

<p>₱${item.price}</p>

</div>

<div class="qty">

<button onclick="decreaseQty(${index})">-</button>

<span>${item.qty}</span>

<button onclick="increaseQty(${index})">+</button>

</div>

</div>

`;

});

document.getElementById("total").innerText = total;

document.getElementById("itemCount").innerText = count;

}

window.increaseQty = function(index){

cart[index].qty++;

renderCart();

}

window.decreaseQty = function(index){

if(cart[index].qty > 1){

cart[index].qty--;

}else{

cart.splice(index,1);

}

renderCart();

}

window.clearCart = function(){

cart = [];

renderCart();

}

window.checkout = async function(){

if(cart.length === 0){

alert("Cart is empty!");

return;

}

let total = cart.reduce((sum,item)=>
sum + (item.price * item.qty),0);

let cash = parseFloat(
document.getElementById("cash").value
);

if(isNaN(cash) || cash < total){

alert("Insufficient cash!");

return;

}

let change = cash - total;

document.getElementById("overlay").style.display = "block";

document.getElementById("receipt").style.display = "block";

document.getElementById("receiptDate").innerText =
new Date().toLocaleString();

document.getElementById("receiptItems").innerHTML =

cart.map(item =>

`<p>
<span>${item.qty}x ${item.name}</span>
<span>₱${item.price * item.qty}</span>
</p>`

).join("");

document.getElementById("receiptTotal").innerText = total;

document.getElementById("receiptCash").innerText = cash;

document.getElementById("receiptChange").innerText = change;

try{

await addDoc(collection(db,"sales"),{

date:new Date().toISOString(),

total:total,

items: cart.map(item => ({

name:item.name,
qty:item.qty,
price:item.price

}))

});

alert("Order Saved!");

}catch(error){

console.log(error);

alert("Firebase save failed");

}

cart = [];

renderCart();

document.getElementById("cash").value = "";

}

window.closeReceipt = function(){

document.getElementById("receipt").style.display = "none";

document.getElementById("overlay").style.display = "none";

}

function updateTime(){

document.getElementById("time").innerText =
new Date().toLocaleString();

}

setInterval(updateTime,1000);

updateTime();

loadProducts();

</script>

</body>
</html>
