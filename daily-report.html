<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Daily Report</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
overflow-x:auto;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:10px;
}

.topbar h1{
font-size:30px;
}

/* BUTTONS */

.back-btn{
text-decoration:none;
background:#facc15;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:600;
display:inline-flex;
align-items:center;
gap:8px;
}

.print-btn,
.save-btn{
border:none;
padding:12px 18px;
border-radius:12px;
font-weight:600;
cursor:pointer;
display:inline-flex;
align-items:center;
gap:8px;
}

.print-btn{
background:#2563eb;
color:white;
}

.save-btn{
background:#22c55e;
color:white;
}

/* TABLE */

.report-box{
background:#111827;
padding:20px;
border-radius:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1700px;
}

table th{
background:#0f172a;
color:#facc15;
padding:14px;
border:1px solid rgba(255,255,255,0.1);
white-space:nowrap;
}

table td{
padding:10px;
border:1px solid rgba(255,255,255,0.08);
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:14px;
}

input[readonly]{
background:#14532d;
font-weight:bold;
}

.short-over{
background:#7f1d1d !important;
}

/* MOBILE */

@media(max-width:700px){

.topbar h1{
font-size:24px;
}

table{
font-size:12px;
}

input{
font-size:12px;
padding:10px;
}

}

/* PRINT */

@media print{

body{
background:white;
color:black;
padding:0;
}

.back-btn,
.print-btn,
.save-btn{
display:none;
}

.report-box{
background:white;
padding:0;
}

table th{
background:#ddd;
color:black;
}

table td{
border:1px solid #ccc;
color:black;
}

input{
background:white !important;
color:black !important;
border:none;
}

}

</style>

</head>

<body>

<div class="topbar">

<a href="sales-report.html"
class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

Back

</a>

<h1>Daily Cash Report</h1>

<div style="
display:flex;
gap:10px;
flex-wrap:wrap;
">

<button class="print-btn"
onclick="window.print()">

<i class="fa-solid fa-print"></i>

Print

</button>

<button class="save-btn"
onclick="saveReport()">

<i class="fa-solid fa-floppy-disk"></i>

Save Report

</button>

</div>

</div>

<div class="report-box">

<table>

<thead>

<tr>

<th>DATE</th>

<th>GROSS SALES</th>

<th>SR DISC</th>

<th>PWD DISC</th>

<th>EMPLOYEE DISC</th>

<th>ITEM DISC</th>

<th>SALES REFUND</th>

<th>NET SALES</th>

<th>CARD</th>

<th>GCASH</th>

<th>MAYA</th>

<th>FOODPANDA / GRAB</th>

<th>EMPLOYEE CHARGES</th>

<th>CASH SALES</th>

<th>CASH ON HAND</th>

<th>SHORT / OVER</th>

</tr>

</thead>

<tbody>

<tr>

<td>
<input type="date"
id="reportDate">
</td>

<td>
<input type="number"
id="grossSales"
value="0">
</td>

<td>
<input type="number"
id="srDiscount"
value="0">
</td>

<td>
<input type="number"
id="pwdDiscount"
value="0">
</td>

<td>
<input type="number"
id="employeeDiscount"
value="0">
</td>

<td>
<input type="number"
id="itemDiscount"
value="0">
</td>

<td>
<input type="number"
id="salesRefund"
value="0">
</td>

<td>
<input type="number"
id="netSales"
readonly>
</td>

<td>
<input type="number"
id="cardSales"
value="0">
</td>

<td>
<input type="number"
id="gcashSales"
value="0">
</td>

<td>
<input type="number"
id="mayaSales"
value="0">
</td>

<td>
<input type="number"
id="deliverySales"
value="0">
</td>

<td>
<input type="number"
id="employeeCharges"
value="0">
</td>

<td>
<input type="number"
id="cashSales"
value="0">
</td>

<td>
<input type="number"
id="cashOnHand"
value="0">
</td>

<td>
<input type="number"
id="shortOver"
class="short-over"
readonly>
</td>

</tr>

</tbody>

</table>

</div>

<script>

/* AUTO TODAY DATE */

document.getElementById("reportDate").value =
new Date().toISOString().split("T")[0];

/* COMPUTE */

function computeReport(){

let grossSales =
parseFloat(
document.getElementById("grossSales").value
) || 0;

let srDiscount =
parseFloat(
document.getElementById("srDiscount").value
) || 0;

let pwdDiscount =
parseFloat(
document.getElementById("pwdDiscount").value
) || 0;

let employeeDiscount =
parseFloat(
document.getElementById("employeeDiscount").value
) || 0;

let itemDiscount =
parseFloat(
document.getElementById("itemDiscount").value
) || 0;

let salesRefund =
parseFloat(
document.getElementById("salesRefund").value
) || 0;

/* NET SALES */

let netSales =

grossSales
-
srDiscount
-
pwdDiscount
-
employeeDiscount
-
itemDiscount
-
salesRefund;

document.getElementById("netSales")
.value = netSales.toFixed(2);

/* SHORT / OVER */

let cashSales =
parseFloat(
document.getElementById("cashSales").value
) || 0;

let cashOnHand =
parseFloat(
document.getElementById("cashOnHand").value
) || 0;

let shortOver =
cashOnHand - cashSales;

document.getElementById("shortOver")
.value = shortOver.toFixed(2);

}

/* AUTO LISTENER */

document.querySelectorAll("input")
.forEach(input=>{

input.addEventListener(
"input",
computeReport
);

});

/* INITIAL COMPUTE */

computeReport();

/* SAVE */

function saveReport(){

const report = {

date:
document.getElementById("reportDate").value,

grossSales:
document.getElementById("grossSales").value,

srDiscount:
document.getElementById("srDiscount").value,

pwdDiscount:
document.getElementById("pwdDiscount").value,

employeeDiscount:
document.getElementById("employeeDiscount").value,

itemDiscount:
document.getElementById("itemDiscount").value,

salesRefund:
document.getElementById("salesRefund").value,

netSales:
document.getElementById("netSales").value,

cardSales:
document.getElementById("cardSales").value,

gcashSales:
document.getElementById("gcashSales").value,

mayaSales:
document.getElementById("mayaSales").value,

deliverySales:
document.getElementById("deliverySales").value,

employeeCharges:
document.getElementById("employeeCharges").value,

cashSales:
document.getElementById("cashSales").value,

cashOnHand:
document.getElementById("cashOnHand").value,

shortOver:
document.getElementById("shortOver").value

};

localStorage.setItem(
"dailyCashReport",
JSON.stringify(report)
);

alert("Daily Report Saved!");

}

</script>

</body>
</html>
