<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Waste Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:300px;
background:#111827;
padding:20px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo-box{
display:flex;
align-items:center;
gap:14px;
margin-bottom:30px;
}

.logo-box img{
width:65px;
height:65px;
border-radius:50%;
background:white;
padding:5px;
border:3px solid #facc15;
object-fit:contain;
}

.logo-text h2{
font-size:20px;
font-weight:700;
}

.logo-text p{
font-size:13px;
color:#d1d5db;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-title{
font-size:13px;
font-weight:700;
color:#facc15;
margin-top:15px;
padding-left:5px;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:15px;
border-radius:16px;
text-decoration:none;
color:white;
transition:.3s;
background:rgba(255,255,255,0.03);
font-size:15px;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
transform:translateX(4px);
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow-y:auto;
}

/* HEADER */

.header-box{
background:#1e293b;
padding:25px;
border-radius:24px;
margin-bottom:25px;
}

.header-box h1{
font-size:38px;
}

.header-box p{
color:#cbd5e1;
margin-top:8px;
}

/* FORM */

.form-box{
background:#1e293b;
padding:25px;
border-radius:24px;
margin-bottom:25px;

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;
}

.form-box input,
.form-box select,
.form-box textarea{
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;
font-size:14px;
}

textarea{
resize:none;
height:52px;
}

.save-btn{
background:#ef4444;
border:none;
padding:14px;
border-radius:12px;
font-weight:700;
cursor:pointer;
color:white;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:24px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1100px;
}

th{
background:#111827;
color:#facc15;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.delete-btn{
background:#ef4444;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* MOBILE */

@media(max-width:950px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
}

.menu{
flex-direction:row;
}

.menu a{
min-width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Inventory System</p>

</div>

</div>

<div class="menu">

<p class="menu-title">
STOCKROOM
</p>

<a href="stockroom.html">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="items.html">

<i class="fa-solid fa-boxes-stacked"></i>

Items

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>

Stock In

</a>

<a href="stock-out.html">

<i class="fa-solid fa-arrow-right-arrow-left"></i>

Stock Out

</a>

<a href="waste.html"
class="active">

<i class="fa-solid fa-trash"></i>

Waste

</a>

<a href="daily-inventory.html">

<i class="fa-solid fa-clipboard-list"></i>

Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header-box">

<h1>Waste Management 🗑️</h1>

<p id="dateTime"></p>

</div>

<!-- FORM -->

<div class="form-box">

<select id="itemSelect">

<option value="">
Select Item
</option>

</select>

<input type="number"
id="quantity"
placeholder="Waste Quantity">

<input type="date"
id="date">

<textarea
id="reason"
placeholder="Reason of Waste"></textarea>

<button class="save-btn"
onclick="saveWaste()">

Save Waste

</button>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Date</th>
<th>Item</th>
<th>Quantity</th>
<th>Reason</th>
<th>Action</th>

</tr>

</thead>

<tbody id="wasteTable">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
increment,
getDoc

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_AUTH_DOMAIN",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_STORAGE_BUCKET",

messagingSenderId: "YOUR_MESSAGING_SENDER_ID",

appId: "YOUR_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* DATE TIME */

function updateDateTime(){

document.getElementById("dateTime")
.innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();

/* LOAD ITEMS */

async function loadItems(){

const select =
document.getElementById("itemSelect");

select.innerHTML = `

<option value="">
Select Item
</option>

`;

const snapshot =
await getDocs(
collection(db,"inventoryItems")
);

snapshot.forEach((firebaseDoc)=>{

const item =
firebaseDoc.data();

select.innerHTML += `

<option value="${firebaseDoc.id}">
${item.name}
</option>

`;

});

}

/* SAVE WASTE */

window.saveWaste =
async function(){

const itemId =
document.getElementById("itemSelect").value;

const itemName =
document.getElementById("itemSelect")
.options[
document.getElementById("itemSelect")
.selectedIndex
].text;

const qty =
Number(
document.getElementById("quantity").value
);

const date =
document.getElementById("date").value;

const reason =
document.getElementById("reason").value;

if(
!itemId ||
!qty ||
!date ||
!reason
){

alert("Complete all fields");

return;

}

/* CHECK STOCK */

const itemRef =
doc(db,"inventoryItems",itemId);

const itemSnap =
await getDoc(itemRef);

const currentStock =
Number(
itemSnap.data().stock || 0
);

if(qty > currentStock){

alert("Not enough stock");

return;

}

/* SAVE WASTE */

await addDoc(
collection(db,"waste"),
{

itemId:itemId,
itemName:itemName,
qty:qty,
date:date,
reason:reason,
createdAt:new Date()

}
);

/* DEDUCT STOCK */

await updateDoc(
itemRef,
{

stock:increment(-qty)

}
);

alert("Waste Saved");

/* CLEAR */

document.getElementById("quantity")
.value = "";

document.getElementById("reason")
.value = "";

/* RELOAD */

loadWaste();

}

/* LOAD WASTE */

async function loadWaste(){

const table =
document.getElementById("wasteTable");

table.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"waste")
);

snapshot.forEach((firebaseDoc)=>{

const data =
firebaseDoc.data();

table.innerHTML += `

<tr>

<td>${data.date}</td>

<td>${data.itemName}</td>

<td>${data.qty}</td>

<td>${data.reason}</td>

<td>

<button
class="delete-btn"
onclick="deleteWaste('${firebaseDoc.id}','${data.itemId}',${data.qty})">

Delete

</button>

</td>

</tr>

`;

});

}

/* DELETE */

window.deleteWaste =
async function(wasteId,itemId,qty){

if(!confirm("Delete waste record?")) return;

/* DELETE */

await deleteDoc(
doc(db,"waste",wasteId)
);

/* RETURN STOCK */

await updateDoc(
doc(db,"inventoryItems",itemId),
{

stock:increment(qty)

}
);

loadWaste();

}

/* LOAD */

loadItems();
loadWaste();

</script>

</body>
</html>
