<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control"
content="no-cache, no-store, must-revalidate">

<meta http-equiv="Pragma"
content="no-cache">

<meta http-equiv="Expires"
content="0">

<title>D'Mezzanine Waste Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#d8ecec;
color:#111827;
overflow:hidden;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:8px;
height:8px;
}

::-webkit-scrollbar-thumb{
background:#0f766e;
border-radius:10px;
}

/* LAYOUT */

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#0f172a;
padding:20px;
overflow-y:auto;
border-right:3px solid #134e4a;
}

.logo-box{
display:flex;
align-items:center;
gap:14px;
margin-bottom:30px;
}

.logo-box img{
width:70px;
height:70px;
border-radius:50%;
background:white;
padding:5px;
border:3px solid #facc15;
object-fit:contain;
}

.logo-text h2{
font-size:24px;
font-weight:700;
color:white;
}

.logo-text p{
font-size:13px;
color:#cbd5e1;
margin-top:3px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu-title{
font-size:13px;
font-weight:700;
color:#facc15;
margin-top:18px;
margin-bottom:5px;
padding-left:5px;
}

.menu a{
display:flex;
align-items:center;
gap:14px;
padding:16px;
border-radius:14px;
text-decoration:none;
color:white;
font-size:15px;
font-weight:500;
transition:.3s;
background:#1e293b;
}

.menu a:hover,
.menu a.active{
background:#facc15;
color:black;
transform:translateX(4px);
}

/* MAIN */

.main{
flex:1;
padding:20px;
overflow-y:auto;
}

/* HEADER */

.header-box{
background:#b8dede;
padding:20px;
border:2px solid #6b9e9e;
margin-bottom:18px;
}

.header-box h1{
font-size:32px;
font-weight:700;
}

.header-box p{
margin-top:5px;
font-size:14px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#c7e4e4;
border:2px solid #7aa6a6;
padding:20px;
position:relative;
}

.card i{
position:absolute;
top:15px;
right:15px;
font-size:34px;
color:#134e4a;
}

.card h3{
font-size:15px;
margin-bottom:10px;
}

.card h2{
font-size:38px;
color:#0f172a;
}

/* FORM */

.form-box{
background:#c7e4e4;
border:2px solid #7aa6a6;
padding:20px;
margin-bottom:18px;

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:12px;
}

.form-box input,
.form-box select{
padding:12px;
border:1px solid #7aa6a6;
background:white;
font-size:14px;
}

.form-box input:focus,
.form-box select:focus{
outline:none;
border:2px solid #0f766e;
}

/* STOCK PREVIEW */

.stock-preview{
background:#dc2626;
padding:12px;
color:white;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
}

/* BUTTONS */

.save-btn{
background:#dc2626;
border:none;
padding:13px;
color:white;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.save-btn:hover{
background:#b91c1c;
}

.edit-btn{
background:#2563eb;
border:none;
padding:8px 12px;
color:white;
cursor:pointer;
margin-right:5px;
font-size:13px;
}

.delete-btn{
background:#dc2626;
border:none;
padding:8px 12px;
color:white;
cursor:pointer;
font-size:13px;
}

/* FILTERS */

.filters{
display:flex;
gap:12px;
margin-bottom:18px;
flex-wrap:wrap;
}

.filters input{
padding:12px;
border:1px solid #7aa6a6;
background:white;
min-width:220px;
}

/* TABLE */

.table-box{
background:#c7e4e4;
border:2px solid #7aa6a6;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1600px;
}

th{
background:#9ccccc;
padding:12px;
border:1px solid #7aa6a6;
font-size:13px;
text-align:left;
}

td{
padding:10px;
border:1px solid #7aa6a6;
font-size:13px;
background:#e8f6f6;
}

/* MOBILE */

@media(max-width:950px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
}

.menu{
flex-direction:row;
}

.menu a{
min-width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-box">

<img src="./logo.png">

<div class="logo-text">

<h2>D'Mezzanine</h2>

<p>Inventory System</p>

</div>

</div>

<div class="menu">

<div class="menu-title">
MAIN
</div>

<a href="index.html">

<i class="fa-solid fa-chart-line"></i>
Dashboard

</a>

<div class="menu-title">
INVENTORY
</div>

<a href="items-masterlist.html">

<i class="fa-solid fa-box"></i>
Items Masterlist

</a>

<a href="stock-in.html">

<i class="fa-solid fa-truck"></i>
Stock In

</a>

<a href="stock-out.html">

<i class="fa-solid fa-arrow-right-arrow-left"></i>
Stock Out

</a>

<a href="waste.html"
class="active">

<i class="fa-solid fa-trash"></i>
Waste

</a>

<a href="daily-inventory.html">

<i class="fa-solid fa-clipboard-list"></i>
Daily Inventory

</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header-box">

<h1>Waste Management 🗑️</h1>

<p id="dateTime"></p>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">

<i class="fa-solid fa-trash"></i>

<h3>Total Waste</h3>

<h2 id="totalWaste">0</h2>

</div>

<div class="card">

<i class="fa-solid fa-box-open"></i>

<h3>Waste Records</h3>

<h2 id="wasteCount">0</h2>

</div>

</div>

<!-- FORM -->

<div class="form-box">

<input type="date"
id="date">

<select id="itemSelect">

<option value="">
Select Item
</option>

</select>

<div class="stock-preview"
id="currentStock">

Current Stock: 0

</div>

<input type="number"
id="quantity"
placeholder="Waste Quantity">

<input type="text"
id="reason"
placeholder="Reason">

<input type="text"
id="remarks"
placeholder="Remarks">

<button class="save-btn"
onclick="saveWaste()">

<i class="fa-solid fa-floppy-disk"></i>
Save Waste

</button>

</div>

<!-- FILTER -->

<div class="filters">

<input type="text"
id="searchInput"
placeholder="Search Item..."
onkeyup="loadWaste()">

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>Date</th>
<th>Item</th>
<th>Quantity</th>
<th>Reason</th>
<th>Remarks</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="wasteTable">

<tr>

<td colspan="6">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
onSnapshot,
doc,
updateDoc,
deleteDoc,
getDoc,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyCYjuZlpgE-Lci33e53014F7fRIid6u7Dg",

authDomain: "family-web-10cb8.firebaseapp.com",

projectId: "family-web-10cb8",

storageBucket: "family-web-10cb8.firebasestorage.app",

messagingSenderId: "152048365178",

appId: "1:152048365178:web:3e42c20e03a7c563d915c3"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let itemsMap = {};

/* DATE TIME */

function updateDateTime(){

document.getElementById("dateTime")
.innerText =
new Date().toLocaleString();

}

setInterval(updateDateTime,1000);

updateDateTime();

/* LOAD ITEMS */

async function loadItems(){

const select =
document.getElementById("itemSelect");

select.innerHTML = `

<option value="">
Select Item
</option>

`;

const snapshot =
await getDocs(
collection(db,"inventoryMasterlist")
);

itemsMap = {};

snapshot.forEach((firebaseDoc)=>{

const item =
firebaseDoc.data();

itemsMap[firebaseDoc.id] = {

id:firebaseDoc.id,
...item

};

select.innerHTML += `

<option value="${firebaseDoc.id}">

${item.itemName}

</option>

`;

});

}

/* CURRENT STOCK */

document
.getElementById("itemSelect")
.addEventListener(
"change",
function(){

const itemId = this.value;

if(!itemId){

document.getElementById("currentStock")
.innerText =
"Current Stock: 0";

return;

}

const item =
itemsMap[itemId];

document.getElementById("currentStock")
.innerText =

"Current Stock: " +
(item.stock || 0);

}
);

/* SAVE WASTE */

window.saveWaste =
async function(){

try{

const date =
document.getElementById("date").value;

const itemId =
document.getElementById("itemSelect").value;

const quantity =
Number(
document.getElementById("quantity").value
);

const reason =
document.getElementById("reason").value;

const remarks =
document.getElementById("remarks").value;

if(
!date ||
!itemId ||
!quantity
){

alert("Complete all fields");

return;

}

const selectedItem =
itemsMap[itemId];

const currentStock =
Number(selectedItem.stock || 0);

if(quantity > currentStock){

alert("Insufficient stock");

return;

}

const newStock =
currentStock - quantity;

/* SAVE */

await addDoc(
collection(db,"waste"),
{

date,
itemId,

itemName:
selectedItem.itemName,

quantity,
reason,
remarks,

createdAt:
new Date()

}
);

/* UPDATE STOCK */

await updateDoc(

doc(
db,
"inventoryMasterlist",
itemId
),

{

stock:newStock

}

);

alert("Waste Saved");

document.getElementById("quantity")
.value = "";

document.getElementById("reason")
.value = "";

document.getElementById("remarks")
.value = "";

loadItems();

}catch(error){

console.error(error);

alert(error.message);

}

}

/* DELETE */

window.deleteWaste =
async function(id,itemId,quantity){

const confirmDelete =
confirm("Delete waste record?");

if(!confirmDelete){

return;

}

try{

const itemRef =
doc(db,"inventoryMasterlist",itemId);

const itemSnap =
await getDoc(itemRef);

if(itemSnap.exists()){

const itemData =
itemSnap.data();

const currentStock =
Number(itemData.stock || 0);

await updateDoc(itemRef,{

stock:
currentStock + Number(quantity)

});

}

await deleteDoc(
doc(db,"waste",id)
);

alert("Waste Deleted");

}catch(error){

console.error(error);

alert(error.message);

}

}

/* EDIT */

window.editWaste =
function(
date,
quantity,
reason,
remarks
){

document.getElementById("date")
.value = date;

document.getElementById("quantity")
.value = quantity;

document.getElementById("reason")
.value = reason;

document.getElementById("remarks")
.value = remarks;

window.scrollTo({
top:0,
behavior:"smooth"
});

}

/* LOAD WASTE */

window.loadWaste =
function(){

const table =
document.getElementById("wasteTable");

const search =
document.getElementById("searchInput")
.value
.toLowerCase();

onSnapshot(

collection(db,"waste"),

(snapshot)=>{

table.innerHTML = "";

let totalWaste = 0;
let wasteCount = 0;

snapshot.forEach((firebaseDoc)=>{

const data =
firebaseDoc.data();

if(
search &&
!data.itemName
.toLowerCase()
.includes(search)
){

return;

}

totalWaste +=
Number(data.quantity || 0);

wasteCount++;

table.innerHTML += `

<tr>

<td>${data.date}</td>

<td>${data.itemName}</td>

<td>${data.quantity}</td>

<td>${data.reason}</td>

<td>${data.remarks}</td>

<td>

<button
class="edit-btn"
onclick="editWaste(
'${data.date}',
'${data.quantity}',
'${data.reason}',
'${data.remarks}'
)">

Edit

</button>

<button
class="delete-btn"
onclick="deleteWaste(
'${firebaseDoc.id}',
'${data.itemId}',
${data.quantity}
)">

Delete

</button>

</td>

</tr>

`;

});

if(wasteCount === 0){

table.innerHTML = `

<tr>

<td colspan="6">

No Waste Records

</td>

</tr>

`;

}

document.getElementById("totalWaste")
.innerText =
totalWaste;

document.getElementById("wasteCount")
.innerText =
wasteCount;

}

);

}

/* LOAD */

loadItems();
loadWaste();

</script>

</body>
</html>
